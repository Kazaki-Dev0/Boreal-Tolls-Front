<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boreal Tools - Financeiro</title>

<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(109deg,#090909 32.55%,#002c18 79.54%,#003019 88.95%);
    color:white;
    display:grid;
    grid-template-columns:400px 1fr;
    min-height:100vh;
}

a{
    text-decoration:none;
    color:inherit;
}

/* PAGINA ATIVA */
.secoes:nth-child(4){
    background-color:#2e4a3e;
}

/* MAIN PADRÃO */
main{
    padding:25px;
    overflow-y:auto;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* PAINEL PADRÃO */
.product-panel{
    width:95%;
    max-width:1250px;
    border-radius:20px;
    padding:40px;
    margin:20px auto;
    background:rgba(20,20,20,0.7);
    border:1px solid #2e4a3e;
    box-shadow:0 0 25px rgba(0,255,120,0.08);
}

/* HEADER PADRÃO */
.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.panel-title h2{
    font-size:2rem;
    font-weight:500;
    margin-bottom:10px;
}

.breadcrumb{
    color:#7bcf9c;
    font-size:0.95rem;
}

.breadcrumb span{
    color:#aaa;
}

.panel-icon{
    width:50px;
    height:50px;
    border-radius:10px;
    background:#163125;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#7bcf9c;
    font-size:28px;
}

/* GRÁFICO */
.chart-box{
    width:100%;
    height:260px;
    margin-bottom:25px;
    background:#111;
    border:1px solid #2e4a3e;
    border-radius:15px;
    padding:15px;
}

/* TOOLBAR PADRÃO */
.table-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.search-box{
    width:320px;
    display:flex;
    align-items:center;
    border:1px solid #3a4a43;
    border-radius:30px;
    padding:10px 18px;
    background:transparent;
}

.search-box input{
    width:100%;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:0.95rem;
}

.search-box i{
    color:#777;
}

/* BOTÃO PADRÃO */
.btn-add{
    background:#9cc8aa;
    color:black;
    padding:12px 24px;
    border-radius:10px;
    font-weight:600;
}

/* TABELA PADRÃO */
.product-table{
    width:100%;
    border-collapse:collapse;
}

.product-table th{
    text-align:left;
    padding:18px 15px;
    color:white;
    font-size:0.95rem;
    font-weight:500;
    border-bottom:1px solid #2b2b2b;
}

.product-table td{
    padding:22px 15px;
    color:#cfcfcf;
    border-bottom:1px solid #2b2b2b;
}

.product-table tbody tr:hover{
    background:rgba(255,255,255,0.02);
}

/* CORES */
.text-green{color:#7bcf9c;}
.text-red{color:#ff6b6b;}

</style>
</head>

<body>

<section class="side-bar">

    <div class="sidebar-header">
        <img src="./img/LogoBorealTools.png" class="logo">
    </div>

    <div class="perfil">
        <img src="./img/perfil-icon.png">
        <p>Fulano de Tal</p>
    </div>

    <nav class="nav-side-bar">

        <div class="secoes"><img src="./img/inicio.sidebar.png"><a href="dashboard.html">Início</a></div>
        <div class="secoes"><img src="./img/produtos.png"><a href="produtos.html">Produtos</a></div>
        <div class="secoes"><img src="./img/estoque.png"><a href="estoque.html">Estoques</a></div>
        <div class="secoes active"><img src="./img/financeiro.png"><a href="financeiro.html">Financeiro</a></div>
        <div class="secoes"><img src="./img/vendas.png"><a href="vendas.html">Vendas</a></div>
        <div class="secoes"><img src="./img/funcionarios.png"><a href="funcionarios.html">Funcionários</a></div>
        <div class="secoes"><img src="./img/clientes.png"><a href="clientes.html">Clientes</a></div>
        <div class="secoes"><img src="./img/relatorios.png" class="secao-icon"><a href="./categorias.html">Categorias</a></div>

    </nav>

    <div class="logout-link">
        <a href="login.html">← Deslogar</a>
    </div>

</section>

<main>

<div class="product-panel">

    <!-- HEADER -->
    <div class="panel-header">

        <div class="panel-title">
            <h2>Controle Financeiro</h2>
            <div class="breadcrumb">Financeiro > <span>Fluxo de caixa</span></div>
        </div>

        <div class="panel-icon">
            <i class="ph ph-currency-dollar"></i>
        </div>

    </div>

    <!-- GRÁFICO -->
    <div class="chart-box">
        <canvas id="graficoFinanceiro"></canvas>
    </div>

    <!-- TOOLBAR -->
    <div class="table-toolbar">

        <div class="search-box">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" placeholder="Buscar transação...">
        </div>

        <a class="btn-add" href="novo-lancamento.html">+ Lançamento</a>

    </div>

    <!-- TABELA -->
    <table class="product-table">

        <thead>
            <tr>
                <th>Data</th>
                <th>Tipo</th>
                <th>Descrição</th>
                <th>Status</th>
                <th>Valor</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>10/05/2024</td>
                <td><span class="text-green">Entrada</span></td>
                <td>Venda Produto X</td>
                <td>Pago</td>
                <td class="text-green">+R$ 1.200</td>
            </tr>

            <tr>
                <td>11/05/2024</td>
                <td><span class="text-red">Saída</span></td>
                <td>Fornecedor Y</td>
                <td>Pendente</td>
                <td class="text-red">-R$ 400</td>
            </tr>

        </tbody>

    </table>

</div>

</main>

<script>
const ctx = document.getElementById('graficoFinanceiro');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan','Fev','Mar','Abr','Mai','Jun'],
        datasets: [{
            label: 'Fluxo de Caixa',
            data: [1200, 1900, 3000, 2500, 3200, 2800],
            borderColor: '#7bcf9c',
            backgroundColor: 'rgba(123,207,156,0.2)',
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        plugins:{legend:{display:false}},
        scales:{
            x:{ticks:{color:'#fff'}},
            y:{ticks:{color:'#fff'}}
        }
    }
});
</script>

</body>
</html>
