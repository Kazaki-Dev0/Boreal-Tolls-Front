<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{

    background:
    linear-gradient(
        109deg,
        #090909 32.55%,
        #002c18 79.54%,
        #003019 88.95%
    );

    color:white;

    display:grid;

    grid-template-columns:400px 1fr;

    min-height:100vh;
}

a{
    text-decoration:none;
    color:inherit;
}

/* =========================
   PAGINA ATIVA
========================= */

.secoes:nth-child(7){
    background-color:#2e4a3e;
}

/* =========================
   MAIN
========================= */

main{

    padding:25px;

    overflow-y:auto;

    display:flex;

    justify-content:center;

    align-items:flex-start;
}

/* =========================
   PAINEL
========================= */

.clients-card{

    width:95%;

    max-width:1250px;

    border-radius:20px;

    padding:40px;

    margin:20px auto;

    background:rgba(20,20,20,0.7);

    border:1px solid #2e4a3e;

    box-shadow:
    0 0 25px rgba(0,255,120,0.08);
}

/* =========================
   HEADER
========================= */

.clients-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    margin-bottom:30px;
}

.title-area h2{

    font-size:2rem;

    font-weight:500;

    margin-bottom:10px;
}

.subtitle{

    color:#7bcf9c;

    font-size:0.95rem;
}

.subtitle span{
    color:#aaa;
}

.panel-icon{

    width:50px;
    height:50px;

    border-radius:10px;

    background:#163125;

    display:flex;

    justify-content:center;
    align-items:center;

    color:#7bcf9c;

    font-size:24px;
}

/* =========================
   TOOLBAR
========================= */

.actions{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:40px;
}

.search-box{

    width:340px;

    display:flex;

    align-items:center;

    border:1px solid #3a4a43;

    border-radius:30px;

    padding:10px 18px;

    background:transparent;
}

.search-box input{

    width:100%;

    background:none;

    border:none;

    outline:none;

    color:white;

    font-size:0.95rem;
}

.search-box input::placeholder{
    color:#777;
}

.search-box i{
    color:#777;
}

/* =========================
   BOTAO
========================= */

.btn-add{

    background:#9cc8aa;

    color:black;

    padding:12px 24px;

    border-radius:10px;

    font-weight:600;

    transition:0.3s;
}

.btn-add:hover{
    background:#81c784;
}

/* =========================
   TABELA
========================= */

.clients-table{

    width:100%;

    border-collapse:collapse;
}

.clients-table th{

    text-align:left;

    padding:18px 15px;

    color:white;

    font-size:0.95rem;

    font-weight:500;

    border-bottom:1px solid #2b2b2b;
}

.clients-table td{

    padding:22px 15px;

    color:#cfcfcf;

    border-bottom:1px solid #2b2b2b;
}

.clients-table tbody tr:hover{
    background:rgba(255,255,255,0.02);
}

/* =========================
   BOTAO DETALHES
========================= */

.btn-detail{

    background:#9cc8aa;

    color:black;

    border:none;

    padding:8px 18px;

    border-radius:20px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.btn-detail:hover{
    background:#81c784;
}

/* =========================
   LINHAS VAZIAS
========================= */

.empty-row td{
    height:55px;
}

</style>
</head>

<body>

    </div>

    <div class="perfil">

        <img src="./img/perfil-icon.png"

    </div>

    <nav class="nav-side-bar">

        <div class="secoes">

        </div>

        <div class="secoes">
            <img src="./img/produtos.png" class="secao-icon">
            <a href="produtos.html">Produtos</a>
        </div>

        <div class="secoes">
            <img src="./img/estoque.png" class="secao-icon">
            <a href="./estoque.html">Estoques</a>
        </div>

        <div class="secoes">
            <img src="./img/financeiro.png" class="secao-icon">
            <a href="./financeiro.html">Financeiro</a>
        </div>

        <div class="secoes">
            <img src="./img/vendas.png" class="secao-icon">
            <a href="vendas.html">Vendas</a>
        </div>

        <div class="secoes">
            <img src="./img/funcionarios.png" class="secao-icon">
            <a href="./funcionarios.html">Funcionários</a>
        </div>

        <div class="secoes active">
            <img src="./img/clientes.png" class="secao-icon">
            <a href="./ClienteFornecedor.html">Clientes</a>

        <div class="secoes">
            <img src="./img/relatorios.png" class="secao-icon">

        </div>

    </nav>

    <div class="logout-link">
        <a href="./login.html">← Deslogar</a>
    </div>

</section>

<!-- MAIN -->

<main>

<div class="clients-card">

    <!-- HEADER -->

    <div class="clients-header">

        <div class="title-area">

            <h2>
                Clientes e Fornecedores
            </h2>

            <div class="subtitle">

                Clientes >
                <span>Lista de registros</span>

            </div>

        </div>

        <div class="panel-icon">
            <i class="fa-solid fa-user"></i>
        </div>

    </div>

    <!-- TOOLBAR -->

    <div class="actions">

        <div class="search-box">

            <input type="text" id="inputBusca" placeholder="Buscar por ID, Nome ou CPF/CNPJ">

            <i class="fa-solid fa-magnifying-glass"></i>

        </div>

        <a href="cadastrarCliente.html"
        class="btn-add">

            + Cadastrar

        </a>

    </div>

    <table class="clients-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF/CNPJ</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        
        <tbody id="tabelaClientesBody"></tbody>
    </table>

</div> </main> <script src="listarClientes.js"></script>
</body>
</html>

<script>
    const API_BASE_URL = 'https://localhost:7142/api'; // Ajuste para a porta da sua API

// Array global para armazenar os clientes localmente e permitir a busca rápida
let todosClientes = []; 

document.addEventListener('DOMContentLoaded', () => {
    const tabelaBody = document.getElementById('tabelaClientesBody');
    const inputBusca = document.getElementById('inputBusca');
    const token = localStorage.getItem('token');

    // Verifica se o usuário está autenticado ([Authorize] no C#)
    if (!token) {
        alert('Sessão expirada ou não encontrada. Faça login novamente.');
        window.location.href = 'login.html';
        return;
    }

    // ==========================================
    // 1. FUNÇÃO PARA CARREGAR DADOS DA API
    // ==========================================
    async function carregarClientes() {
        try {
            const response = await fetch(`${API_BASE_URL}/clientes`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                todosClientes = await response.json();
                renderizarTabela(todosClientes);
            } else if (response.status === 401) {
                alert('Não autorizado. Por favor, refaça o login.');
                window.location.href = 'login.html';
            } else {
                console.error('Erro ao buscar clientes:', response.statusText);
                tabelaBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: #ff6b6b;">Erro ao carregar os dados.</td></tr>`;
            }
        } catch (error) {
            console.error('Erro de conexão:', error);
            tabelaBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: #ff6b6b;">Não foi possível conectar ao servidor.</td></tr>`;
        }
    }

    // ==========================================
    // 2. FUNÇÃO PARA RENDERIZAR AS LINHAS DA TABELA
    // ==========================================
    function renderizarTabela(lista) {
        tabelaBody.innerHTML = ''; // Limpa a tabela antes de renderizar

        if (lista.length === 0) {
            tabelaBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: #888;">Nenhum registro encontrado.</td></tr>`;
            return;
        }

        lista.forEach(cliente => {
            // Verifica se exibe CPF ou CNPJ (o que estiver preenchido)
            const documento = cliente.cpf || cliente.cnpj || 'Não informado';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>#${cliente.id}</td>
                <td><strong>${cliente.nome}</strong></td>
                <td>${documento}</td>
                <td>${cliente.email || '-'}</td>
                <td>${cliente.telefone || '-'}</td>
                <td>
                    <button class="btn-detail" data-id="${cliente.id}">
                        <i class="fa-solid fa-eye"></i> Detalhes
                    </button>
                </td>
            `;
            tabelaBody.appendChild(tr);
        });

        // Adiciona evento de clique nos botões "Detalhes"
        configurarBotoesDetalhes();
    }

    // ==========================================
    // 3. FILTRO DE BUSCA EM TEMPO REAL
    // ==========================================
    if (inputBusca) {
        inputBusca.addEventListener('input', (e) => {
            const termoBusca = e.target.value.toLowerCase().trim();

            // Filtra por ID, Nome, CPF ou CNPJ
            const clientesFiltrados = todosClientes.filter(cliente => {
                const idString = cliente.id.toString();
                const nome = cliente.nome ? cliente.nome.toLowerCase() : '';
                const cpf = cliente.cpf ? cliente.cpf.toLowerCase() : '';
                const cnpj = cliente.cnpj ? cliente.cnpj.toLowerCase() : '';

                return idString.includes(termoBusca) || 
                       nome.includes(termoBusca) || 
                       cpf.includes(termoBusca) || 
                       cnpj.includes(termoBusca);
            });

            renderizarTabela(clientesFiltrados);
        });
    }

    // ==========================================
    // 4. REDIRECIONAMENTO PARA DETALHES/EDIÇÃO
    // ==========================================
    function configurarBotoesDetalhes() {
        const botoes = document.querySelectorAll('.btn-detail');
        botoes.forEach(botao => {
            botao.addEventListener('click', () => {
                const id = botao.getAttribute('data-id');
                // Redireciona passando o ID via Query String da URL
                window.location.href = `detalhesCliente.html?id=${id}`;
            });
        });
    }

    // Executa a carga inicial dos dados
    carregarClientes();
});
</script>
    

</body>
