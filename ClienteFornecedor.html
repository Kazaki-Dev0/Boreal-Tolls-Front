<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Clientes</title>

    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Padronização da Barra Lateral */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px; 
            width: 260px;
            flex-shrink: 0;
        }

        /* Destaque na seção de Clientes (7º item do menu) */
        .secoes:nth-child(7) {
            background-color: #2e4a3e;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px; 
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Área do Painel Principal */
        main {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .client-panel {
            width: 100%;
            max-width: 1250px;
            border-radius: 20px;
            padding: 40px;
            margin: 0 auto 20px auto;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .panel-title h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .panel-subtitle {
            color: #6da381;
            font-size: 0.8rem;
        }

        .panel-icon {
            background: rgba(135, 255, 185, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: #7bcf9c;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid #4a5a50;
            border-radius: 20px;
            padding: 8px 16px;
            width: 320px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #ffffff;
            outline: none;
            width: 100%;
            font-size: 0.85rem;
        }

        .search-box input::placeholder { color: #666; }
        .search-box i { color: #666; }

        .actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #80B297;
            color: #000;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background-color 0.3s;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
        }

        .btn:hover { background-color: #81c784; }

        /* Grid dos Cards (Baseado em Funcionários) */
        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .client-card {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid #23332b;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.25s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .client-card:hover {
            border-color: #7bcf9c;
            transform: translateY(-3px);
            background: rgba(20, 20, 20, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .client-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .client-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .client-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(123, 207, 156, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #7bcf9c;
            font-size: 18px;
            border: 1px solid #2e4a3e;
        }

        .client-name h4 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 2px;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .client-name p { color: #6da381; font-size: 0.8rem; }

        .client-id {
            color: #7bcf9c;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(123, 207, 156, 0.08);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .client-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .client-table tr { border-bottom: 1px solid #23332b; }
        .client-table tr:last-child { border: none; }
        .client-table td { padding: 10px 0; font-size: 0.85rem; }
        .client-table td:first-child { color: #888; }
        .client-table td:last-child { text-align: right; color: white; font-weight: 500; }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-detalhes {
            background: transparent;
            color: #7bcf9c;
            border: 1px solid #2e4a3e;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-detalhes:hover {
            background: rgba(123, 207, 156, 0.1);
            border-color: #7bcf9c;
        }

        .btn-delete {
            background: transparent;
            color: #e57373;
            border: 1px solid rgba(229, 115, 115, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: rgba(229, 115, 115, 0.1);
            border-color: #e57373;
        }

        /* Modal Visual */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #121212;
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 30px rgba(0, 255, 120, 0.1);
            width: 90%;
            max-width: 650px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2e4a3e;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-header h3 { font-size: 1.3rem; color: #7bcf9c; font-weight: 500; }
        .modal-close { background: transparent; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: #e57373; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .info-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #161616;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #23332b;
            font-size: 0.9rem;
        }

        .info-box strong {
            font-size: 0.75rem;
            color: #6da381;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media(max-width:900px){
            .main-wrapper { flex-direction: column; }
            .side-bar { display: none; }
            main { max-width: 100vw; }
            .toolbar { flex-direction: column; align-items: flex-start; }
            .actions { flex-wrap: wrap; width: 100%; }
            .search-box { width: 100%; }
            .details-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<div class="main-wrapper">
    <section class="side-bar">
        <div>
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>

            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Perfil">
                <p id="nomeUsuarioSidebar">Carregando...</p>
            </div>

            <nav class="nav-side-bar">
                <div class="secoes"><img src="./img/inicio.sidebar.png" class="secao-icon"><a href="dashboard.html">Início</a></div>
                <div class="secoes"><img src="./img/produtos.png" class="secao-icon"><a href="produtos.html">Produtos</a></div>
                <div class="secoes"><img src="./img/estoque.png" class="secao-icon"><a href="./estoque.html">Estoques</a></div>
                <div class="secoes"><img src="./img/financeiro.png" class="secao-icon"><a href="./financeiro.html">Financeiro</a></div>
                <div class="secoes"><img src="./img/vendas.png" class="secao-icon"><a href="vendas.html">Vendas</a></div>
                <div class="secoes"><img src="./img/funcionarios.png" class="secao-icon"><a href="./funcionarios.html">Funcionários</a></div>
                <div class="secoes active"><img src="./img/clientes.png" class="secao-icon"><a href="./ClienteFornecedor.html">Clientes</a></div>
                <div class="secoes"><img src="./img/relatorios.png" class="secao-icon"><a href="./categorias.html">Categorias</a></div>
            </nav>
        </div>

        <div class="logout-link">
            <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="client-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <h2>Clientes e Fornecedores</h2>
                    <div class="subtitle panel-subtitle">Gerencie os registros cadastrais, contatos, CPF/CNPJ e tipos de vínculo.</div>
                </div>
                <div class="panel-icon"><i class="fa-solid fa-user"></i></div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="input-search" placeholder="Pesquisar por nome, documento ou tipo...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div class="actions">
                    <a href="cadastrarCliente.html" class="btn">+ Cadastrar</a>
                </div>
            </div>

            <div class="client-grid" id="client-grid">
                <p style="color: #aaa;">Carregando dados dos registros...</p>
            </div>
        </div>
    </section>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-client-name">Nome Fantasia / Razão Social</h3>
            <button class="modal-close" onclick="fecharModal()">&times;</button>
        </div>
        <div class="details-grid" id="modalContent"></div>
    </div>
</div>

<script>
    // URL CONFIGURADA PARA O NOVO ENDPOINT DE PRODUÇÃO NO AZURE
    const API_URL = "https://api-time7.azurewebsites.net/api/Clientes"; 

    let registrosGlobais = [];
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');

    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (!token) {
            window.location.replace("./login.html");
            return;
        }

        // CARREGAMENTO DO NOME DO USUÁRIO INTEGRADO COM CLAIMS DA API DO AZURE
        const payloadJson = parseJwt(token);
        if (payloadJson) {
            document.getElementById("nomeUsuarioSidebar").innerText = 
                payloadJson["unique_name"] || 
                payloadJson["name"] || 
                payloadJson["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || 
                "Usuário Boreal";
        }

        carregarRegistros();

        // Configuração do filtro de pesquisa em tempo real
        document.getElementById('input-search').addEventListener('input', (e) => {
            const busca = e.target.value.toLowerCase().trim();
            const filtrados = registrosGlobais.filter(reg => {
                const nome = (reg.nome || reg.razaoSocial || "").toLowerCase();
                const doc = (reg.cpf || reg.cnpj || "").toLowerCase();
                const tipo = (reg.tipoVinculo || "").toLowerCase();
                return nome.includes(busca) || doc.includes(busca) || tipo.includes(busca);
            });
            renderizarCards(filtrados);
        });
    });

    async function carregarRegistros() {
        const grid = document.getElementById('client-grid');
        try {
            const response = await fetch(API_URL, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) throw new Error("Erro na comunicação com a API.");

            registrosGlobais = await response.json();
            renderizarCards(registrosGlobais);

        } catch (error) {
            console.error("Erro ao obter dados de Clientes/Fornecedores:", error);
            grid.innerHTML = `<p style="color: #e57373;">Não foi possível recuperar os dados da nuvem.</p>`;
        }
    }

    function renderizarCards(lista) {
        const grid = document.getElementById('client-grid');
        if (lista.length === 0) {
            grid.innerHTML = `<p style="color: #aaa;">Nenhum registro encontrado.</p>`;
            return;
        }

        grid.innerHTML = "";
        lista.forEach(reg => {
            const id = reg.id;
            const nomeExibicao = reg.nome || reg.razaoSocial || "Sem Nome Definido";
            const documento = reg.cpf || reg.cnpj || "Não Informado";
            const tipo = reg.tipoVinculo || "Cliente";

            const card = `
                <div class="client-card">
                    <div>
                        <div class="client-top">
                            <div class="client-info">
                                <div class="client-photo"><i class="fa-solid fa-address-card"></i></div>
                                <div class="client-name">
                                    <h4>${nomeExibicao}</h4>
                                    <p>${tipo.toUpperCase()}</p>
                                </div>
                            </div>
                            <span class="client-id">#${id}</span>
                        </div>
                        <table class="client-table">
                            <tr>
                                <td>Documento</td>
                                <td>${documento}</td>
                            </tr>
                            <tr>
                                <td>Telefone</td>
                                <td>${reg.telefone || "Não Informado"}</td>
                            </tr>
                        </table>
                    </div>
                    <div class="card-actions">
                        <button class="btn-detalhes" onclick="abrirDetalhes(${id})">Visualizar</button>
                        <button class="btn-delete" onclick="deletarRegistro(${id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', card);
        });
    }

    function abrirDetalhes(id) {
        const reg = registrosGlobais.find(r => r.id === id);
        if (!reg) return;

        document.getElementById('modal-client-name').innerText = reg.nome || reg.razaoSocial || "Detalhes do Registro";
        
        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div class="info-box"><strong>ID</strong><span>#${reg.id}</span></div>
            <div class="info-box"><strong>Tipo de Vínculo</strong><span>${reg.tipoVinculo || "Cliente"}</span></div>
            <div class="info-box"><strong>CPF / CNPJ</strong><span>${reg.cpf || reg.cnpj || "Não cadastrado"}</span></div>
            <div class="info-box"><strong>Inscrição Estadual</strong><span>${reg.inscricaoEstadual || "Isento/Não informado"}</span></div>
            <div class="info-box"><strong>E-mail</strong><span>${reg.email || "Sem e-mail cadastrado"}</span></div>
            <div class="info-box"><strong>Telefone</strong><span>${reg.telefone || "Sem telefone cadastrado"}</span></div>
            <div class="info-box" style="grid-column: span 2;"><strong>Endereço Completo</strong><span>${reg.endereco || "Não informado"}</span></div>
        `;

        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    async function deletarRegistro(id) {
        if (!confirm("Deseja realmente remover este registro permanentemente?")) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (response.ok) {
                alert("Registro deletado com sucesso!");
                carregarRegistros();
            } else {
                alert("Ocorreu um erro ao tentar excluir do servidor.");
            }
        } catch (error) {
            console.error("Erro na requisição DELETE:", error);
            alert("Erro de conexão ao remover.");
        }
    }

    function efetuarLogout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace("./login.html");
    }
</script>
</body>
</html>
