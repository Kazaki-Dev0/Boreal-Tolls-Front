<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Nova Transação</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="sidebar.css">

    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-panel: rgba(20, 20, 20, 0.72);
            --text-primary: #ffffff;
            --text-secondary: #9aa09d;
            --neon-green: #7bcf9c;
            --neon-green-glow: rgba(123, 207, 156, 0.3);
            --border-color: #2e4a3e;
            --danger-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden; /* Evita que a página principal role incorretamente */
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Padronização do Sidebar conforme referências */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px; 
            width: 260px;
            flex-shrink: 0;
        }

        .secoes:nth-child(4) {
            background-color: #2e4a3e; /* Mantém módulo financeiro ativo */
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px; 
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Área de Conteúdo Centralizada Anti-Scroll */
        main.content {
            flex: 1;
            padding: 25px;
            overflow-y: auto; /* Permite rolagem vertical apenas aqui dentro se necessário */
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: center; 
        }

        /* Painel do Formulário Estilo Boreal */
        .form-panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
            backdrop-filter: blur(5px);
            margin: 20px 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .title-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.6rem;
            font-weight: 400;
            color: #ffffff;
        }

        .panel-title i { 
            color: var(--neon-green); 
            font-size: 2rem; 
        }

        .panel-subtitle { 
            font-size: 0.8rem; 
            color: #6da381; 
        }

        .btn-history {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-history:hover { 
            border-color: var(--neon-green); 
            color: var(--neon-green); 
            background-color: rgba(123, 207, 156, 0.05);
        }

        /* Grade do Formulário */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { 
            grid-column: span 2; 
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Botões Seletores Alternáveis */
        .toggle-group {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .toggle-btn.inactive {
            background-color: #141414;
            color: #555;
            opacity: 0.6;
        }

        .toggle-btn.inactive:hover {
            opacity: 0.9;
            color: #888;
        }

        .toggle-btn.active-rec {
            background-color: rgba(76, 175, 80, 0.15);
            color: #81c784;
            border-color: #81c784;
            box-shadow: 0 0 12px rgba(129, 199, 132, 0.2);
            opacity: 1;
        }

        .toggle-btn.active-pag {
            background-color: rgba(244, 67, 54, 0.15);
            color: var(--danger-color);
            border-color: var(--danger-color);
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.2);
            opacity: 1;
        }

        /* Inputs Estilo Clean */
        input, textarea {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            padding: 11px 15px;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            transition: 0.3s;
        }

        input:focus, textarea:focus { 
            border-color: var(--neon-green); 
            box-shadow: 0 0 8px var(--neon-green-glow); 
        }
        
        textarea { 
            resize: none; 
            height: 90px; 
        }

        /* Checkbox customizado */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input { 
            width: auto; 
            cursor: pointer; 
            transform: scale(1.1); 
        }

        /* Ações Finais */
        .form-actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn-save {
            background-color: #80B297;
            color: #000;
            border: none;
            padding: 11px 35px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover { 
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.4); 
            background-color: #81c784;
        }

        .btn-cancel-form {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-cancel-form:hover { 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
        }

        @media(max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <section class="side-bar">
            <div>
                <div class="sidebar-header">
                    <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
                </div>
                
                <div class="perfil">
                    <img id="user-avatar" src="./img/perfil-icon.png" alt="Foto de Perfil">
                    <p id="nomeUsuarioSidebar">Carregando...</p>
                </div> 
                
                <nav class="nav-side-bar">
                    <div class="secoes">
                        <img src="./img/inicio.sidebar.png" class="secao-icon">
                        <a href="dashboard.html">Início</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/produtos.png" class="secao-icon">
                        <a href="produtos.html">Produtos</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/estoque.png" class="secao-icon">
                        <a href="./estoque.html">Estoques</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/financeiro.png" class="secao-icon">
                        <a href="./financeiro.html">Financeiro</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/vendas.png" class="secao-icon">
                        <a href="vendas.html">Vendas</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/funcionarios.png" class="secao-icon">
                        <a href="./funcionarios.html">Funcionários</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/clientes.png" class="secao-icon">
                        <a href="./ClienteFornecedor.html">Clientes e Fornecedores</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/relatorios.png" class="secao-icon">
                        <a href="./categorias.html">Categorias</a>
                    </div>
                </nav>
            </div>

            <div class="logout-link">
                <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="form-panel">
                <header class="panel-header">
                    <div class="title-group">
                        <div class="panel-title">
                            <i class="ph ph-currency-dollar"></i>
                            Nova Transação
                        </div>
                        <p class="panel-subtitle">Registre uma nova movimentação financeira no sistema de caixa.</p>
                    </div>
                    <button class="btn-history" onclick="window.location.href='./financeiro.html'">
                        <i class="ph ph-arrow-left"></i> Voltar ao histórico
                    </button>
                </header>

                <form class="form-grid" id="formNovoLancamento" onsubmit="salvarDadosFormulario(event)">
                    
                    <input type="hidden" name="tipo_transacao_hidden" id="tipo-transacao-hidden" value="recebimento">

                    <div class="input-group full-width">
                        <label>Tipo de transação</label>
                        <div class="toggle-group">
                            <div id="btn-rec" class="toggle-btn active-rec" onclick="setTransactionType('recebimento')">
                                <i class="ph ph-arrow-down-left"></i> Entrada / Recebimento
                            </div>
                            <div id="btn-pag" class="toggle-btn inactive" onclick="setTransactionType('pagamento')">
                                <i class="ph ph-arrow-up-right"></i> Saída / Pagamento
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Data Vencimento/Previsão</label>
                        <input type="date" name="data_vencimento" id="data_vencimento" required>
                    </div>

                    <div class="input-group">
                        <label>Valor (R$)</label>
                        <input type="number" name="valor" id="valor" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="input-group full-width">
                        <label>Descrição</label>
                        <textarea name="descricao" id="descricao" placeholder="Ex: Pagamento do fornecedor X / Recebimento Venda #1024" required></textarea>
                    </div>

                    <div class="input-group">
                        <label>Data do efetivo Pagamento/Recebimento (Opcional)</label>
                        <input type="date" name="data_pagamento" id="data_pagamento">
                    </div>

                    <div class="input-group" style="justify-content: flex-end;">
                        <label class="checkbox-container">
                            <input type="checkbox" name="chkbx_pago" id="chkbx_pago"> Marcar como pago/recebido agora
                        </label>
                    </div>

                    <div class="form-actions full-width">
                        <button type="submit" class="btn-save" id="btnSalvar">Salvar Lançamento</button>
                        <button type="button" class="btn-cancel-form" onclick="window.location.href='./financeiro.html'">Cancelar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Definição da URL base da API
        const API_BASE_URL = "https://api-time7.azurewebsites.net/api";

        /* ========================================================
            INTERAÇÃO DO SELECTOR DE TIPO (ENTRADA/SAÍDA)
        ======================================================== */
        function setTransactionType(type) {
            const btnRec = document.getElementById('btn-rec');
            const btnPag = document.getElementById('btn-pag');
            const hiddenInput = document.getElementById('tipo-transacao-hidden');

            if (type === 'recebimento') {
                btnRec.className = 'toggle-btn active-rec';
                btnPag.className = 'toggle-btn inactive';
                hiddenInput.value = 'recebimento';
            } else {
                btnPag.className = 'toggle-btn active-pag';
                btnRec.className = 'toggle-btn inactive';
                hiddenInput.value = 'pagamento';
            }
        }

        /* ========================================================
            DECODIFICAÇÃO JWT E VALIDAÇÃO DE USUÁRIO
        ======================================================== */
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("Falha ao decodificar token:", e);
                return null;
            }
        }

        function obterToken() {
            return localStorage.getItem("token") || sessionStorage.getItem("token");
        }

        // Executa ao carregar a página
        document.addEventListener("DOMContentLoaded", () => {
            const tokenAtivo = obterToken();
            
            // Redireciona se não houver token
            if (!tokenAtivo) {
                window.location.replace("./login.html");
                return;
            }

            // Carrega nome do usuário na sidebar (requisito mantido)
            const payloadJson = parseJwt(tokenAtivo);
            if (payloadJson) {
                const nomeUsuario = payloadJson["unique_name"] || 
                                    payloadJson["name"] || 
                                    payloadJson["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || 
                                    "Usuário Boreal";
                document.getElementById("nomeUsuarioSidebar").innerText = nomeUsuario;
            } else {
                document.getElementById("nomeUsuarioSidebar").innerText = "Erro de Sessão";
            }
        });

        function efetuarLogout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace("./index.html");
        }

        /* ========================================================
            ENVIO DOS DADOS PARA A API (A CORREÇÃO ESTÁ AQUI)
        ======================================================== */
        async function salvarDadosFormulario(event) {
            // 1. IMPORTANTE: Impede o recarregamento padrão da página
            event.preventDefault(); 
            
            const btnSalvar = document.getElementById('btnSalvar');
            const token = obterToken();

            if (!token) {
                alert("Sessão expirada. Por favor, faça login novamente.");
                window.location.replace("./login.html");
                return;
            }

            // Desabilita o botão para evitar cliques duplos
            btnSalvar.disabled = true;
            btnSalvar.innerText = "Salvando...";

            // 2. Captura os valores dos campos
            const tipoRaw = document.getElementById('tipo-transacao-hidden').value;
            const dataVencimento = document.getElementById('data_vencimento').value;
            const valorRaw = document.getElementById('valor').value;
            const descricao = document.getElementById('descricao').value;
            const dataPagamento = document.getElementById('data_pagamento').value;
            const ehPago = document.getElementById('chkbx_pago').checked;

            // 3. Formata os dados conforme o DTO esperado pelo C# Backend
            // Mapeia 'recebimento' -> 'Receber' e 'pagamento' -> 'Pagar'
            const tipoDto = (tipoRaw === 'recebimento') ? "Receber" : "Pagar";
            
            // Converte valor para número flutuante
            const valorDto = parseFloat(valorRaw);

            // Define o status baseado no checkbox ou se a data de pagamento foi preenchida
            let statusDto = "Pendente";
            if (ehPago || dataPagamento) {
                statusDto = "Pago";
            }

            // Monta o objeto JSON
            const dadosTransacao = {
                // pedidoId é 0 para lançamentos manuais diretos no financeiro
                pedidoId: 0, 
                tipo: tipoDto,
                valor: valorDto,
                dataVencimento: dataVencimento,
                // Envia null se a data de pagamento não for preenchida
                dataPagamento: dataPagamento || null, 
                status: statusDto,
                descricao: descricao
            };

            console.log("Enviando dados:", dadosTransacao);

            try {
                // 4. Faz a requisição POST para a API
                const response = await fetch(`${API_BASE_URL}/Financeiro`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // Envia o token JWT no cabeçalho de autorização
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dadosTransacao)
                });

                if (response.ok) {
                    // Sucesso
                    const resultado = await response.json();
                    alert("Transação registrada com sucesso!");
                    // Redireciona de volta para a tela principal do financeiro
                    window.location.href = "./financeiro.html";
                } else {
                    // Erro retornado pela API (400, 401, 500 etc)
                    const erroTexto = await response.text();
                    console.error("Erro da API:", erroTexto);
                    alert(`Falha ao salvar: ${erroTexto || response.statusText}`);
                }
            } catch (error) {
                // Erro de rede ou conexão
                console.error("Erro na requisição fetch:", error);
                alert("Erro ao conectar com o servidor. Verifique sua internet ou tente mais tarde.");
            } finally {
                // Reabilita o botão independente de sucesso ou erro
                btnSalvar.disabled = false;
                btnSalvar.innerText = "Salvar Lançamento";
            }
        }
    </script>
</body>
</html>
