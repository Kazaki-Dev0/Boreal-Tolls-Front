<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Components</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

input {
    background-color: #D9D9D9;
    border: none;
    border-radius: 20px;
    padding: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    color: #F9F9F9;
    background-color: #383838;
    gap: 2px;
}

th, td {
    border: none;
    padding: 12px;
    text-align: left;
}

th {
    background-color: #383838;
    margin: 10px;
}

td {
    background-color: #1f1f1f;
}

    </style>
</head>
<body>

    <div>
        <h2>INPUT PADRÃO</h2>
        <input type="text">
    </div>

   <div>
        <h2>TABLE PADRÃO</h2>
            
        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Título</th>
                    <th>Título</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Exemplo</td>
                    <td>Exemplo</td>
                    <td>Exemplo</td>
                </tr>
                <tr>
                    <td>Exemplo</td>
                    <td>Exemplo</td>
                    <td>Exemplo</td>
                </tr>
            </tbody>
        </table>

        
   </div>
    
</body>
</html>
