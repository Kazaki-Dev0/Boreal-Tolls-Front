<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - ERP</title>
    <style>
        /* RESET BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kedebideri', 'Inter', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* LAYOUT PRINCIPAL */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* PAINEL ESQUERDO (Verde Escuro) */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #031a10 0%, #063b24 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
            text-align: center;
        }

        .left-panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 300px;
        }

        .logo-title {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(135, 255, 185, 0.4),
                         0 0 20px rgba(135, 255, 185, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #a3d9be;
            margin-bottom: 2rem;
        }

        /* PAINEL DIREITO (Formulários) */
        .right-panel {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-container {
            width: 100%;
            max-width: 380px;
            transition: all 0.3s ease;
        }

        #register-section {
            display: none;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
            color: #111;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group input::placeholder {
            color: #a0a0a0;
        }

        .input-group input:focus {
            border-color: #063b24;
            box-shadow: 0 0 0 3px rgba(6, 59, 36, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s ease;
            font-family: inherit;
        }

        .btn-submit:hover {
            background-color: #222222;
        }

        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #666;
        }

        .form-footer a {
            color: #000;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .left-panel {
                padding: 3rem 1rem;
                min-height: 250px;
                flex: none;
            }
            .logo-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="left-panel-content">
                <h1 class="logo-title">BOREAL TOOLS</h1>
            </div>
            <p class="subtitle">Sistema de ERPppppppppppppp</p>
        </div>

        <div class="right-panel">
            
            <div class="form-container" id="login-section">
                <h2 class="form-title">Acessar sua conta</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <input type="email" id="login-email" placeholder="user@mail.com" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-senha" placeholder="Senha" required>
                    </div>
                    <button type="submit" class="btn-submit">Fazer Login</button>
                </form>
                <div class="form-footer">
                    Não possui cadastro? <a onclick="toggleForms()">Registre-se</a>
                </div>
            </div>

            <div class="form-container" id="register-section">
                <h2 class="form-title">Registrar-se</h2>
                <form id="form-registro" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <input type="text" id="reg-nome" placeholder="Nome" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="reg-email" placeholder="user@mail.com" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-senha" placeholder="Senha" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-confirmar-senha" placeholder="Confirme sua senha" required>
                    </div>
                    <button type="submit" class="btn-submit">Registrar</button>
                </form>
                <div class="form-footer">
                    Já possui cadastro? <a onclick="toggleForms()">Faça o login</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Configuração base das URLs da sua API C#
        const apiBaseURL = "http://localhost:5187/api/Auth"; 

        // 1. FUNÇÃO DE LOGIN
        async function handleLogin(event) {
            event.preventDefault(); 
            
            const emailInput = document.getElementById('login-email').value;
            const senhaInput = document.getElementById('login-senha').value;

            try {
                const resposta = await fetch(`${apiBaseURL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: emailInput,
                        senha: senhaInput // Mapeia perfeitamente para o LoginDto do C#
                    })
                });

                if (!resposta.ok) {
                    // Trata o retorno "Unauthorized" da sua API
                    const erroMsg = await resposta.text();
                    alert(erroMsg || "E-mail ou senha incorretos.");
                    return;
                }

                const dados = await resposta.json();

                // Armazena o JWT retornado por GerarTokenJwt()
                if (dados.token) {
                    localStorage.setItem('token', dados.token);
                    window.location.href = "dashboard.html";
                } else {
                    alert("Erro no servidor: Token não encontrado na resposta.");
                }

            } catch (error) {
                console.error("Falha ao comunicar com a API de login:", error);
                alert("Erro ao conectar com o servidor.");
            }
        }

        // 2. FUNÇÃO DE CADASTRO (REGISTRO)
        async function handleRegister(event) {
            event.preventDefault();

            const nomeInput = document.getElementById('reg-nome').value;
            const emailInput = document.getElementById('reg-email').value;
            const senhaInput = document.getElementById('reg-senha').value;
            const confirmarSenhaInput = document.getElementById('reg-confirmar-senha').value;

            // Validação básica no front-end antes de mandar pro back-end
            if (senhaInput !== confirmarSenhaInput) {
                alert("As senhas informadas não coincidem!");
                return;
            }

            try {
                const resposta = await fetch(`${apiBaseURL}/registrar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: nomeInput,
                        email: emailInput,
                        senha: senhaInput // Mapeia para o RegistroDto do C#
                    })
                });

                if (!resposta.ok) {
                    // Captura mensagens como "E-mail já cadastrado." vindas do BadRequest da API
                    const erroMsg = await resposta.text();
                    alert(erroMsg || "Falha ao registrar usuário.");
                    return;
                }

                const dados = await resposta.json();
                alert(dados.message || "Usuário criado com sucesso!");
                
                // Reseta o formulário e joga o usuário de volta para a tela de login
                document.getElementById('form-registro').reset();
                toggleForms();

            } catch (error) {
                console.error("Falha ao comunicar com a API de registro:", error);
                alert("Erro ao conectar com o servidor.");
            }
        }

        // 3. ALTERNADOR DE TELAS (LOGIN / REGISTRO)
        function toggleForms() {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');

            if (loginSection.style.display === 'none') {
                loginSection.style.display = 'block';
                registerSection.style.display = 'none';
            } else {
                loginSection.style.display = 'none';
                registerSection.style.display = 'block';
            }
        }
    </script>

</body>
</html>
