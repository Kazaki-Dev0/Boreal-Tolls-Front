<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - ERP</title>
    <style>
        /* RESET BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kedebideri', 'Inter', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* LAYOUT PRINCIPAL */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* PAINEL ESQUERDO (Verde Escuro) */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #031a10 0%, #063b24 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
            text-align: center;
        }

        .left-panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-title {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #d1ffe3;
            text-shadow: 0 0 10px rgba(135, 255, 185, 0.4),
                         0 0 20px rgba(135, 255, 185, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #a3d9be;
            margin-bottom: 2rem;
        }

        /* PAINEL DIREITO (Formulários) */
        .right-panel {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-container {
            width: 100%;
            max-width: 380px;
            transition: all 0.3s ease;
        }

        #register-section {
            display: none;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
            color: #111;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group input::placeholder {
            color: #a0a0a0;
        }

        .input-group input:focus {
            border-color: #063b24;
            box-shadow: 0 0 0 3px rgba(6, 59, 36, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s ease;
            font-family: inherit;
        }

        .btn-submit:hover {
            background-color: #222222;
        }

        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #666;
        }

        .form-footer a {
            color: #000;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .left-panel {
                padding: 3rem 1rem;
                min-height: 250px;
                flex: none;
            }
            .logo-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="left-panel-content">
                <h1 class="logo-title">BOREAL TOOLS</h1>
            </div>
            <p class="subtitle">Sistema de ERP</p>
        </div>

        <div class="right-panel">
            
            <div class="form-container" id="login-section">
    <h2 class="form-title">Acessar sua conta</h2>
    <form onsubmit="handleLogin(event)">
        <div class="input-group">
            <input type="email" placeholder="user@mail.com" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="Senha" required>
        </div>
        <button type="submit" class="btn-submit">Fazer Login</button>
    </form>
    <div class="form-footer">
        Não possui cadastro? <a onclick="toggleForms()">Registre-se</a>
    </div>
</div>

            <div class="form-container" id="register-section">
                <h2 class="form-title">Registrar-se</h2>
                <form onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <input type="text" placeholder="Nome" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="user@mail.com" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Senha" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Confirme sua senha" required>
                    </div>
                    <button type="submit" class="btn-submit">Registrar</button>
                </form>
                <div class="form-footer">
                    Já possui cadastro? <a onclick="toggleForms()">Faça o login</a>
                </div>
            </div>

        </div>
    </div>

   <script>
    
    function handleLogin(event) {
        event.preventDefault(); 
        
        // Aqui você futuramente adicionará a lógica de validação da API
        // Por enquanto, apenas redirecionamos:
        window.location.href = "dashboard.html";
    }

    function toggleForms() {
        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');

        if (loginSection.style.display === 'none') {
            loginSection.style.display = 'block';
            registerSection.style.display = 'none';
        } else {
            loginSection.style.display = 'none';
            registerSection.style.display = 'block';
        }
    }
</script>

</body>
</html>
