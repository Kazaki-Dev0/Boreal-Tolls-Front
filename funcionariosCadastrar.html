<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Novo Funcionáro</title>
    <link rel="stylesheet" href="sidebar.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #0a0a0a; /* Fundo bem escuro */
    background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
    color: white;
    display: flex;
    height: 100%;
}

a {
    color: inherit;
    text-decoration: none;
}


/* Destaque para a página atual (Funcionários) */
.secoes:nth-child(6) {
    background-color: #2e4a3e;
}

/* Main Content Area */
main {
    padding: 40px;
    overflow-y: auto;
}

/* O "Quadro" centralizado com borda brilhante */
main {
    border: 1px solid #2e4a3e;
    width: 70%;
    border-radius: 20px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 25px rgba(3, 255, 15, 0.5);
    margin: 10%;
}

.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.titulo h2 {
    font-size: 1.8rem;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    
}

.titulo p {
    color: #888;
    margin-bottom: 25px;
}

.atalhos-main {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-bottom: 30px;
}

.atalhos-main input {
    background: transparent;
    border: 1px solid #444;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    width: 250px;
}

.atalhos-main button {
    background-color: #5e5e5e;
    color: whitesmoke;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.atalhos-main button:hover {
    background-color: #333;
}

form {
    background-color: #333;
    padding: 32px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    
}

.inputs-cad {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 10px;
}

.input-divs {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.input-divs input {
    height: 32px;
    border-radius: 12px;
}

label img {
    width: 20px;
    height: 20px;
}

label {
    display: flex;
    align-items: center;
    gap: 8px;
}

#cadastrarFuncionario {
    background-color: #80B297;
    padding: 10px;
    border: none;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: whitesmoke;
}

#cadastrarFuncionario:hover{
    background-color: #81c784;
}
    </style>
</head>
<body>

    <section class="side-bar">
        <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
        </div>
        
        <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
        </div> 
        
        <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active" href="./produtos.html" >
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="produtos.html">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
        </nav>

        <div class="logout-link">
            <a href="./login.html">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="main-header">
            <div class="titulo">
                <h2><img src="./img/mala.png" alt=""> Novo Funcionário</h2>
                <p>Gerencie a equipe, cargos, salários e horas extras.</p>
            </div>
            <div class="atalhos-main">
                <a href="funcionarios.html"><button>← Voltar à Equipe</button></a>
            </div>
        </div>
        <form id="formFuncionario">
            <div class="inputs-cad">
                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt="">Nome Completo</label>
                    <input type="text" id="nome">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> RG</label>
                    <input type="number" id="rg">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> CPF</label>
                    <input type="number" id="cpf">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/tel-cad-func.png" alt=""> Telefone</label>
                    <input type="number" id="telefone">
                </div>

                <div class="input-divs"> 
                    <label for=""><img src="./img/email-cad-func.png" alt=""> Email</label>
                    <input type="email" id="email">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/data-cad-func.png" alt=""> Data de Nascimento</label>
                    <input type="date" id="dataNascimento">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> Departamento</label>
                    <input type="text" id="departamento">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> Cargo/Função</label>
                    <input type="text" id="cargo">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/sifrao-cad-func.png" alt=""> Salário Base (R$)</label>
                    <input type="number" id="salario">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> CEP</label>
                    <input type="number" id="cep">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Rua</label>
                    <input type="text" id="rua">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Bairro</label>
                    <input type="text" id="bairro">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Cidade</label>
                    <input type="text" id="cidade">
                </div>

                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Estado</label>
                    <input type="text" id="estado">
                </div>
                
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Complemento</label>
                    <input type="text" id="complemento">
                </div>
            </div>
            <button type="submit" id="cadastrarFuncionario">Cadastrar Funcionário</button>
        </form>
    </main>

    <script src="funcionariosCadastrar.js"></script>
</body>
</html>
