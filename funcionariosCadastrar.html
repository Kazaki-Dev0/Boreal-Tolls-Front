<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Novo Funcionário</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            display: flex;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Padronização da Barra Lateral */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px; 
            width: 260px;
            flex-shrink: 0;
        }

        .secoes:nth-child(6) {
            background-color: #2e4a3e;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px; 
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Painel de Conteúdo Principal */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: calc(100vw - 260px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
            border-radius: 20px;
            padding: 35px;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .titulo h2 {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .titulo h2 img {
            width: 28px;
            height: 28px;
        }

        .titulo p {
            color: #6da381;
            font-size: 0.85rem;
        }

        .atalhos-main button {
            background-color: #2e4a3e;
            color: whitesmoke;
            border: 1px solid #4a5a50;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .atalhos-main button:hover {
            background-color: #23332b;
            border-color: #7bcf9c;
        }

        form {
            background-color: rgba(15, 15, 15, 0.6);
            border: 1px solid #23332b;
            padding: 30px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 25px; 
        }

        .inputs-cad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .input-divs {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #b2c7bc;
        }

        label img {
            width: 16px;
            height: 16px;
            opacity: 0.8;
        }

        .input-divs input {
            height: 38px;
            border-radius: 8px;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid #3d5246;
            color: white;
            padding: 0 12px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-divs input:focus {
            border-color: #7bcf9c;
        }

        /* Remove as setas padrão do input numérico */
        .input-divs input[type=number]::-webkit-inner-spin-button, 
        .input-divs input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        #cadastrarFuncionario {
            background-color: #80B297;
            padding: 12px;
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        #cadastrarFuncionario:hover{
            background-color: #81c784;
        }

        @media(max-width: 950px) {
            body { flex-direction: column; }
            .side-bar { display: none; }
            main { max-width: 100vw; padding: 20px; }
            .inputs-cad { grid-template-columns: repeat(2, 1fr); }
        }

        @media(max-width: 600px) {
            .inputs-cad { grid-template-columns: 1fr; }
            .main-header { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>

    <section class="side-bar">
        <div>
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
            
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p id="nomeUsuarioSidebar">Carregando...</p>
            </div> 
            
            <nav class="nav-side-bar">
                <div class="secoes"><img src="./img/inicio.sidebar.png" class="secao-icon"><a href="dashboard.html">Início</a></div>
                <div class="secoes"><img src="./img/produtos.png" class="secao-icon"><a href="produtos.html">Produtos</a></div>
                <div class="secoes"><img src="./img/estoque.png" class="secao-icon"><a href="./estoque.html">Estoques</a></div>
                <div class="secoes"><img src="./img/financeiro.png" class="secao-icon"><a href="./financeiro.html">Financeiro</a></div>
                <div class="secoes"><img src="./img/vendas.png" class="secao-icon"><a href="vendas.html">Vendas</a></div>
                <div class="secoes active"><img src="./img/funcionarios.png" class="secao-icon"><a href="./funcionarios.html">Funcionários</a></div>
                <div class="secoes"><img src="./img/clientes.png" class="secao-icon"><a href="./ClienteFornecedor.html">Clientes e Fornecedores</a></div>
                <div class="secoes"><img src="./img/relatorios.png" class="secao-icon"><a href="./categorias.html">Categorias</a></div>
            </nav>
        </div>

        <div class="logout-link">
            <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="main-container">
            <div class="main-header">
                <div class="titulo">
                    <h2><img src="./img/mala.png" alt=""> Novo Funcionário</h2>
                    <p>Insira as credenciais e dados cadastrais da nova contratação.</p>
                </div>
                <div class="atalhos-main">
                    <a href="funcionarios.html"><button>← Voltar à Equipe</button></a>
                </div>
            </div>

            <form id="formFuncionario">
                <div class="inputs-cad">
                    <div class="input-divs">
                        <label for="nome"><img src="./img/inf-pessoais-cad-func.png" alt="">Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>

                    <div class="input-divs">
                        <label for="rg"><img src="./img/inf-pessoais-cad-func.png" alt=""> RG</label>
                        <input type="text" id="rg" required>
                    </div>

                    <div class="input-divs">
                        <label for="cpf"><img src="./img/inf-pessoais-cad-func.png" alt=""> CPF</label>
                        <input type="text" id="cpf" required>
                    </div>

                    <div class="input-divs">
                        <label for="telefone"><img src="./img/tel-cad-func.png" alt=""> Telefone</label>
                        <input type="text" id="telefone">
                    </div>

                    <div class="input-divs"> 
                        <label for="email"><img src="./img/email-cad-func.png" alt=""> Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="input-divs">
                        <label for="dataNascimento"><img src="./img/data-cad-func.png" alt=""> Data de Nascimento</label>
                        <input type="date" id="dataNascimento" required>
                    </div>

                    <div class="input-divs">
                        <label for="departamento"><img src="./img/inf-pessoais-cad-func.png" alt=""> Departamento</label>
                        <input type="text" id="departamento">
                    </div>

                    <div class="input-divs">
                        <label for="cargo"><img src="./img/inf-pessoais-cad-func.png" alt=""> Cargo/Função</label>
                        <input type="text" id="cargo" required>
                    </div>

                    <div class="input-divs">
                        <label for="salario"><img src="./img/sifrao-cad-func.png" alt=""> Salário Base (R$)</label>
                        <input type="number" step="0.01" id="salario" required>
                    </div>

                    <div class="input-divs">
                        <label for="cep"><img src="./img/ender-cad-func.png" alt=""> CEP</label>
                        <input type="text" id="cep">
                    </div>

                    <div class="input-divs">
                        <label for="rua"><img src="./img/ender-cad-func.png" alt=""> Rua</label>
                        <input type="text" id="rua">
                    </div>

                    <div class="input-divs">
                        <label for="bairro"><img src="./img/ender-cad-func.png" alt=""> Bairro</label>
                        <input type="text" id="bairro">
                    </div>

                    <div class="input-divs">
                        <label for="cidade"><img src="./img/ender-cad-func.png" alt=""> Cidade</label>
                        <input type="text" id="cidade">
                    </div>

                    <div class="input-divs">
                        <label for="estado"><img src="./img/ender-cad-func.png" alt=""> Estado</label>
                        <input type="text" id="estado">
                    </div>
                    
                    <div class="input-divs">
                        <label for="complemento"><img src="./img/ender-cad-func.png" alt=""> Complemento</label>
                        <input type="text" id="complemento">
                    </div>
                </div>
                <button type="submit" id="cadastrarFuncionario">Confirmar e Cadastrar</button>
            </form>
        </div>
    </main>

    <script src="funcionariosCadastrar.js"></script>
</body>
</html>
