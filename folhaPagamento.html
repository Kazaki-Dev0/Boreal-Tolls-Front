<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Holerite</title>
    <link rel="stylesheet" href="folhaPagamento.css">
</head>
<body>
    <header>
        
    </header>

    <section class="side-bar">
        <img src="./img/LogoBorealTools.png" alt="" class="logo">
        <div class="perfil">
            <img src="./img/perfil-icon.png" alt="">
            <p>Fulano de Tal</p>
        </div>
        <div class="nav-side-bar">
            <div class="secoes">
                <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                <a href="">Início</a>
            </div>
            <div class="secoes">
                <img src="./img/produtos.png" alt="" class="secao-icon">
                <a href="">Produtos</a>
            </div>
            <div class="secoes">
                <img src="./img/estoque.png" alt="" class="secao-icon">
                <a href="">Estoques</a>
            </div>
            <div class="secoes">
                <img src="./img/financeiro.png" alt="" class="secao-icon">
                <a href="">Financeiro</a>
            </div>
            <div class="secoes">
                <img src="./img/vendas.png" alt="" class="secao-icon">
                <a href="">Vendas</a>
            </div>
            <div class="secoes">
                <img src="./img/funcionarios.png" alt="" class="secao-icon"> 
                <a href="">Funcionários</a>
            </div>
            <div class="secoes">
                <img src="./img/relatorios.png" alt="" class="secao-icon">
                <a href="">Relatórios</a>
            </div>
            <div class="secoes">
                <img src="./img/clientes.png" alt="" class="secao-icon">
                <a href="">Clientes</a>
            </div>
        </div>
        <a href="">← Deslogar</a>
    </section>

    <main>
        <div class="main-header">
            <div class="titulo">
                <h2><img src="./img/RH-Icon.png" alt=""> Recursos Humanos (Holerite) </h2>
                <p>Gerencie a equipe, cargos, salários e horas extras.</p>
            </div>
            <div class="atalhos-main">
                <a href="funcionarios.html"><button>← Voltar à Equipe</button></a>
            </div>
        </div>
        <div class="containt">
            <div class="left">
                <div class="proventos">
                    <h5>Proventos (+)</h5>
                    <div class="input-provento">
                        <label for="">Salário Base</label>
                        <input type="number" placeholder="0.00">
                    </div>
                    <div class="input-provento">
                        <label for="">Outros (Horas Extras, Bônus)</label>
                        <input type="number" placeholder="0.00">
                    </div>
                </div>
                <div class="descontos">
                    <h5>Descontos (-)</h5>
                    <div class="descontosInputs">
                        <div class="input-desconto">
                            <label for="">INSS</label>
                            <input type="number" placeholder="0.00">
                        </div>
                        <div class="input-desconto">
                            <label for="">IRRF</label>
                            <input type="number" placeholder="0.00">
                        </div>
                        <div class="input-desconto">
                            <label for="">Benefícios (Vt/Vr)</label>
                            <input type="number" placeholder="0.00">
                        </div>
                        <div class="input-desconto">
                            <label for="">Outros (Faltas)</label>
                            <input type="number" placeholder="0.00">
                        </div>
                    </div>
                </div>
            </div>
            <div class="right">
                <div class="up">
                    <div class="select">
                        <label for="">Selecione o funcionário</label>
                        <select name="funcionario" id="funcionario">
                
                        </select>
                    </div>
                    <h5>Resumo da Folha</h5>
                    <table>
                        <tbody>
                            <tr>
                                <td>Total de Proventos:</td>
                                <td>R$ 0,00</td>
                            </tr>
                            <tr>
                                <td>Total de Descontos:</td>
                                <td>- R$ 0,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
