<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Venda</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #0a0a0a; 
    background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
    color: white;
    display: grid;
    grid-template-columns: 400px 1fr;
    height: 100%;
}

a {
    color: inherit;
    text-decoration: none;
}

/* Sidebar */
.side-bar {
    background-color: #222;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 30px;
    border-right: 1px solid #222;
    height: 100vh;
}

.logo {width: auto;}

.perfil {text-align: center;}

.perfil p {font-size: 24px;}

.perfil img {
    width: 80px;
    background: #c8e6c9;
    border-radius: 50%;
    margin-bottom: 10px;
}

.nav-side-bar {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.secoes {
    background-color: #0a0a0a;
    display: flex;
    align-items: center;
    padding: 10px;
    border-radius: 8px;
    transition: 0.3s;
    gap: 10%;
    cursor: pointer;
}

.secoes:hover {background: rgba(255, 255, 255, 0.05);}

.secoes:nth-child(5) {background-color: #2e4a3e;}

.secoes a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
}

main {
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 25px rgba(3, 255, 15, 0.5);
    border: 1px solid #2e4a3e;
    border-radius: 20px;
    width: 0%;
    padding: 4%;
    margin: 10%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.titulo h2 {
    font-size: 1.8rem;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
}

.titulo p {
    color: #888;
    margin-bottom: 25px;
}

.atalhos-main {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-bottom: 30px;
}

.atalhos-main button {
    background-color: #5e5e5e;
    color: whitesmoke;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.atalhos-main button:hover {background-color: #333;}

.venda-container {
    background-color: #2c2a29;
    border-radius: 25px;
    padding: 30px;
    width: fit-content;
    color: white;
    font-family: sans-serif;
}

.venda-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    padding-bottom: 25px;
    border-bottom: 1px solid #444;
}

.input-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #a5d6a7;
    margin-bottom: 10px;
    font-weight: bold;
}

.input-group select, .input-group input {
    background-color: #d1d1d1;
    border: none;
    padding: 12px 20px;
    border-radius: 50px;
    width: 100%;
}

.venda-produtos {padding: 20px 0;}

.venda-produtos h5 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}

h5 img {
    height: 32px;
    width: 32px;
}

.add-row {
    background-color: #383635;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    align-items: flex-end;
    gap: 15px;
}

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 0.7rem; font-weight: bold; padding-left: 10px; }
.field select, .field input { 
    background-color: #d1d1d1; 
    border: none; 
    padding: 8px 15px; 
    border-radius: 50px; 
}

.field.qty { width: 80px; }
.field.price { width: 100px; }

.btn-add {
    background-color: #555;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.carrinho-vazio {
    background-color: #333130;
    margin-top: 20px;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #888;
}

.carrinho-vazio img { width: 40px; margin-bottom: 10px; opacity: 0.5; }
.carrinho-vazio p { color: white; font-weight: bold; margin-bottom: 5px; }

.venda-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid #444;
}

.total-venda h3 { font-size: 1.8rem; margin-top: 5px; }

.acoes { display: flex; gap: 20px; align-items: center; }
.btn-cancelar { background: none; border: none; color: white; cursor: pointer; }
.btn-finalizar {
    background-color: #80B297;
    color: whitesmoke;
    border: none;
    padding: 12px 25px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
}

    </style>
</head>
<body>
    <section class="side-bar">
        <img src="./img/LogoBorealTools.png" alt="" class="logo">
        <div class="perfil">
            <img src="./img/perfil-icon.png" alt="">
            <p>Fulano de Tal</p>
        </div>
        <div class="nav-side-bar">
            <div class="secoes">
                <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                <a href="dashboard.html">Início</a>
            </div>
            <div class="secoes">
                <img src="./img/produtos.png" alt="" class="secao-icon">
                <a href="produtos.html">Produtos</a>
            </div>
            <div class="secoes">
                <img src="./img/estoque.png" alt="" class="secao-icon">
                <a href="./estoque.html">Estoques</a>
            </div>
            <div class="secoes">
                <img src="./img/financeiro.png" alt="" class="secao-icon">
                <a href="./financeiro.html">Financeiro</a>
            </div>
            <div class="secoes">
                <img src="./img/vendas.png" alt="" class="secao-icon">
                <a href="vendas.html">Vendas</a>
            </div>
            <div class="secoes">
                <img src="./img/funcionarios.png" alt="" class="secao-icon"> 
                <a href="./funcionarios.html">Funcionários</a>
            </div>
            <div class="secoes">
                <img src="./img/clientes.png" alt="" class="secao-icon">
                <a href="ClienteFornecedor.html">Clientes</a>
            </div>
        </div>
        <a href="login.html">← Deslogar</a>
    </section>

    <main>
        <div class="main-header">
            <div class="titulo">
                <h2><img src="./img/vendas-grande.png" alt=""> Nova Venda</h2>
                <p>Acompanhe pedidos, itens vendidos e faturamento.</p>
            </div>
            <div class="atalhos-main">
                <a href="vendas.html"><button>← Voltar aos Pedidos</button></a>
            </div>
        </div>
        <section class="venda-container">
            <div class="venda-header">
                <div class="input-group">
                    <label><img src="./img/inf-pessoais-cad-func.png"> Selecionar Cliente</label>
                    <select><option>Selecione...</option></select>
                </div>
                <div class="input-group">
                    <label><img src="./img/data-cad-func.png"> Data da Venda</label>
                    <input type="date">
                </div>
            </div>

            <div class="venda-produtos">
                <h5><img src="img/produtos.png"> Adicionar Produtos</h5>
                
                <div class="add-row">
                    <div class="field">
                        <label>PRODUTO</label>
                        <select><option>Selecione...</option></select>
                    </div>
                    <div class="field qty">
                        <label>QTD.</label>
                        <input type="number" value="1">
                    </div>
                    <div class="field price">
                        <label>PREÇO UN.</label>
                        <input type="text" placeholder="0.00">
                    </div>
                    <button class="btn-add">+ Add</button>
                </div>

                <div class="carrinho-vazio">
                    <img src="./img/vendas.png" alt="Carrinho">
                    <p>Nenhum produto adicionado ao carrinho.</p>
                    <span>Selecione e clique em "Add" acima.</span>
                </div>
            </div>

            <div class="venda-footer">
                <div class="total-venda">
                    <span>Total:</span>
                    <h3>R$ 0,00</h3>
                </div>
                <div class="acoes">
                    <button class="btn-cancelar">Cancelar</button>
                    <button class="btn-finalizar">Finalizar Venda</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
