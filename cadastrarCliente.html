<!DOCTYPE html>
<html lang="pt-br">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Cadastrar Cliente / Fornecedor</title>

    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ========================= SIDEBAR ========================= */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px;
            width: 260px;
            flex-shrink: 0;
        }

        .secoes:nth-child(7) {
            background-color: #2e4a3e;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px;
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========================= MAIN ========================= */
        main {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .main-panel {
            width: 100%;
            max-width: 1000px;
            border-radius: 20px;
            padding: 36px;
            margin: 0 auto 20px auto;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
        }

        /* ========================= HEADER ========================= */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
        }

        .titulo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .titulo i {
            font-size: 1.4rem;
            color: #7bcf9c;
        }

        .titulo-text h2 {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .titulo-text p {
            color: #6da381;
            font-size: 0.82rem;
            margin-top: 3px;
        }

        .btn-back {
            background-color: #2a2a2a;
            color: #bbb;
            border: 1px solid #444;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-back:hover {
            background-color: #333;
            color: #fff;
        }

        /* ========================= FORMULÁRIO ========================= */
        .form-card {
            background: rgba(15, 15, 15, 0.65);
            border: 1px solid #252525;
            border-radius: 14px;
            padding: 28px;
        }

        .form-card-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #9bcfb0;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-card-label i {
            font-size: 0.85rem;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .input-div {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-div label {
            font-size: 0.82rem;
            color: #6da381;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-div input,
        .input-div select {
            height: 38px;
            background-color: #111;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 0 12px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-div input:focus,
        .input-div select:focus {
            border-color: #7bcf9c;
        }

        .input-div input::placeholder {
            color: #555;
        }

        .input-div select option {
            background: #111;
        }

        /* Campo Data de Nascimento */
        .data-nasc-group {
            transition: opacity 0.2s;
        }

        .data-nasc-group.hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* ========================= BOTÃO SUBMIT ========================= */
        #btnFinalizar {
            margin-top: 22px;
            width: 100%;
            background-color: #7bcf9c;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.25s;
        }

        #btnFinalizar:hover {
            background-color: #81c784;
        }

        /* ========================= RESPONSIVO ========================= */
        @media(max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }

            .side-bar {
                display: none;
            }

            main {
                max-width: 100vw;
            }

            .inputs-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media(max-width: 600px) {
            .inputs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="main-wrapper">

        <section class="side-bar">
            <div>
                <div class="sidebar-header">
                    <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
                </div>

                <div class="perfil">
                    <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                    <p id="nomeUsuarioSidebar">Carregando...</p>
                </div>

                <nav class="nav-side-bar">
                    <div class="secoes"><img src="./img/inicio.sidebar.png" class="secao-icon"><a
                            href="dashboard.html">Início</a></div>
                    <div class="secoes"><img src="./img/produtos.png" class="secao-icon"><a
                            href="produtos.html">Produtos</a></div>
                    <div class="secoes"><img src="./img/estoque.png" class="secao-icon"><a
                            href="./estoque.html">Estoques</a></div>
                    <div class="secoes"><img src="./img/financeiro.png" class="secao-icon"><a
                            href="./financeiro.html">Financeiro</a></div>
                    <div class="secoes"><img src="./img/vendas.png" class="secao-icon"><a href="vendas.html">Vendas</a>
                    </div>
                    <div class="secoes"><img src="./img/funcionarios.png" class="secao-icon"><a
                            href="./funcionarios.html">Funcionários</a></div>
                    <div class="secoes active"><img src="./img/clientes.png" class="secao-icon"><a
                            href="./ClienteFornecedor.html">Clientes e Fornecedores</a></div>
                    <div class="secoes"><img src="./img/relatorios.png" class="secao-icon"><a
                            href="./categorias.html">Categorias</a></div>
                </nav>
            </div>

            <div class="logout-link">
                <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
            </div>
        </section>

        <main>
            <div class="main-panel">

                <div class="main-header">
                    <div class="titulo">
                        <i class="fa-solid fa-user-plus"></i>
                        <div class="titulo-text">
                            <h2 id="tituloPagina">Novo Cliente</h2>
                            <p>Gerencie sua base de clientes e acompanhe informações detalhadas.</p>
                        </div>
                    </div>
                    <a href="ClienteFornecedor.html">
                        <button class="btn-back">← Voltar</button>
                    </a>
                </div>

                <form id="clienteForm">
                    <div class="form-card">
                        <div class="form-card-label">
                            <i class="fa-solid fa-chevron-down"></i>
                            <span id="formCardLabel">Cliente</span>
                        </div>

                        <div class="inputs-grid">

                            <div class="input-div">
                                <label for="tipo"><i class="fa-solid fa-tag"></i> Tipo</label>
                                <select id="tipo" onchange="atualizarTipo()">
                                    <option value="cliente">Cliente</option>
                                    <option value="fornecedor">Fornecedor</option>
                                </select>
                            </div>

                            <div class="input-div">
                                <label for="Nome"><i class="fa-solid fa-user"></i> Nome completo</label>
                                <input type="text" id="Nome" placeholder="Ex: Neymar da Silva Santos" required>
                            </div>

                            <div class="input-div">
                                <label for="CPF" id="labelDoc"><i class="fa-solid fa-id-card"></i> CPF/CNPJ</label>
                                <input type="text" id="CPF" placeholder="000.000.000-00">
                            </div>

                            <div class="input-div">
                                <label for="Telefone"><i class="fa-solid fa-phone"></i> Telefone</label>
                                <input type="text" id="Telefone" placeholder="(00) 00000-0000">
                            </div>

                            <div class="input-div">
                                <label for="Email"><i class="fa-solid fa-envelope"></i> Email</label>
                                <input type="email" id="Email" placeholder="exemplo@email.com">
                            </div>

                            <div class="input-div data-nasc-group" id="dataNascimentoGroup">
                                <label for="DataNascimento"><i class="fa-solid fa-calendar"></i> Data de
                                    Nascimento</label>
                                <input type="date" id="DataNascimento">
                            </div>

                            <div class="input-div">
                                <label for="CEP"><i class="fa-solid fa-location-dot"></i> CEP</label>
                                <input type="text" id="CEP" placeholder="00000-000">
                            </div>

                            <div class="input-div">
                                <label for="Cidade"><i class="fa-solid fa-city"></i> Cidade</label>
                                <input type="text" id="Cidade" placeholder="Marília">
                            </div>

                            <div class="input-div">
                                <label for="Rua"><i class="fa-solid fa-road"></i> Rua</label>
                                <input type="text" id="Rua" placeholder="Av. Sampaio Vidal">
                            </div>

                            <div class="input-div">
                                <label for="Bairro"><i class="fa-solid fa-map"></i> Bairro</label>
                                <input type="text" id="Bairro" placeholder="Centro">
                            </div>

                            <div class="input-div">
                                <label for="Numero"><i class="fa-solid fa-hashtag"></i> Nº Residência</label>
                                <input type="text" id="Numero" placeholder="0000">
                            </div>

                            <div class="input-div">
                                <label for="Estado"><i class="fa-solid fa-map-location-dot"></i> Estado</label>
                                <input type="text" id="Estado" placeholder="São Paulo">
                            </div>

                            <div class="input-div">
                                <label for="Complemento"><i class="fa-solid fa-circle-info"></i> Complemento</label>
                                <input type="text" id="Complemento" placeholder="Ex: Sala 4 / Bloco B">
                            </div>

                        </div>
                    </div>

                    <button type="submit" id="btnFinalizar">Finalizar Cadastro</button>
                </form>

            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:5187/api/Categorias";
        const token = localStorage.getItem("token") || sessionStorage.getItem("token");

        /* ========================= AUTH ========================= */
        function parseJwt(t) {
            try {
                const b64 = t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(window.atob(b64).split('').map(c =>
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            } catch (e) { return null; }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            if (!token) { efetuarLogout(); return; }

            const payloadJwt = parseJwt(token);
            if (payloadJwt) {
                document.getElementById("nomeUsuarioSidebar").innerText =
                    payloadJwt["unique_name"] || payloadJwt["name"] ||
                    payloadJwt["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] ||
                    "Usuário Boreal";
            }

            document.getElementById("clienteForm").addEventListener("submit", salvarRegistro);

            // VERIFICA SE ESTÁ NO MODO EDIÇÃO
            const idEdicao = localStorage.getItem('idEdicao');
            const tipoEdicao = localStorage.getItem('tipoEdicao');

            if (idEdicao) {
                document.getElementById('tituloPagina').innerText = 'Editar Registro';
                document.getElementById('btnFinalizar').innerText = 'Salvar Alterações';

                try {
                    const response = await fetch(`${API_URL}/${idEdicao}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const dados = await response.json();

                        let tipoFinal = 'cliente';
                        if (dados.tipoVinculo !== undefined && dados.tipoVinculo !== null) {
                            const tvStr = dados.tipoVinculo.toString().toLowerCase();
                            // Valida se veio número '2' ou strings correspondentes
                            if (tvStr === 'fornecedor' || tvStr === '2' || tvStr === 'fornecedores') {
                                tipoFinal = 'fornecedor';
                            }
                        } else if (tipoEdicao) {
                            tipoFinal = tipoEdicao.toLowerCase();
                        }
                        
                        document.getElementById('tipo').value = tipoFinal;

                        document.getElementById('Nome').value = dados.nome || '';
                        document.getElementById('Telefone').value = dados.telefone || '';
                        document.getElementById('Email').value = dados.email || '';
                        document.getElementById('CEP').value = dados.cep || '';
                        document.getElementById('Cidade').value = dados.cidade || '';
                        document.getElementById('Rua').value = dados.rua || '';
                        document.getElementById('Bairro').value = dados.bairro || '';
                        document.getElementById('Numero').value = dados.numero || '';
                        document.getElementById('Estado').value = dados.estado || '';
                        document.getElementById('Complemento').value = dados.complemento || '';

                        if (tipoFinal === 'fornecedor') {
                            document.getElementById('CPF').value = dados.cnpj || dados.cpf || '';
                        } else {
                            document.getElementById('CPF').value = dados.cpf || '';
                            if (dados.dataNascimento && !dados.dataNascimento.startsWith("1900-01-01")) {
                                document.getElementById('DataNascimento').value = dados.dataNascimento.split('T')[0];
                            }
                        }

                        atualizarTipo();
                    } else {
                        console.error("Erro na API ao carregar dados antigos. Status:", response.status);
                        alert("Não foi possível carregar os dados anteriores para edição.");
                    }
                } catch (error) {
                    console.error("Erro de comunicação ao recuperar registro:", error);
                }
            }
        });

        /* ========================= ALTERNAR TIPO ========================= */
        function atualizarTipo() {
            const tipo = document.getElementById("tipo").value;
            const isFornecedor = tipo === "fornecedor";

            const dnGroup = document.getElementById("dataNascimentoGroup");
            if (dnGroup) {
                dnGroup.classList.toggle("hidden", isFornecedor);
            }

            document.getElementById("labelDoc").innerHTML =
                `<i class="fa-solid fa-id-card"></i> ${isFornecedor ? "CNPJ" : "CPF/CNPJ"}`;
            document.getElementById("CPF").placeholder = isFornecedor ? "00.000.000/0000-00" : "000.000.000-00";

            const idEdicao = localStorage.getItem('idEdicao');
            if (idEdicao) {
                document.getElementById("tituloPagina").innerText = isFornecedor ? "Editar Fornecedor" : "Editar Cliente";
            } else {
                document.getElementById("tituloPagina").innerText = isFornecedor ? "Novo Fornecedor" : "Novo Cliente";
            }
            document.getElementById("formCardLabel").innerText = isFornecedor ? "Fornecedor" : "Cliente";
        }

        /* ========================= SALVAR (CADASTRAR OU ATUALIZAR) ========================= */
        async function salvarRegistro(event) {
            event.preventDefault();

            const idEdicao = localStorage.getItem('idEdicao');
            const selectTipoValue = document.getElementById("tipo").value;
            const isFornecedor = selectTipoValue === "fornecedor";

            // 🌟 MODO DE TESTE AUTOMÁTICO DO TIPO VÍNCULO 🌟
            // Altere o número abaixo de 1 para 2 ou 3 caso continue salvando incorreto:
            const MODO_ENVIO = 1; 

            let valorTipoVinculo;
            if (MODO_ENVIO === 1) {
                // Opção 1: Envia como número inteiro (Enum C# clássico: 1=Cliente, 2=Fornecedor)
                valorTipoVinculo = isFornecedor ? 2 : 1; 
            } else if (MODO_ENVIO === 2) {
                // Opção 2: String capitalizada (Padrão de banco de dados estruturado)
                valorTipoVinculo = isFornecedor ? "Fornecedor" : "Cliente";
            } else {
                // Opção 3: String inteiramente em minúsculo
                valorTipoVinculo = isFornecedor ? "fornecedor" : "cliente";
            }

            const payload = {
                tipoVinculo: valorTipoVinculo,
                nome: document.getElementById("Nome").value.trim(),
                cpf: !isFornecedor ? (document.getElementById("CPF").value.trim() || null) : null,
                cnpj: isFornecedor ? (document.getElementById("CPF").value.trim() || null) : null,
                telefone: document.getElementById("Telefone").value.trim() || null,
                email: document.getElementById("Email").value.trim() || null,
                dataNascimento: (!isFornecedor && document.getElementById("DataNascimento").value)
                    ? document.getElementById("DataNascimento").value
                    : "1900-01-01",
                cep: document.getElementById("CEP").value.trim() || null,
                cidade: document.getElementById("Cidade").value.trim() || null,
                rua: document.getElementById("Rua").value.trim() || null,
                bairro: document.getElementById("Bairro").value.trim() || null,
                numero: document.getElementById("Numero").value.trim() || null,
                estado: document.getElementById("Estado").value.trim() || null,
                complemento: document.getElementById("Complemento").value.trim() || null
            };

            if (!payload.nome) {
                alert("O campo Nome é obrigatório.");
                return;
            }

            let url = API_URL;
            let method = "POST";

            if (idEdicao) {
                method = "PUT";
                url = `${API_URL}/${idEdicao}`;
                payload.id = parseInt(idEdicao);
            }

            const btnFinalizar = document.getElementById("btnFinalizar");
            btnFinalizar.disabled = true;
            btnFinalizar.innerText = "Salvando...";

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const msg = await res.text();
                    throw new Error(msg || `Erro ${res.status}`);
                }

                alert(idEdicao ? "Alterações salvas com sucesso!" : "Registro cadastrado com sucesso!");

                localStorage.removeItem('idEdicao');
                localStorage.removeItem('tipoEdicao');

                window.location.href = "ClienteFornecedor.html";

            } catch (err) {
                console.error("Erro na requisição à API:", err);
                alert("Erro ao salvar: " + err.message);
                btnFinalizar.disabled = false;
                btnFinalizar.innerText = idEdicao ? "Salvar Alterações" : "Finalizar Cadastro";
            }
        }

        function efetuarLogout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace("./index.html");
        }
    </script>
</body>

</html>
