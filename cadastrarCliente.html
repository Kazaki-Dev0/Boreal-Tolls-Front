<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Dashboard</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}


    body {
        background-color: #0a0a0a;
        background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
        color: white;
        display: grid;
        grid-template-columns: 400px 1fr;
        min-height: 100vh;
    }


a {
    color: inherit;
    text-decoration: none;
}


/* Destaque para a página atual*/
.secoes:nth-child(7) {
    background-color: #2e4a3e;
}

/* Main Content Area */
main {
    padding: 40px;
    overflow-y: auto;
}

/* --- CLIENTES / FORNECEDORES --- */

.clients-card {
    border: 1px solid #2e4a3e;
    width: 70%;
    border-radius: 20px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 25px rgba(3, 255, 15, 0.5);
    margin: 10%;
}

/* HEADER */
.clients-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.clients-header h2 {
    font-size: 1.5rem;
    color: white;
}

.clients-header i {
    margin-right: 10px;
    color: var(--accent-green);
}

/* SUBTITLE */
.subtitle {
    font-size: 0.9rem;
    color: var(--text-gray);
    margin-bottom: 25px;
}

/* ACTIONS */
.actions {
    display: flex;
    gap: 15px;
}

.search-box {
    display: flex;
    align-items: center;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 12px;
    gap: 8px;
}

.search-box input {
    background: transparent;
    border: none;
    color: white;
    outline: none;
}

.search-box i {color: #777;}

.search-box.small {padding: 6px 10px;}

/* BUTTON */
.btn-add {
    background: #7bcf9c;
    border: none;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    color: #0a0a0a;
}

.btn-detail {
    background: #7bcf9c;
    border: none;
    padding: 6px 12px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 0.8rem;
}

/* TABLE */
.table-block {margin-top: 20px;}

.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

thead {
    color: #aaa;
    font-size: 0.85rem;
}

td, th {
    padding: 12px;
    text-align: left;
}

tbody tr {
    background: #111;
    border-radius: 8px;
}

tbody tr + tr {margin-top: 10px;}

tbody td {border-top: 1px solid #222;}

/* --- SEÇÃO CADASTRO --- */

.main {
    border: 1px solid #2e4a3e;
    width: 70%;
    border-radius: 20px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 25px rgba(3, 255, 15, 0.5);
    margin: 10%;
}

.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.titulo h2 {
    font-size: 1.8rem;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    
}

.titulo p {
    color: #888;
    margin-bottom: 25px;
}

.atalhos-main {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-bottom: 30px;
}

.atalhos-main input {
    background: transparent;
    border: 1px solid #444;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    width: 250px;
}

.atalhos-main button {
    background-color: #5e5e5e;
    color: whitesmoke;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.atalhos-main button:hover {background-color: #333;}

form {
    background-color: #333;
    padding: 32px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    
}

.inputs-cad {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 10px;
}

.input-divs {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.input-divs input {
    height: 32px;
    border-radius: 12px;
}

label img {
    width: 20px;
    height: 20px;
}

label {
    display: flex;
    align-items: center;
    gap: 8px;
}

#cadastrarFuncionario {
    background-color: #80B297;
    padding: 10px;
    border: none;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: whitesmoke;
}

#cadastrarFuncionario:hover{-color: #81c784;}
    </style>
</head>
<body>

    <section class="side-bar">
        <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
        </div>
        
        <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
        </div> 
        
        <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active" href="./produtos.html" >
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="produtos.html">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
                <div class="secoes">
                    <img src="./img/relatorios.png" class="secao-icon">
                    <a href="./categorias.html">Categorias</a>
                </div>
        </nav>

        <div class="logout-link">
            <a href="./login.html">← Deslogar</a>
        </div>
    </section>



    <section class="main">

        <div class="main-header">
    
            <div class="titulo">
                <h2>Cadastrar</h2>
                <p>Gerencie sua base de clientes/fornecedores e acompanhe informações detalhadas.</p>
            </div>
    
            <div class="atalhos-main">
                <a href="ClienteFornecedor.html"><button>← Voltar à Equipe</button></a>
            </div>
        </div>
    
    
        <form id="clienteForm">
    
            <div class="inputs-cad">
    
                <!-- TIPO -->
                <div class="input-divs">
                    <label for="tipo"><img src="./img/inf-pessoais-cad-func.png" alt=""> Tipo </label>
    
                    <select id="tipo">
                        <option value="cliente">Cliente</option>
                        <option value="fornecedor">Fornecedor</option>
                    </select>
                </div>
    
                <!-- NOME -->
                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> Nome Completo </label>
                    <input type="text" placeholder="Neymar da Silva Santos Junior" id="Nome">
                </div>
    
                <!-- CPF -->
                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> CPF/CNPJ </label>
                    <input type="text" placeholder="000.000.000-00" id="CPF">
                </div>
    
                <!-- TELEFONE -->
                <div class="input-divs">
                    <label for=""><img src="./img/tel-cad-func.png" alt=""> Telefone </label>
                    <input type="text" placeholder="(00) 00000-0000" id="Telefone">
                </div>
    
                <!-- EMAIL -->
                <div class="input-divs">
                    <label for=""><img src="./img/email-cad-func.png" alt=""> Email </label>
                    <input type="email" placeholder="Exemplo@gmail.com" id="Email">
                </div>
    
                <!-- DATA NASCIMENTO -->
                <div class="input-divs" id="dataNascimentoGroup">
                    <label for=""><img src="./img/data-cad-func.png" alt=""> Data de Nascimento </label>
                    <input type="date" id="DataNascimento">
                </div>
    
                <!-- CEP -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> CEP </label>
                    <input type="text" placeholder="00000-000" id="CEP">
                </div>
    
                <!-- CIDADE -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Cidade </label>
                    <input type="text" placeholder="Marília" id="Cidade">
                </div>
    
                <!-- RUA -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Rua </label>
                    <input type="text" placeholder="Av. Sampaio Vidal" id="Rua">
                </div>
    
                <!-- BAIRRO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Bairro </label>
                    <input type="text" placeholder="Centro" id="Bairro">
                </div>
    
                <!-- NUMERO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Nº Residência </label>
                    <input type="number" placeholder="0000" id="Numero">
                </div>
    
                <!-- ESTADO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Estado </label>
                    <input type="text" placeholder="São Paulo" id="Estado">
                </div>
    
                <!-- COMPLEMENTO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Complemento </label>
                    <input type="text" placeholder="Do lado do Correio" id="Complemento">
                </div>
    
            </div>
    
            <button type="submit" id="cadastrarFuncionario">
                Cadastrar
            </button>
    
        </form>
    
    </section>
                   
                </div>
            </section>
        </main>
    </div>

    <script src="cadastrarClienteFornecedor.js"></script>
</body>
</html>
