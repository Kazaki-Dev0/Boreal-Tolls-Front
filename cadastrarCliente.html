<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Cadastrar Cliente</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Padronização da Barra Lateral */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px; 
            width: 260px;
            flex-shrink: 0;
        }

        /* Destaque para a página atual (Menu de Clientes) */
        .secoes:nth-child(7) {
            background-color: #2e4a3e;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px; 
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Área do Painel Principal */
        main {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .main-panel {
            width: 100%;
            max-width: 1250px;
            border-radius: 20px;
            padding: 40px;
            margin: 0 auto 20px auto;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .titulo h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .titulo p {
            color: #6da381;
            font-size: 0.8rem;
        }

        .atalhos-main {
            display: flex;
            gap: 15px;
        }

        .btn-back {
            background-color: #5e5e5e;
            color: whitesmoke;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .btn-back:hover {
            background-color: #333;
        }

        /* Formulário Estilizado */
        form {
            background-color: rgba(15, 15, 15, 0.6);
            border: 1px solid #23332b;
            padding: 32px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .inputs-cad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .input-divs {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-divs label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #6da381;
            font-weight: 500;
        }

        .input-divs label img {
            width: 16px;
            height: 16px;
            filter: brightness(0.9);
        }

        .input-divs input, .input-divs select {
            height: 38px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0 12px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-divs input:focus, .input-divs select:focus {
            border-color: #7bcf9c;
        }

        .input-divs input::placeholder {
            color: #555;
        }

        #cadastrarBtn {
            background-color: #80B297;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        #cadastrarBtn:hover {
            background-color: #81c784;
        }

        @media(max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .side-bar { display: none; }
            main { max-width: 100vw; }
            .inputs-cad { grid-template-columns: 1fr 1fr; }
        }

        @media(max-width: 600px) {
            .inputs-cad { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <section class="side-bar">
        <div>
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
            
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p id="nomeUsuarioSidebar">Carregando...</p>
            </div> 
            
            <nav class="nav-side-bar">
                <div class="secoes"><img src="./img/inicio.sidebar.png" class="secao-icon"><a href="dashboard.html">Início</a></div>
                <div class="secoes"><img src="./img/produtos.png" class="secao-icon"><a href="produtos.html">Produtos</a></div>
                <div class="secoes"><img src="./img/estoque.png" class="secao-icon"><a href="./estoque.html">Estoques</a></div>
                <div class="secoes"><img src="./img/financeiro.png" class="secao-icon"><a href="./financeiro.html">Financeiro</a></div>
                <div class="secoes"><img src="./img/vendas.png" class="secao-icon"><a href="vendas.html">Vendas</a></div>
                <div class="secoes"><img src="./img/funcionarios.png" class="secao-icon"><a href="./funcionarios.html">Funcionários</a></div>
                <div class="secoes active"><img src="./img/clientes.png" class="secao-icon"><a href="./ClienteFornecedor.html">Clientes</a></div>
                <div class="secoes"><img src="./img/relatorios.png" class="secao-icon"><a href="./categorias.html">Categorias</a></div>
            </nav>
        </div>

        <div class="logout-link">
            <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
        </div>
    </section>



    <section class="main">

        <div class="main-header">
    
            <div class="titulo">
                <h2>Cadastrar</h2>
                <p>Gerencie sua base de clientes/fornecedores e acompanhe informações detalhadas.</p>
            </div>
    
            <div class="atalhos-main">
                <a href="ClienteFornecedor.html"><button>← Voltar à Equipe</button></a>
            </div>
        </div>
    
    
        <form id="clienteForm">
    
            <div class="inputs-cad">
    
                <!-- TIPO -->
                <div class="input-divs">
                    <label for="tipo"><img src="./img/inf-pessoais-cad-func.png" alt=""> Tipo </label>
    
                    <select id="tipo">
                        <option value="cliente">Cliente</option>
                        <option value="fornecedor">Fornecedor</option>
                    </select>
                </div>
    
                <!-- NOME -->
                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> Nome Completo </label>
                    <input type="text" placeholder="Neymar da Silva Santos Junior" id="Nome">
                </div>
    
                <!-- CPF -->
                <div class="input-divs">
                    <label for=""><img src="./img/inf-pessoais-cad-func.png" alt=""> CPF/CNPJ </label>
                    <input type="text" placeholder="000.000.000-00" id="CPF">
                </div>
    
                <!-- TELEFONE -->
                <div class="input-divs">
                    <label for=""><img src="./img/tel-cad-func.png" alt=""> Telefone </label>
                    <input type="text" placeholder="(00) 00000-0000" id="Telefone">
                </div>
    
                <!-- EMAIL -->
                <div class="input-divs">
                    <label for=""><img src="./img/email-cad-func.png" alt=""> Email </label>
                    <input type="email" placeholder="Exemplo@gmail.com" id="Email">
                </div>
    
                <!-- DATA NASCIMENTO -->
                <div class="input-divs" id="dataNascimentoGroup">
                    <label for=""><img src="./img/data-cad-func.png" alt=""> Data de Nascimento </label>
                    <input type="date" id="DataNascimento">
                </div>
    
                <!-- CEP -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> CEP </label>
                    <input type="text" placeholder="00000-000" id="CEP">
                </div>
    
                <!-- CIDADE -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Cidade </label>
                    <input type="text" placeholder="Marília" id="Cidade">
                </div>
    
                <!-- RUA -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Rua </label>
                    <input type="text" placeholder="Av. Sampaio Vidal" id="Rua">
                </div>
    
                <!-- BAIRRO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Bairro </label>
                    <input type="text" placeholder="Centro" id="Bairro">
                </div>
    
                <!-- NUMERO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Nº Residência </label>
                    <input type="number" placeholder="0000" id="Numero">
                </div>
    
                <!-- ESTADO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Estado </label>
                    <input type="text" placeholder="São Paulo" id="Estado">
                </div>
    
                <!-- COMPLEMENTO -->
                <div class="input-divs">
                    <label for=""><img src="./img/ender-cad-func.png" alt=""> Complemento </label>
                    <input type="text" placeholder="Do lado do Correio" id="Complemento">
                </div>
            </div>
        
            <form id="clienteForm">
                <div class="inputs-cad">
                    <div class="input-divs">
                        <label for="tipo"><img src="./img/inf-pessoais-cad-func.png" alt=""> Tipo</label>
                        <select id="tipo">
                            <option value="cliente">Cliente</option>
                            <option value="fornecedor">Fornecedor</option>
                        </select>
                    </div>
        
                    <div class="input-divs">
                        <label for="Nome"><img src="./img/inf-pessoais-cad-func.png" alt=""> Nome Completo / Razão Social</label>
                        <input type="text" placeholder="Ex: Neymar da Silva Santos" id="Nome" required>
                    </div>
        
                    <div class="input-divs">
                        <label for="CPF"><img src="./img/inf-pessoais-cad-func.png" alt=""> CPF / CNPJ</label>
                        <input type="text" placeholder="000.000.000-00" id="CPF" required>
                    </div>
        
                    <div class="input-divs">
                        <label for="Telefone"><img src="./img/tel-cad-func.png" alt=""> Telefone</label>
                        <input type="text" placeholder="(00) 00000-0000" id="Telefone">
                    </div>
        
                    <div class="input-divs">
                        <label for="Email"><img src="./img/email-cad-func.png" alt=""> E-mail</label>
                        <input type="email" placeholder="exemplo@diretorio.com" id="Email">
                    </div>
        
                    <div class="input-divs" id="dataNascimentoGroup">
                        <label for="DataNascimento"><img src="./img/data-cad-func.png" alt=""> Data de Nascimento</label>
                        <input type="date" id="DataNascimento">
                    </div>
        
                    <div class="input-divs">
                        <label for="CEP"><img src="./img/ender-cad-func.png" alt=""> CEP</label>
                        <input type="text" placeholder="00000-000" id="CEP">
                    </div>
        
                    <div class="input-divs">
                        <label for="Cidade"><img src="./img/ender-cad-func.png" alt=""> Cidade</label>
                        <input type="text" placeholder="Marília" id="Cidade">
                    </div>
        
                    <div class="input-divs">
                        <label for="Rua"><img src="./img/ender-cad-func.png" alt=""> Rua</label>
                        <input type="text" placeholder="Av. Sampaio Vidal" id="Rua">
                    </div>
        
                    <div class="input-divs">
                        <label for="Bairro"><img src="./img/ender-cad-func.png" alt=""> Bairro</label>
                        <input type="text" placeholder="Centro" id="Bairro">
                    </div>
        
                    <div class="input-divs">
                        <label for="Número"><img src="./img/ender-cad-func.png" alt=""> Nº Residência / Prédio</label>
                        <input type="text" placeholder="0000" id="Número">
                    </div>
        
                    <div class="input-divs">
                        <label for="Estado"><img src="./img/ender-cad-func.png" alt=""> Estado</label>
                        <input type="text" placeholder="São Paulo" id="Estado">
                    </div>
        
                    <div class="input-divs">
                        <label for="Complemento"><img src="./img/ender-cad-func.png" alt=""> Complemento</label>
                        <input type="text" placeholder="Ex: Sala 4 / Bloco B" id="Complemento">
                    </div>
                </div>
        
                <button type="submit" id="cadastrarBtn">Finalizar Cadastro</button>
            </form>
        </section>
    </main>
</div>

    <script src="cadastrarClienteFornecedor.js"></script>
</body>
</html>
