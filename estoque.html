<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boreal Tools - Controle de Estoque</title>

<link rel="stylesheet" href="sidebar.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:
    linear-gradient(
        109deg,
        #090909 32.55%,
        #002c18 79.54%,
        #003019 88.95%
    );

    color:white;

    display:grid;
    grid-template-columns:400px 1fr;

    min-height:100vh;
}

a{
    text-decoration:none;
    color:inherit;
}

/* =========================
   PAGINA ATIVA
========================= */

.secoes:nth-child(3){
    background-color:#2e4a3e;
}

/* =========================
   MAIN
========================= */

main{

padding:25px;

overflow-y:auto;

display:flex;

justify-content:center;

align-items:flex-start;
}

/* =========================
   PAINEL
========================= */

.stock-panel{

width:95%;

max-width:1250px;

border-radius:20px;

padding:40px;

margin:20px auto;

background:rgba(20,20,20,0.7);

border:1px solid #2e4a3e;

box-shadow:
0 0 25px rgba(0,255,120,0.08);
}

/* =========================
   HEADER
========================= */

.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    margin-bottom:30px;
}

.panel-title h2{
    font-size:2rem;
    font-weight:500;

    margin-bottom:10px;
}

.panel-subtitle{
    color:#aaa;
    font-size:0.95rem;
}

.panel-icon{

    width:50px;
    height:50px;

    border-radius:10px;

    background:#163125;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#7bcf9c;

    font-size:28px;
}

/* =========================
   TOOLBAR
========================= */

.table-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:40px;

    gap:20px;
}

.search-box{

    width:350px;

    display:flex;
    align-items:center;

    border:1px solid #3a4a43;

    border-radius:30px;

    padding:10px 18px;

    background:transparent;
}

.search-box input{

    width:100%;

    background:none;

    border:none;

    outline:none;

    color:white;

    font-size:0.95rem;
}

.search-box input::placeholder{
    color:#777;
}

.search-box i{
    color:#777;
}

/* =========================
   BOTÃO
========================= */

.btn-add{

    background:#9cc8aa;

    color:black;

    padding:12px 24px;

    border-radius:10px;

    font-weight:600;

    transition:0.3s;
}

.btn-add:hover{
    background:#81c784;
}

/* =========================
   TABELA
========================= */

.stock-table{

    width:100%;

    border-collapse:collapse;
}

.stock-table th{

    text-align:left;

    padding:18px 15px;

    color:white;

    font-size:0.95rem;

    font-weight:500;

    border-bottom:1px solid #2b2b2b;
}

.stock-table td{

    padding:22px 15px;

    color:#cfcfcf;

    border-bottom:1px solid #2b2b2b;
}

.stock-table tbody tr:hover{
    background:rgba(255,255,255,0.02);
}

/* =========================
   BADGES
========================= */

.badge{

    padding:8px 14px;

    border-radius:20px;

    font-size:0.8rem;

    font-weight:600;
}

.badge-entrada{

    background:rgba(76,175,80,0.15);

    color:#81c784;
}

.badge-saida{

    background:rgba(244,67,54,0.15);

    color:#ff7b7b;
}

/* =========================
   AÇÕES
========================= */

.action-buttons{

    display:flex;

    gap:10px;
}

.btn-icon{

    width:38px;
    height:38px;

    border:none;

    border-radius:10px;

    background:#1f1f1f;

    color:#ccc;

    cursor:pointer;

    transition:0.3s;
}

.btn-icon:hover{

    background:#2e4a3e;

    color:#7bcf9c;
}

/* =========================
   RESPONSIVO
========================= */

@media(max-width:1200px){

    body{
        grid-template-columns:320px 1fr;
    }

    .table-toolbar{
        flex-direction:column;
        align-items:flex-start;
    }

    .search-box{
        width:100%;
    }
}

@media(max-width:900px){

    body{
        grid-template-columns:1fr;
    }

    .side-bar{
        display:none;
    }

    .stock-panel{
        width:100%;
    }

    .stock-table{
        min-width:900px;
    }
}

</style>
</head>

<body>

<section class="side-bar">

    <div class="sidebar-header">
        <img src="./img/LogoBorealTools.png"
        alt="Boreal Tools"
        class="logo">
    </div>

    <div class="perfil">
        <img src="./img/perfil-icon.png"
        alt="Perfil">

        <p id="nomeUsuarioSidebar">Fulano de Tal</p>
    </div>

    <nav class="nav-side-bar">

        <div class="secoes">
            <img src="./img/inicio.sidebar.png" class="secao-icon">
            <a href="dashboard.html">Início</a>
        </div>

        <div class="secoes">
            <img src="./img/produtos.png" class="secao-icon">
            <a href="produtos.html">Produtos</a>
        </div>

        <div class="secoes active">
            <img src="./img/estoque.png" class="secao-icon">
            <a href="./estoque.html">Estoques</a>
        </div>

        <div class="secoes">
            <img src="./img/financeiro.png" class="secao-icon">
            <a href="./financeiro.html">Financeiro</a>
        </div>

        <div class="secoes">
            <img src="./img/vendas.png" class="secao-icon">
            <a href="vendas.html">Vendas</a>
        </div>

        <div class="secoes">
            <img src="./img/funcionarios.png" class="secao-icon">
            <a href="./funcionarios.html">Funcionários</a>
        </div>

        <div class="secoes">
            <img src="./img/clientes.png" class="secao-icon">
            <a href="./ClienteFornecedor.html">Clientes</a>
        </div>

        <div class="secoes">
            <img src="./img/relatorios.png" class="secao-icon">
            <a href="./categorias.html">Categorias</a>
        </div>

    </nav>

    <div class="logout-link">
        <a href="./login.html" onclick="localStorage.clear()">← Deslogar</a>
    </div>

</section>

<main>

<div class="stock-panel">

    <div class="panel-header">

        <div class="panel-title">

            <h2>Controle de Estoque</h2>

            <div class="panel-subtitle">
                Gerencie entradas, saídas e movimentações do estoque.
            </div>

        </div>

        <div class="panel-icon">
            <i class="ph ph-archive-box"></i>
        </div>

    </div>

    <div class="table-toolbar">

        <div class="search-box">

            <input type="text" id="txtPesquisa"
            placeholder="Pesquisar por ID do Produto ou Motivo">

            <i class="ph ph-magnifying-glass"></i>

        </div>

        <a href="novo-movimento.html"
        class="btn-add">

            + Registrar Movimento

        </a>

    </div>

    <table class="stock-table">

        <thead>

            <tr>
                <th>Data</th>
                <th>Movimento</th>
                <th>Produto (ID)</th>
                <th>Quantidade</th>
                <th>Motivo</th>
                <th>Status / Sistema</th>
                <th>Ações</th>
            </tr>

        </thead>

        <tbody id="listaMovimentacoes">
            </tbody>

    </table>

</div>

</main>

<script>
    // URL Corrigida conforme a sua API do Visual Studio
    const API_URL = "http://localhost:5187/api/MovimentacaoEstoque";
    let cacheMovimentacoes = [];

    document.addEventListener("DOMContentLoaded", () => {
        // Tenta recuperar o nome do usuário salvo no login para exibir na sidebar
        const nomeSalvo = localStorage.getItem("nome");
        if (nomeSalvo) {
            document.getElementById("nomeUsuarioSidebar").innerText = nomeSalvo;
        }

        obterMovimentacoesDoServidor();
        document.getElementById("txtPesquisa").addEventListener("input", filtrarTabelaEstoque);
    });

    async function obterMovimentacoesDoServidor() {
        const tabelaCorpo = document.getElementById("listaMovimentacoes");
        const tokenAtivo = localStorage.getItem("token");

        if (!tokenAtivo) {
            alert("Acesso negado. Faça login para acessar o sistema.");
            window.location.href = "./login.html";
            return;
        }

        try {
            tabelaCorpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#9cc8aa;">Consultando banco de dados...</td></tr>`;

            const resposta = await fetch(API_URL, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${tokenAtivo}`,
                    "Content-Type": "application/json"
                }
            });

            if (resposta.status === 401) {
                alert("Sua sessão expirou. Por favor, realize o login novamente.");
                window.location.href = "./login.html";
                return;
            }

            if (!resposta.ok) {
                throw new Error("Erro ao buscar dados do servidor.");
            }

            cacheMovimentacoes = await resposta.json();
            atualizarInterfaceTabela(cacheMovimentacoes);

        } catch (erro) {
            console.error(erro);
            tabelaCorpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#ff7b7b;">Erro ao carregar dados do estoque. Certifique-se de que o backend na porta 5187 está rodando.</td></tr>`;
        }
    }

    function atualizarInterfaceTabela(listaExibicao) {
        const tabelaCorpo = document.getElementById("listaMovimentacoes");
        tabelaCorpo.innerHTML = "";

        if (listaExibicao.length === 0) {
            tabelaCorpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#aaa;">Nenhuma movimentação encontrada.</td></tr>`;
            return;
        }

        listaExibicao.forEach(item => {
            // Mapeia tanto propriedades minúsculas quanto maiúsculas vindas do C# DTO
            const id = item.id || item.Id;
            const dataRaw = item.data || item.Data;
            const tipoRaw = item.tipo || item.Tipo || "";
            const produtoId = item.produtoId || item.ProdutoId;
            const quantidade = item.quantidade || item.Quantidade;
            const motivo = item.motivo || item.Motivo || "Não especificado";

            const objetoData = new Date(dataRaw);
            const dataLegivel = objetoData.toLocaleDateString("pt-BR");

            const stringTipo = tipoRaw.toUpperCase();
            const ehSaida = stringTipo === "SAIDA" || stringTipo === "SAÍDA";
            
            const classeBadge = ehSaida ? "badge-saida" : "badge-entrada";
            const textoExibido = ehSaida ? "Saída" : "Entrada";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${dataLegivel}</td>
                <td>
                    <span class="badge ${classeBadge}">
                        ${textoExibido}
                    </span>
                </td>
                <td style="color:white; font-weight:500;">
                    Produto ${produtoId}
                </td>
                <td>${quantidade} UND</td>
                <td>${motivo}</td>
                <td style="font-size:0.85rem; color:#888;">Ativo</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn-icon" title="Ver Detalhes" onclick="exibirAlertaDetalhes(${id})">
                            <i class="ph ph-eye"></i>
                        </button>
                        <button class="btn-icon" title="Excluir Movimento" onclick="removerMovimentacaoFisica(${id})">
                            <i class="ph ph-trash"></i>
                        </button>
                    </div>
                </td>
            `;
            tabelaCorpo.appendChild(tr);
        });
    }

    function filtrarTabelaEstoque() {
        const textoFiltro = document.getElementById("txtPesquisa").value.toLowerCase().trim();

        const filtrados = cacheMovimentacoes.filter(mov => {
            const prodId = (mov.produtoId || mov.ProdutoId || "").toString();
            const mot = (mov.motivo || mov.Motivo || "").toLowerCase();
            return prodId.includes(textoFiltro) || mot.includes(textoFiltro);
        });

        atualizarInterfaceTabela(filtrados);
    }

    function exibirAlertaDetalhes(idDoItem) {
        const registro = cacheMovimentacoes.find(m => (m.id || m.Id) === idDoItem);
        if (registro) {
            const id = registro.id || registro.Id;
            const prodId = registro.produtoId || registro.ProdutoId;
            const tipo = registro.tipo || registro.Tipo;
            const qtd = registro.quantidade || registro.Quantidade;
            const data = registro.data || registro.Data;
            const mot = registro.motivo || registro.Motivo || 'Nenhum';

            alert(`--- DETALHES DA MOVIMENTAÇÃO ---\n\nID do Registro: ${id}\nID do Produto: ${prodId}\nOperação: ${tipo}\nQuantidade: ${qtd} UND\nData: ${new Date(data).toLocaleString("pt-BR")}\nMotivo: ${mot}`);
        }
    }

    async function removerMovimentacaoFisica(idDoItem) {
        if (!confirm("Tem certeza que deseja deletar este movimento? O estoque do produto será revertido automaticamente no servidor.")) {
            return;
        }

        const tokenAtivo = localStorage.getItem("token");

        try {
            const resposta = await fetch(`${API_URL}/${idDoItem}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${tokenAtivo}`
                }
            });

            if (resposta.ok) {
                alert("Movimentação removida e estoque recalculado!");
                obterMovimentacoesDoServidor();
            } else {
                const erroServidor = await resposta.text();
                alert(`Erro retornado pelo servidor: ${erroServidor}`);
            }
        } catch (erro) {
            console.error(erro);
            alert("Não foi possível conectar à API para excluir o item.");
        }
    }
</script>
</body>
</html>
