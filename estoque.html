<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Controle de Estoque</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="sidebar.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            min-height: 100vh;
            overflow: hidden; /* Evita scroll na página principal */
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Padronização do Sidebar conforme o Dashboard e Produtos */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px; 
            width: 260px; /* Largura padrão ideal */
            flex-shrink: 0;
        }

        .secoes:nth-child(3) {
            background-color: #2e4a3e; /* Aba de Estoques Ativa */
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px; 
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Área de Conteúdo Anti-Scroll Lateral */
        main {
            flex: 1;
            padding: 25px;
            overflow-y: auto; /* Rolagem apenas vertical no conteúdo */
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* =========================================
           PAINEL DE ESTOQUE
        ========================================= */
        .stock-panel {
            width: 100%;
            max-width: 1250px;
            border-radius: 20px;
            padding: 40px;
            margin: 0 auto 20px auto;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
        }

        /* =========================================
           HEADER
        ========================================= */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .panel-title h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .panel-subtitle {
            color: #6da381;
            font-size: 0.8rem;
        }

        .panel-icon {
            background: rgba(135, 255, 185, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: #7bcf9c;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================================
           TOOLBAR
        ========================================= */
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            gap: 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid #4a5a50;
            border-radius: 20px;
            padding: 8px 16px;
            width: 320px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #ffffff;
            outline: none;
            width: 100%;
            font-size: 0.85rem;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box i {
            color: #666;
            font-size: 1.1rem;
            margin-left: 8px;
        }

        /* =========================================
           BOTÃO
        ========================================= */
        .btn-add {
            background-color: #80B297;
            color: #000;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn-add:hover {
            background-color: #81c784;
        }

        /* =========================================
           TABELA
        ========================================= */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stock-table th {
            text-align: left;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 400;
            border-bottom: 1px solid #333;
        }

        .stock-table th:last-child {
            text-align: center;
        }

        .stock-table td {
            padding: 16px 15px;
            color: #b0b0b0;
            font-size: 0.85rem;
            border-bottom: 1px solid #333;
            vertical-align: middle;
        }

        .stock-table tbody tr {
            transition: background 0.2s;
        }

        .stock-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* =========================================
           BADGES
        ========================================= */
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-entrada {
            background: rgba(76, 175, 80, 0.15);
            color: #81c784;
        }

        .badge-saida {
            background: rgba(244, 67, 54, 0.15);
            color: #ff7b7b;
        }

        /* =========================================
           AÇÕES
        ========================================= */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 10px;
            background: #1f1f1f;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .btn-icon:hover {
            background: #2e4a3e;
            color: #7bcf9c;
        }

        /* =========================================
           RESPONSIVO
        ========================================= */
        @media(max-width: 1200px) {
            .table-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-box {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="main-wrapper">
    <section class="side-bar">
        <div>
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>

            <div class="perfil">
                <img id="user-avatar" src="./img/perfil-icon.png" alt="Perfil">
                <p id="nomeUsuarioSidebar">Carregando...</p>
            </div>

            <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>

                <div class="secoes">
                    <img src="./img/produtos.png" class="secao-icon">
                    <a href="produtos.html">Produtos</a>
                </div>

                <div class="secoes">
                    <img src="./img/estoque.png" class="secao-icon">
                    <a href="#">Estoques</a>
                </div>

                <div class="secoes">
                    <img src="./img/financeiro.png" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>

                <div class="secoes">
                    <img src="./img/vendas.png" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>

                <div class="secoes">
                    <img src="./img/funcionarios.png" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>

                <div class="secoes">
                    <img src="./img/clientes.png" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes e Fornecedores</a>
                </div>

                <div class="secoes">
                    <img src="./img/relatorios.png" class="secao-icon">
                    <a href="./categorias.html">Categorias</a>
                </div>
            </nav>
        </div>

        <div class="logout-link">
            <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="stock-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <h2>Controle de Estoque</h2>
                    <div class="panel-subtitle">
                        Estoque > <span>Gerencie entradas, saídas e movimentações</span>
                    </div>
                </div>
                <div class="panel-icon">
                    <i class="ph ph-archive-box"></i>
                </div>
            </div>

            <div class="table-toolbar">
                <div class="search-box">
                    <input type="text" id="txtPesquisa" placeholder="Pesquisar por ID do Produto ou Motivo">
                    <i class="ph ph-magnifying-glass"></i>
                </div>
                <a href="novo-movimento.html" class="btn-add">+ Registrar Movimento</a>
            </div>

            <table class="stock-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Movimento</th>
                        <th>Produto (ID)</th>
                        <th>Quantidade</th>
                        <th>Motivo</th>
                        <th>Status / Sistema</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="listaMovimentacoes"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const API_URL = "https://api-time7.azurewebsites.net/api/MovimentacaoEstoque";
    let cacheMovimentacoes = [];

    /* ========================================================
       FUNÇÃO AUXILIAR DE DECODIFICAÇÃO JWT
    ======================================================== */
    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        } catch (e) {
            console.error("Falha ao decodificar token:", e);
            return null;
        }
    }

    function obterToken() {
        return localStorage.getItem("token") || sessionStorage.getItem("token");
    }

    /* ========================================================
       CARREGAMENTO DE SESSÃO E DE NOME DINÂMICO
    ======================================================== */
    document.addEventListener("DOMContentLoaded", () => {
        const tokenAtivo = obterToken();
        
        if (!tokenAtivo) {
            document.getElementById('nomeUsuarioSidebar').textContent = "Usuário não logado";
            window.location.replace("./login.html");
            return;
        }

        const payloadJson = parseJwt(tokenAtivo);

        if (payloadJson) {
            const nomeUsuario = payloadJson["unique_name"] || 
                                payloadJson["name"] || 
                                payloadJson["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || 
                                "Usuário Boreal";
            
            document.getElementById("nomeUsuarioSidebar").innerText = nomeUsuario;
        } else {
            document.getElementById("nomeUsuarioSidebar").innerText = "Erro de Sessão";
        }

        obterMovimentacoesDoServidor();
        document.getElementById("txtPesquisa").addEventListener("input", filtrarTabelaEstoque);
    });

    /* ========================================================
       LOGOUT
    ======================================================== */
    function efetuarLogout() {
        try {
            localStorage.clear();
            sessionStorage.clear();
        } catch (e) {
            console.error("Erro ao efetuar limpeza:", e);
        }
        window.location.replace("./index.html");
    }

    /* ========================================================
       REQUISIÇÕES E CONSTRUÇÃO DA TABELA
    ======================================================== */
    async function obterMovimentacoesDoServidor() {
        const tabelaCorpo = document.getElementById("listaMovimentacoes");
        if (!tabelaCorpo) return;

        const tokenAtivo = obterToken();

        try {
            tabelaCorpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#80B297;">Consultando banco de dados...</td></tr>`;

            const resposta = await fetch(API_URL, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${tokenAtivo}`,
                    "Content-Type": "application/json"
                }
            });

            if (resposta.status === 401) {
                alert("Sua sessão expirou. Por favor, realize o login novamente.");
                window.location.replace("./login.html");
                return;
            }

            if (!resposta.ok) {
                throw new Error("Erro ao buscar dados do servidor.");
            }

            cacheMovimentacoes = await resposta.json();
            atualizarInterfaceTabela(cacheMovimentacoes);

        } catch (erro) {
            console.error(erro);
            tabelaCorpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#ff7b7b;">Erro ao carregar dados do estoque. Certifique-se de que o backend na porta 5187 está rodando.</td></tr>`;
        }
    }

    function atualizarInterfaceTabela(listaExibicao) {
        const tabelaCorpo = document.getElementById("listaMovimentacoes");
        tabelaCorpo.innerHTML = "";

        if (listaExibicao.length === 0) {
            tabelaCorpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#aaa;">Nenhuma movimentação encontrada.</td></tr>`;
            return;
        }

        listaExibicao.forEach(item => {
            const id = item.id || item.Id;
            const dataRaw = item.data || item.Data;
            const tipoRaw = item.tipo || item.Tipo || "";
            const produtoId = item.produtoId || item.ProdutoId;
            const quantidade = item.quantidade || item.Quantidade;
            const motivo = item.motivo || item.Motivo || "Não especificado";

            const objetoData = new Date(dataRaw);
            const dataLegivel = objetoData.toLocaleDateString("pt-BR");

            const stringTipo = tipoRaw.toUpperCase();
            const ehSaida = stringTipo === "SAIDA" || stringTipo === "SAÍDA";
            
            const classeBadge = ehSaida ? "badge-saida" : "badge-entrada";
            const textoExibido = ehSaida ? "Saída" : "Entrada";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${dataLegivel}</td>
                <td>
                    <span class="badge ${classeBadge}">
                        ${textoExibido}
                    </span>
                </td>
                <td style="color:white; font-weight:500;">
                    Produto ${produtoId}
                </td>
                <td>${quantidade} UND</td>
                <td>${motivo}</td>
                <td style="font-size:0.85rem; color:#666;">Ativo</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn-icon" title="Ver Detalhes" onclick="exibirAlertaDetalhes(${id})">
                            <i class="ph ph-eye"></i>
                        </button>
                        <button class="btn-icon" title="Excluir Movimento" onclick="removerMovimentacaoFisica(${id})">
                            <i class="ph ph-trash"></i>
                        </button>
                    </div>
                </td>
            `;
            tabelaCorpo.appendChild(tr);
        });
    }

    function filtrarTabelaEstoque() {
        const textoFiltro = document.getElementById("txtPesquisa").value.toLowerCase().trim();

        const filtrados = cacheMovimentacoes.filter(mov => {
            const prodId = (mov.produtoId || mov.ProdutoId || "").toString();
            const mot = (mov.motivo || mov.Motivo || "").toLowerCase();
            return prodId.includes(textoFiltro) || mot.includes(textoFiltro);
        });

        atualizarInterfaceTabela(filtrados);
    }

    function exibirAlertaDetalhes(idDoItem) {
        const registro = cacheMovimentacoes.find(m => (m.id || m.Id) === idDoItem);
        if (registro) {
            const id = registro.id || registro.Id;
            const prodId = registro.produtoId || registro.ProdutoId;
            const tipo = registro.tipo || registro.Tipo;
            const qtd = registro.quantidade || registro.Quantidade;
            const data = registro.data || registro.Data;
            const mot = registro.motivo || registro.Motivo || 'Nenhum';

            alert(`--- DETALHES DA MOVIMENTAÇÃO ---\n\nID do Registro: ${id}\nID do Produto: ${prodId}\nOperação: ${tipo}\nQuantidade: ${qtd} UND\nData: ${new Date(data).toLocaleString("pt-BR")}\nMotivo: ${mot}`);
        }
    }

    async function removerMovimentacaoFisica(idDoItem) {
        if (!confirm("Tem certeza que deseja deletar este movimento? O estoque do produto será revertido automaticamente no servidor.")) {
            return;
        }

        const tokenAtivo = obterToken();

        try {
            const respuesta = await fetch(`${API_URL}/${idDoItem}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${tokenAtivo}`
                }
            });

            if (respuesta.ok) {
                alert("Movimentação removida e estoque recalculado!");
                obterMovimentacoesDoServidor();
            } else {
                const erroServidor = await respuesta.text();
                alert(`Erro retornado pelo servidor: ${erroServidor}`);
            }
        } catch (erro) {
            console.error(erro);
            alert("Não foi possível conectar à API para excluir o item.");
        }
    }
</script>
</body>
</html>
