<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Categorias</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container principal unificado para alinhar a sidebar e o conteúdo sem bugs */
        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Padronização da Barra Lateral */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px; 
            width: 260px;
            flex-shrink: 0;
        }

        .secoes.active {
            background-color: #2e4a3e;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px; 
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Área do Painel Principal com rolagem controlada */
        main {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .category-panel {
            width: 100%;
            max-width: 1250px;
            border-radius: 20px;
            padding: 40px;
            margin: 0 auto 20px auto;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
        }

        /* HEADER */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .panel-title h2 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .panel-subtitle {
            color: #aaa;
            font-size: 0.95rem;
        }

        .panel-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: #163125;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #7bcf9c;
            font-size: 28px;
        }

        /* TOOLBAR */
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            gap: 20px;
        }

        .search-box {
            width: 350px;
            display: flex;
            align-items: center;
            border: 1px solid #3a4a43;
            border-radius: 30px;
            padding: 10px 18px;
            background: transparent;
        }

        .search-box input {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 0.95rem;
        }

        .search-box input::placeholder {
            color: #777;
        }

        .search-box i {
            color: #777;
        }

        /* BOTÕES */
        .btn-add {
            background: #9cc8aa;
            color: black;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #81c784;
        }

        .btn-delete {
            background: #e57373;
            color: black;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ef5350;
            color: white;
            box-shadow: 0 0 12px rgba(239, 83, 80, 0.4);
        }

        .btn-back {
            background: #2b2b2b;
            color: #aaa;
            border: 1px solid #3a4a43;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #3a4a43;
            color: white;
        }

        /* LISTA DE CATEGORIAS */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .category-card {
            background: #1c1c1c;
            border: 1px solid #2b2b2b;
            border-radius: 18px;
            padding: 22px 28px;
            display: grid;
            grid-template-columns: 1fr 4fr auto; 
            align-items: center;
            transition: 0.3s;
            gap: 20px;
        }

        .category-card:hover {
            border-color: #2e4a3e;
            background: #202020;
        }

        /* FORMULÁRIO */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .form-input {
            width: 100%;
            max-width: 600px;
            background: rgba(28, 28, 28, 0.8);
            border: 1px solid #3a4a43;
            border-radius: 10px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-input:focus {
            border-color: #7bcf9c;
            box-shadow: 0 0 10px rgba(0, 255, 120, 0.15);
        }

        .form-actions {
            display: flex;
            gap: 15px;
        }

        /* INFORMAÇÕES */
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-label {
            color: #888;
            font-size: 0.85rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }

        /* RESPONSIVO */
        @media(max-width:1200px) {
            .table-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-box {
                width: 100%;
            }

            .category-card {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .btn-delete {
                border-radius: 8px;
                width: 100%;
                height: 44px;
            }

            .form-actions {
                flex-direction: column;
            }

            .form-input {
                max-width: 100%;
            }
        }

        @media(max-width:900px) {
            .main-wrapper {
                flex-direction: column;
            }
            .side-bar {
                display: none;
            }
            main {
                max-width: 100vw;
            }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <section class="side-bar">
        <div>
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>

            <div class="perfil">
                <img id="user-avatar" src="./img/perfil-icon.png" alt="Perfil">
                <p id="user-name">Carregando...</p>
            </div>

            <nav class="nav-side-bar">
                <div class="secoes"><img src="./img/inicio.sidebar.png" class="secao-icon"><a href="dashboard.html">Início</a></div>
                <div class="secoes"><img src="./img/produtos.png" class="secao-icon"><a href="produtos.html">Produtos</a></div>
                <div class="secoes"><img src="./img/estoque.png" class="secao-icon"><a href="./estoque.html">Estoques</a></div>
                <div class="secoes"><img src="./img/financeiro.png" class="secao-icon"><a href="./financeiro.html">Financeiro</a></div>
                <div class="secoes"><img src="./img/vendas.png" class="secao-icon"><a href="vendas.html">Vendas</a></div>
                <div class="secoes"><img src="./img/funcionarios.png" class="secao-icon"><a href="./funcionarios.html">Funcionários</a></div>
                <div class="secoes"><img src="./img/clientes.png" class="secao-icon"><a href="./ClienteFornecedor.html">Clientes</a></div>
                <div class="secoes active"><img src="./img/relatorios.png" class="secao-icon"><a href="./categorias.html">Categorias</a></div>
            </nav>
        </div>

        <div class="logout-link">
            <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="category-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <h2 id="panel-main-title">Categorias de Produtos</h2>
                    <div id="panel-main-subtitle" class="panel-subtitle">
                        Gerencie, cadastre e organize as categorias do estoque.
                    </div>
                </div>
                
                <div class="panel-icon">
                    <i class="ph ph-squares-four"></i>
                </div>
            </div>

            <div id="view-listing">
                <div class="table-toolbar">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Pesquisar por categoria...">
                        <i class="ph ph-magnifying-glass"></i>
                    </div>

                    <button id="btn-open-form" class="btn-add">
                        + Nova Categoria
                    </button>
                </div>

                <div class="category-list" id="category-container">
                    <p style="color: #7bcf9c; text-align: center;">Carregando categorias...</p>
                </div>
            </div>

            <div id="view-form" style="display: none;">
                <form id="form-nova-categoria">
                    <div class="form-group">
                        <label for="nome-categoria" class="info-label" style="font-size: 0.95rem; font-weight: 600;">
                            Nome da Categoria
                        </label>
                        <input type="text" id="nome-categoria" class="form-input" placeholder="Ex: Ferramentas Manuais" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-add">
                            Salvar Categoria
                        </button>
                        <button type="button" id="btn-back-list" class="btn-back">
                            ← Voltar para a Listagem
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script>
    // URL ATUALIZADA PARA O SERVIDOR EM PRODUÇÃO NO AZURE
    const API_URL = "https://api-time7.azurewebsites.net/api/Categorias"; 

    let listaCategoriasGlobal = [];

    const viewListing = document.getElementById('view-listing');
    const viewForm = document.getElementById('view-form');
    const containerCategorias = document.getElementById('category-container');
    const inputPesquisa = document.getElementById('search-input');
    
    const btnOpenForm = document.getElementById('btn-open-form');
    const btnBackList = document.getElementById('btn-back-list');
    
    const panelTitle = document.getElementById('panel-main-title');
    const panelSubtitle = document.getElementById('panel-main-subtitle');

    const token = localStorage.getItem('token') || sessionStorage.getItem('token');

    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (!token) {
            window.location.replace("./login.html");
            return;
        }

        const payloadJson = parseJwt(token);
        const imgElement = document.getElementById('user-avatar');
        const fotoDireta = localStorage.getItem('urlFoto');

        // IDENTIFICAÇÃO DO USUÁRIO CORRIGIDA PARA MÚLTIPLOS PADRÕES DE CLAIMS JWT
        if (payloadJson) {
            document.getElementById('user-name').textContent = 
                payloadJson["unique_name"] || 
                payloadJson["name"] || 
                payloadJson["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || 
                "Usuário Boreal";
        }
        
        let fotoFinal = "./img/perfil-icon.png";
        if (fotoDireta && fotoDireta !== "null") fotoFinal = fotoDireta;
        else if (payloadJson) fotoFinal = payloadJson["urlFoto"] || payloadJson["foto"] || fotoFinal;

        if (fotoFinal.startsWith('iVBORw0KGgo') || (fotoFinal.length > 200 && !fotoFinal.startsWith('data:'))) {
            imgElement.src = `data:image/jpeg;base64,${fotoFinal}`;
        } else {
            imgElement.src = fotoFinal;
        }

        carregarCategorias();
    });

    async function carregarCategorias() {
        try {
            const response = await fetch(API_URL, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) throw new Error("Erro ao buscar dados do servidor.");

            const dados = await response.json();
            listaCategoriasGlobal = dados; 
            renderizarLista(listaCategoriasGlobal);

        } catch (erro) {
            console.error("Erro na requisição GET:", erro);
            containerCategorias.innerHTML = `<p style="color: #e57373; text-align: center;">Não foi possível carregar as categorias do banco.</p>`;
        }
    }

    function renderizarLista(lista) {
        if (lista.length === 0) {
            containerCategorias.innerHTML = `<p style="color: #aaa; text-align: center;">Nenhuma categoria encontrada.</p>`;
            return;
        }

        containerCategorias.innerHTML = ""; 

        lista.forEach(categoria => {
            const id = categoria.id ?? categoria.Id;
            const nome = categoria.nome ?? categoria.Nome;

            const cardHtml = `
                <article class="category-card">
                    <div class="info-group">
                        <span class="info-label">ID</span>
                        <span class="info-value">#${id}</span>
                    </div>
                    <div class="info-group">
                        <span class="info-label">Nome da Categoria</span>
                        <span class="info-value">${nome}</span>
                    </div>
                    <button class="btn-delete" title="Excluir Categoria" onclick="deletarCategoria(${id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </article>
            `;
            containerCategorias.insertAdjacentHTML('beforeend', cardHtml);
        });
    }

    document.getElementById('form-nova-categoria').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nomeInput = document.getElementById('nome-categoria').value;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ Nome: nomeInput }) 
            });

            if (response.ok) {
                alert("Categoria cadastrada com sucesso!");
                document.getElementById('nome-categoria').value = '';
                btnBackList.click(); 
                carregarCategorias(); 
            } else {
                const erroTexto = await response.text();
                alert("Falha ao registrar categoria: " + erroTexto);
            }
        } catch (erro) {
            console.error("Erro na requisição POST:", erro);
            alert("Erro de conexão com o servidor.");
        }
    });

    async function deletarCategoria(id) {
        if (!confirm("Tem certeza que deseja excluir esta categoria permanentemente?")) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (response.ok) {
                alert("Categoria removida com sucesso!");
                carregarCategorias(); 
            } else {
                if (response.status === 400) {
                    alert("Não é possível excluir uma categoria que possui produtos vinculados.");
                } else {
                    alert("Não foi possível excluir a categoria.");
                }
            }
        } catch (erro) {
            console.error("Erro na requisição DELETE:", erro);
            alert("Erro de rede ao tentar deletar.");
        }
    }

    inputPesquisa.addEventListener('input', (e) => {
        const termoBusca = e.target.value.toLowerCase().trim();
        const filtradas = listaCategoriasGlobal.filter(cat => {
            const nome = (cat.nome ?? cat.Nome).toLowerCase();
            return nome.includes(termoBusca);
        });
        renderizarLista(filtradas);
    });

    btnOpenForm.addEventListener('click', () => {
        viewListing.style.display = 'none';
        viewForm.style.display = 'block';
        panelTitle.innerText = 'Cadastrar Nova Categoria';
        panelSubtitle.innerText = 'Preencha o campo abaixo para inserir uma nova classificação ao banco.';
    });

    btnBackList.addEventListener('click', () => {
        viewForm.style.display = 'none';
        viewListing.style.display = 'block';
        panelTitle.innerText = 'Categorias de Produtos';
        panelSubtitle.innerText = 'Gerencie, cadastre e organize as categorias do estoque.';
        document.getElementById('nome-categoria').value = '';
    });

    function efetuarLogout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace("./index.html");
    }
</script> 
</body>
</html>
