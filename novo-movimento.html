<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Controle de Estoque</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sidebar.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script> 

    <style>
        /* VARIÁVEIS DE COR */
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #06100b;
            --bg-panel: #131715;
            --bg-topbar: #111111;
            --text-primary: #ffffff;
            --text-secondary: #9aa09d;
            --neon-green: #87ffb9;
            --neon-green-glow: rgba(135, 255, 185, 0.4);
            --dark-green: #1a3a29;
            --border-color: #242e29;
            --white-glow: rgba(255, 255, 255, 0.3);
            --danger-color: #ff6b6b;
            --danger-glow: rgba(255, 107, 107, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        } 

        a {
            color: inherit;
            text-decoration: none;
        }

        /* CORREÇÃO DO MAIN-WRAPPER PARA OS ELEMENTOS FICAREM LADO A LADO */
        .main-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Destaque para a página atual  */
        .secoes:nth-child(3) {
            background-color: #2e4a3e; /* Verde escuro */
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .content {
            flex: 1;
            padding: 2.5rem;
            background: radial-gradient(circle at top right, #0d1a13, #0a0a0a);
            overflow-y: auto;
        }

        .form-container {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .form-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-title i {
            color: var(--neon-green);
            font-size: 2rem;
        }

        .btn-back {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .alert-banner {
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .alert-banner i { color: #fff; font-size: 1.5rem; }
        .alert-text h4 { font-size: 1rem; margin-bottom: 2px; }
        .alert-text p { font-size: 0.85rem; color: var(--text-secondary); }
        .alert-text b { color: #fff; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 5px;
        }

        input, select {
            width: 100%;
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 8px;
            color: #333;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px var(--neon-green-glow);
            border-color: var(--neon-green);
        }

        .form-actions {
            margin-top: 35px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: white;
        }

        .btn-confirm {
            background-color: #000;
            color: #fff;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green-glow);
        }

        .btn-confirm:hover {
            background-color: var(--neon-green);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <section class="side-bar">
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
            
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p id="nomeUsuarioSidebar">Fulano de Tal</p>
            </div> 
            
            <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes">
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="produtos.html">Produtos</a>
                </div>
                <div class="secoes active">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
                <div class="secoes">
                    <img src="./img/relatorios.png" class="secao-icon">
                    <a href="./categorias.html">Categorias</a>
                </div>
            </nav>

            <div class="logout-link">
                <a href="./login.html" onclick="localStorage.clear()">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="form-container">
                <div class="form-header">
                    <div class="form-title">
                        <i class="ph ph-cube-focus"></i>
                        Registrar Nova Operação
                    </div>
                    <a href="estoque.html" class="btn-back">
                        <i class="ph ph-arrow-left"></i> Voltar ao Estoque
                    </a>
                </div>

                <div class="alert-banner">
                    <i class="ph ph-warning-circle"></i>
                    <div class="alert-text">
                        <h4>Atenção ao registrar movimentos</h4>
                        <p>Certifique-se de que a quantidade não ultrapasse a <b>capacidade máxima</b> do estoque para este item.</p>
                    </div>
                </div>

                <form class="form-grid" id="formMovimentacao">
                    <div class="input-group">
                        <label>Tipo de Movimento</label>
                        <select id="tipoMovimento" required>
                            <option value="ENTRADA">Entrada (Adicionar ao Estoque)</option>
                            <option value="SAIDA">Saída (Remover do Estoque)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Data de Operação</label>
                        <input type="date" id="dataOperacao" required>
                    </div>

                    <div class="input-group full-width">
                        <label>Identificação do Produto (ID)</label>
                        <input type="number" id="produtoId" placeholder="Ex: 1024" required min="1">
                    </div>

                    <div class="input-group">
                        <label>Quantidade</label>
                        <input type="number" id="quantidade" placeholder="0" min="1" required>
                    </div>

                    <div class="input-group">
                        <label>Motivo da Movimentação</label>
                        <input type="text" id="motivo" placeholder="Ex: Ajuste de inventário" required>
                    </div>

                    <div class="form-actions full-width">
                        <button type="button" class="btn btn-cancel" onclick="window.location.href='estoque.html'">Cancelar</button>
                        <button type="submit" class="btn btn-confirm">Confirmar Registro</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Define a data atual automaticamente no formulário e lê dados da sessão
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('dataOperacao').valueAsDate = new Date();
            
            const nomeSalvo = localStorage.getItem("nome");
            if (nomeSalvo) {
                const elementNome = document.querySelector(".perfil p");
                if (elementNome) elementNome.innerText = nomeSalvo;
            }
        });

        document.getElementById('formMovimentacao').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                alert('Você precisa estar autenticado. Faça login novamente.');
                window.location.href = './login.html';
                return;
            }

            // Propriedades mapeadas no formato PascalCase compatível com o DTO C# do Backend
            const movimentacaoDto = {
                ProdutoId: parseInt(document.getElementById('produtoId').value),
                Quantidade: parseInt(document.getElementById('quantidade').value),
                Tipo: document.getElementById('tipoMovimento').value,
                Data: new Date(document.getElementById('dataOperacao').value).toISOString(),
                Motivo: document.getElementById('motivo').value
            };

            // URL Atualizada e Corrigida para a porta 5187
            const urlApi = 'http://localhost:5187/api/MovimentacaoEstoque'; 

            try {
                const response = await fetch(urlApi, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(movimentacaoDto)
                });

                if (response.ok) {
                    alert('Movimentação registrada com sucesso!');
                    window.location.href = './estoque.html';
                } else {
                    const msgErro = await response.text();
                    alert(`Erro na operação: ${msgErro}`);
                }
            } catch (error) {
                console.error(error);
                alert('Não foi possível conectar ao servidor da API. Certifique-se de que o backend está ativo na porta 5187.');
            }
        });
    </script>
</body>
</html>
