<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Controle de Estoque</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* VARIÁVEIS DE COR */
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #06100b;
            --bg-panel: #131715;
            --bg-topbar: #111111;
            --text-primary: #ffffff;
            --text-secondary: #9aa09d;
            --neon-green: #87ffb9;
            --neon-green-glow: rgba(135, 255, 185, 0.4);
            --dark-green: #1a3a29;
            --border-color: #242e29;
            --white-glow: rgba(255, 255, 255, 0.3);
            --danger-color: #ff6b6b;
            --danger-glow: rgba(255, 107, 107, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        } 

        /* --- SIDEBAR (MANTIDA INTEGRALMENTE) --- */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .secoes-seleciondo{
            background-color: #3b5745;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
            gap: 10%;
            cursor: pointer;
            text-decoration: none;
        }

        .side-bar {
            text-decoration: none;
            grid-row: 2 / 3;
            background-color: #222;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
        }
        .sidebar-header img{
            width: 406px;
            height: 121px;
        }

        .sidebar-header {
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
            text-decoration: none;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding-bottom: 1rem;
            text-decoration: none;
            text-align: center;
        }

        .perfil p {
            font-size: 24px;
        }

        .perfil img {
            width: 80px;
            background: #c8e6c9;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        a {
            text-decoration: none;
            color: #ffffff;
        }

        .nav-side-bar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .secoes {
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
            gap: 10%;
            cursor: pointer;
            text-decoration: none;
        }

        .secoes i {
            font-size: 1.3rem;
            color: var(--text-secondary);
            transition: 0.3s;
        }

        .secoes:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .secoes:hover i {
            color: var(--neon-green);
        }

        .logout-link {
            margin-top: auto;
            padding: 15px;
        }

        .logout-link a {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .logout-link a:hover {
            color: var(--danger-color);
        }

        /* --- CONTEÚDO PRINCIPAL (MAIN CORRIGIDO) --- */
        .content {
            flex: 1;
            padding: 2.5rem;
            background: radial-gradient(circle at top right, #0d1a13, #0a0a0a);
            overflow-y: auto;
        }

        .form-container {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .form-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-title i {
            color: var(--neon-green);
            font-size: 2rem;
        }

        .btn-back {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .alert-banner {
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .alert-banner i { color: #fff; font-size: 1.5rem; }
        .alert-text h4 { font-size: 1rem; margin-bottom: 2px; }
        .alert-text p { font-size: 0.85rem; color: var(--text-secondary); }
        .alert-text b { color: #fff; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 5px;
        }

        input, select {
            width: 100%;
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 8px;
            color: #333;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px var(--neon-green-glow);
            border-color: var(--neon-green);
        }

        .form-actions {
            margin-top: 35px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: white;
        }

        .btn-confirm {
            background-color: #000;
            color: #fff;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green-glow);
        }

        .btn-confirm:hover {
            background-color: var(--neon-green);
            color: #000;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">

        <section class="side-bar">
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
        
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
            </div>
        
            <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="./dashboard.html">Início</a>
                </div>
                <div class="secoes" href="./produtos.html" >
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="./produtos.html">Produtos</a>
                </div>
                <div class="secoes-seleciondo">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="estoque.html">Estoque</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./folhaPagamento.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="./vendas.html">Vendas</a>
                </div>
                <div class="secoes active">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
            </nav>
            <div class="logout-link">
                <a href="./login.html">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="form-container">
                <div class="form-header">
                    <div class="form-title">
                        <i class="ph ph-cube-focus"></i>
                        Registrar Nova Operação
                    </div>
                    <a href="estoque.html" class="btn-back">
                        <i class="ph ph-arrow-left"></i> Voltar ao Estoque
                    </a>
                </div>

                <div class="alert-banner">
                    <i class="ph ph-warning-circle"></i>
                    <div class="alert-text">
                        <h4>Atenção ao registrar movimentos</h4>
                        <p>Certifique-se de que a quantidade não ultrapasse a <b>capacidade máxima</b> do estoque para este item.</p>
                    </div>
                </div>

                <form class="form-grid">
                    <div class="input-group">
                        <label>Tipo de Movimento</label>
                        <select>
                            <option value="entrada">Entrada (Adicionar ao Estoque)</option>
                            <option value="saida">Saída (Remover do Estoque)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Data de Operação</label>
                        <input type="date" value="2026-05-13">
                    </div>

                    <div class="input-group full-width">
                        <label>Identificação do Produto (ID ou Nome)</label>
                        <input type="text" placeholder="Ex: 1024 ou Parafusadeira Titanium">
                    </div>

                    <div class="input-group">
                        <label>Quantidade</label>
                        <input type="number" placeholder="0" min="1">
                    </div>

                    <div class="input-group">
                        <label>ID do Fornecedor (Opcional)</label>
                        <input type="text" placeholder="Deixe em branco se for saída">
                    </div>

                    <div class="form-actions full-width">
                        <button type="button" class="btn btn-cancel" onclick="window.location.href='estoque.html'">Cancelar</button>
                        <button type="submit" class="btn btn-confirm">Confirmar Registro</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
