<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Cadastrar Produto</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. VARIÁVEIS DE COR
        ========================================= */
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #06100b;
            --bg-panel: #131715;
            --text-primary: #ffffff;
            --text-secondary: #9aa09d;
            --neon-green: #87ffb9;
            --border-color: #242e29;
            --input-bg: #1a1a1a;
        }

        /* =========================================
           2. RESET E CONFIGURAÇÕES GERAIS
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        } 

        a {
            text-decoration: none;
            color: #ffffff;
        }

        /* =========================================
           3. ESTRUTURA PRINCIPAL (LAYOUT)
        ========================================= */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .content {
            flex: 1;
            padding: 3rem 4rem;
            background: radial-gradient(circle at top right, #0d1a13, #0a0a0a);
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* =========================================
           4. SIDEBAR
        ========================================= */
        .side-bar {
            background-color: #1a1a1a; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            min-width: 460px;
            width: 320px;
            height: 100vh;
        }

        .sidebar-header {
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
        }

        .logo {
            width: auto;
            max-width: 406px;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding-bottom: 1.5rem;
            text-align: center;
        }

        .perfil img {
            width: 80px;
            height: 80px;
            background: #c8e6c9;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        .perfil p {
            font-size: 24px;
        }

        .nav-side-bar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .secoes {
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
            gap: 10%;
            cursor: pointer;
        }

        .secoes:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .secoes.active {
            background-color: #3b5745;
        }

        .logout-link {
            margin-top: auto;
            padding: 15px 25px;
            font-size: 0.85rem;
        }

        .logout-link a {
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .logout-link a:hover {
            color: #ff6b6b;
        }

        /* =========================================
           5. PAINEL DO FORMULÁRIO
        ========================================= */
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(135, 255, 185, 0.2);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 0 30px rgba(135, 255, 185, 0.05);
            position: relative;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .title-area h2 {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: #6da381;
        }

        .breadcrumb a {
            color: #6da381;
            text-decoration: none;
        }

        .breadcrumb span {
            color: #aaa;
        }

        .icon-box {
            background: rgba(135, 255, 185, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: var(--neon-green);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        label {
            font-size: 0.9rem;
            color: #cccccc;
        }

        input, textarea {
            background-color: var(--input-bg);
            border: 1px solid #333333;
            border-radius: 6px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #4a5a50;
        }

        input::placeholder, textarea::placeholder {
            color: #555555;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background-color: #80B297;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            align-self: flex-start;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #81c784;
        }

        .btn-back {
            position: absolute;
            top: 2.5rem;
            right: 6.5rem;
            background: none;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #222;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <section class="side-bar">
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
        
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
            </div> 
        
            <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active">
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="./produtos.html">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
                <div class="secoes">
                    <img src="./img/relatorios.png" class="secao-icon">
                    <a href="./categorias.html">Categorias</a>
                </div>
            </nav>

            <div class="logout-link">
                <a href="./login.html">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="container">
                <a href="./produtos.html" class="btn-back">Voltar</a>

                <div class="header-container">
                    <div class="title-area">
                        <h2 id="form-title">Cadastrar Produtos</h2>
                        <div class="breadcrumb">
                            <a href="./produtos.html">Lista de Produtos</a> > <span id="breadcrumb-action">Cadastrar Produtos</span>
                        </div>
                    </div>
                    <div class="icon-box">
                        <i class="ph ph-package"></i>
                    </div>
                </div>

                <form id="formProduto">
                    <div class="form-group">
                        <label for="urlImagem">Url da imagem:</label>
                        <input type="text" id="urlImagem" placeholder="Ex: https://www.borealtools.com.br/imagens/produtos.png">
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome do produto:</label>
                        <input type="text" id="nome" placeholder="Ex: iPhone 17 Pro Max" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="marca">Marca:</label>
                            <input type="text" id="marca" placeholder="Ex: Apple" required>
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor (R$):</label>
                            <input type="number" step="0.01" id="valor" placeholder="0,00" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoria">Categoria:</label>
                            <input type="number" id="categoria" placeholder="Ex: 2 (ID da Categoria)" required>
                        </div>
                        <div class="form-group">
                            <label for="fornecedor">Fornecedor:</label>
                            <input type="number" id="fornecedor" placeholder="Ex: 1 (ID do Fornecedor)" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="qtd_minima">Quantidade mínima estoque:</label>
                        <input type="number" id="qtd_minima" placeholder="Ex: 10" required>
                    </div>

                    <div class="form-group">
                        <label for="qtd_atual">Quantidade estoque:</label>
                        <input type="number" id="qtd_atual" placeholder="Ex: 10" required>
                    </div>

                    <div class="form-group">
                        <label for="descricao">Descrição:</label>
                        <textarea id="descricao" placeholder="Detalhes técnicos do produto..."></textarea>
                    </div>

                    <button type="submit" id="btnSalvar" class="btn-submit">Cadastrar Produto</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const apiURL = "http://localhost:5187/api/Produtos";
        let modoEdicao = false;
        let produtoId = null;

        function obterToken() {
            return localStorage.getItem("token") || sessionStorage.getItem("token");
        }

        document.addEventListener("DOMContentLoaded", () => {
            const formProduto = document.getElementById("formProduto");
            formProduto.addEventListener("submit", salvarProduto);

            const parametrosUrl = new URLSearchParams(window.location.search);
            const idParaEdicao = parametrosUrl.get("id");

            if (idParaEdicao) {
                modoEdicao = true;
                produtoId = idParaEdicao;

                document.getElementById("form-title").innerText = "Editar Produto";
                document.getElementById("breadcrumb-action").innerText = "Editar Produto";
                document.getElementById("btnSalvar").innerText = "Salvar Alterações";

                carregarDadosParaEdicao(idParaEdicao);
            }
        });

        async function carregarDadosParaEdicao(id) {
            try {
                const token = obterToken();
                const resposta = await fetch(`${apiURL}/${id}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!resposta.ok) {
                    alert("Erro ao buscar dados do produto para edição.");
                    return;
                }

                const produto = await resposta.json();

                document.getElementById("urlImagem").value = produto.urlImg || produto.UrlImg || "";
                document.getElementById("nome").value = produto.nome || produto.Nome || "";
                document.getElementById("marca").value = produto.marca || produto.Marca || "";
                document.getElementById("valor").value = produto.valor || produto.Valor || "";
                document.getElementById("categoria").value = produto.categoriaId || produto.CategoriaId || "";
                document.getElementById("fornecedor").value = produto.fornecedorId || produto.FornecedorId || "";
                document.getElementById("qtd_minima").value = produto.qtdMinimaEstoque || produto.QtdMinimaEstoque || 0;
                
                document.getElementById("qtd_atual").value = produto.quantidadeEstoque ?? produto.qtdEstoque ?? produto.QuantidadeEstoque ?? produto.QtdEstoque ?? 0;
                
                document.getElementById("descricao").value = produto.descricao || produto.Descricao || "";

            } catch (error) {
                console.error("Erro ao carregar edição:", error);
                alert("Falha de conexão ao tentar carregar os dados originais.");
            }
        }

        async function salvarProduto(event) {
            event.preventDefault(); 
            
            const urlImagem = document.getElementById("urlImagem").value; 
            const nome = document.getElementById("nome").value;
            const marca = document.getElementById("marca").value;
            const valor = document.getElementById("valor").value;
            const categoria = document.getElementById("categoria").value; 
            const fornecedor = document.getElementById("fornecedor").value;
            const qtdMinima = document.getElementById("qtd_minima").value;
            const qtdAtual = document.getElementById("qtd_atual").value; 
            const descricao = document.getElementById("descricao").value;
            
            try {
                const token = obterToken();

                const payload = {
                    UrlImg: urlImagem, 
                    nome: nome,
                    marca: marca,
                    valor: parseFloat(valor) || 0.0,
                    Descricao: descricao, 
                    categoriaId: parseInt(categoria) || 1, 
                    fornecedorId: parseInt(fornecedor) || 1, 
                    qtdMinimaEstoque: parseInt(qtdMinima) || 0,
                    qtdEstoque: parseInt(qtdAtual) || 0,
                    quantidadeEstoque: parseInt(qtdAtual) || 0 
                };

                if (modoEdicao) {
                    payload.id = parseInt(produtoId);
                }

                const urlDestino = modoEdicao ? `${apiURL}/${produtoId}` : apiURL;
                const metodoHttP = modoEdicao ? "PUT" : "POST";

                const resposta = await fetch(urlDestino, {
                    method: metodoHttP,
                    headers: {
                        "Content-Type" : "application/json",
                        "Authorization": `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });

                if (!resposta.ok) {
                    const erroDetalhado = await resposta.text();
                    console.error("Erro retornado do Backend:", erroDetalhado);
                    alert(`Falha na requisição (Erro ${resposta.status}).`);
                    return;
                }
                
                if (modoEdicao) {
                    alert("Produto atualizado com sucesso!");
                    window.location.href = "./produtos.html"; 
                } else {
                    alert("Produto cadastrado com sucesso!");
                    document.getElementById("formProduto").reset(); 
                }
                
            } catch (error) {
                console.error("Falha de comunicação:", error);
                alert("Erro de rede ao tentar contactar o servidor.");
            }
        }
    </script>
</body>
</html>
