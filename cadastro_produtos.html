<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Cadastrar Produto</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. VARIÁVEIS DE COR
        ========================================= */
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #06100b;
            --bg-panel: #131715;
            --text-primary: #ffffff;
            --text-secondary: #9aa09d;
            --neon-green: #87ffb9;
            --dark-green: #1a3a29;
            --border-color: #242e29;
        }

        /* =========================================
           2. RESET E CONFIGURAÇÕES GERAIS
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        } 

        a {
            text-decoration: none;
            color: #ffffff;
        }

        /* =========================================
           3. ESTRUTURA PRINCIPAL (LAYOUT)
        ========================================= */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .content {
            flex: 1;
            padding: 3rem 4rem;
            background: radial-gradient(circle at top right, #0d1a13, #0a0a0a);
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* =========================================
           4. SIDEBAR (Idêntica à Lista de Produtos)
        ========================================= */
        .side-bar {
            background-color: #1a1a1a; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            min-width: 460px;
            width: 460px;
            height: 100vh;
        }

        .sidebar-header {
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
        }

        .logo {
            width: auto;
            max-width: 406px;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding-bottom: 1.5rem;
            text-align: center;
        }

        .perfil img {
            width: 80px;
            height: 80px;
            background: #c8e6c9;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        .perfil p {
            font-size: 24px;
        }

        .perfil span {
            color: #888;
            font-size: 0.8rem;
        }

        .nav-side-bar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .secoes {
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
            gap: 10%;
            cursor: pointer;
        }

        .secoes:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .secoes.active {
            background-color: #3b5745;
        }

        .logout-link {
            margin-top: auto;
            padding: 15px 25px;
            font-size: 0.85rem;
        }

        .logout-link a {
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .logout-link a:hover {
            color: #ff6b6b;
        }

        /* =========================================
           5. PAINEL DE FORMULÁRIO (Padronizado)
        ========================================= */
        .form-panel {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(135, 255, 185, 0.2);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 0 30px rgba(135, 255, 185, 0.05);
            width: 100%;
            max-width: 800px; /* Um pouco mais estreito que a tabela para o formulário não ficar esticado */
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .form-title h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: #6da381;
        }

        .breadcrumb span {
            color: #aaa;
        }

        .form-header-icon {
            background: rgba(135, 255, 185, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: var(--neon-green);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================================
           6. CAMPOS DO FORMULÁRIO
        ========================================= */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            color: #b0b0b0;
            font-weight: 400;
        }

        input, textarea {
            background-color: transparent;
            border: 1px solid #4a5a50;
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            outline: none;
            font-size: 0.9rem;
            transition: border 0.3s;
            width: 100%;
        }

        input::placeholder, textarea::placeholder {
            color: #666;
        }

        input:focus, textarea:focus {
            border-color: var(--neon-green);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background-color: #8db59d;
            color: #000;
            border: none;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--neon-green);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <section class="side-bar">
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
        
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
            </div>
        
            <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active" href="./produtos.html" >
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="#">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="./vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
            </nav>

            <div class="logout-link">
                <a href="./login.html">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="form-panel">
                <div class="form-header">
                    <div class="form-title">
                        <h2>Cadastrar Produtos</h2>
                        <div class="breadcrumb"><a href="./produtos.html" style="color: inherit;">Lista de Produtos</a> > <span>Cadastrar Produtos</span></div>
                    </div>
                    <div class="form-header-icon">
                        <i class="ph ph-package"></i>
                    </div>
                </div>

                <form id="productForm" class="form-grid">
                    <div class="input-group full-width">
                        <label>Nome do produto:</label>
                        <input type="text" id="nome" placeholder="Ex: iPhone 17 Pro Max">
                    </div>

                    <div class="input-group">
                        <label>Marca:</label>
                        <input type="text" id="marca" placeholder="Ex: Apple">
                    </div>

                    <div class="input-group">
                        <label>Valor (R$):</label>
                        <input type="number" id="valor" step="0.01" placeholder="0,00">
                    </div>

                    <div class="input-group">
                        <label>Categoria:</label>
                        <input type="text" id="categoria" placeholder="Ex: Eletrônicos">
                    </div>

                    <div class="input-group">
                        <label>Fornecedor:</label>
                        <input type="text" id="fornecedor" placeholder="Nome do fornecedor">
                    </div>

                    <div class="input-group full-width">
                        <label>Quantidade mínima estoque:</label>
                        <input type="number" id="qtd_minima" placeholder="Ex: 10">
                    </div>

                    <div class="input-group full-width">
                        <label>Descrição:</label>
                        <textarea id="descricao" placeholder="Detalhes técnicos do produto..."></textarea>
                    </div>

                    <div class="full-width">
                        <button type="submit" class="btn-submit">Cadastrar Produto</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Lógica básica para interceptar o envio
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = {
                nome: document.getElementById('nome').value,
                marca: document.getElementById('marca').value,
                valor: document.getElementById('valor').value,
                categoria: document.getElementById('categoria').value,
                fornecedor: document.getElementById('fornecedor').value,
                qtd_minima: document.getElementById('qtd_minima').value,
                descricao: document.getElementById('descricao').value
            };
            
            console.log("Dados prontos para API:", formData);
            alert("Produto cadastrado com sucesso (Simulação)!");
        });
    </script>

</body>
</html>
