<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Cadastrar Produto</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="sidebar.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Padronização da Sidebar idêntica à de listagem */
        .side-bar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding-bottom: 20px;
            width: 260px;
            flex-shrink: 0;
        }

        /* Mantém a aba de Produtos selecionada com a cor padrão */
        .secoes:nth-child(2) {
            background-color: #2e4a3e;
        }

        .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 6px;
            width: 100%;
        }

        .perfil img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7bcf9c;
            box-shadow: 0 0 15px rgba(123, 207, 156, 0.3);
            background-color: #141414;
        }

        .perfil p {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Área de Conteúdo Adaptada para Formulários */
        .content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            max-width: calc(100vw - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Estilização do Painel do Formulário seguindo o .product-panel */
        .product-panel {
            width: 100%;
            max-width: 800px;
            /* Largura reduzida para melhor estética de formulários */
            border-radius: 20px;
            padding: 40px;
            margin: 0 auto 20px auto;
            background: rgba(20, 20, 20, 0.72);
            border: 1px solid #2e4a3e;
            box-shadow: 0 0 25px rgba(0, 255, 120, 0.08);
            position: relative;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-right: 90px;
        }

        .panel-title h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: #6da381;
        }

        .breadcrumb span {
            color: #aaa;
        }

        /* Ações no Canto Superior Direito */
        .right-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            top: 40px;
            right: 40px;
        }

        .panel-header-icon {
            background: rgba(135, 255, 185, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: #7bcf9c;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-back {
            background: none;
            border: 1px solid #4a5a50;
            color: #b0b0b0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        /* Configurações dos Campos de Input e Grid */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        label {
            font-size: 0.85rem;
            color: #b0b0b0;
        }

        input,
        textarea {
            background-color: #141414;
            border: 1px solid #262626;
            border-radius: 6px;
            padding: 14px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: #2e4a3e;
        }

        input::placeholder,
        textarea::placeholder {
            color: #555555;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        /* Botão Principal */
        .btn-submit {
            background-color: #80B297;
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            align-self: flex-start;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #81c784;
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <section class="side-bar">
            <div>
                <div class="sidebar-header">
                    <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
                </div>

                <div class="perfil">
                    <img id="user-avatar" src="./img/perfil-icon.png" alt="Foto de Perfil">
                    <p id="user-name">Carregando...</p>
                </div>

                <nav class="nav-side-bar">
                    <div class="secoes">
                        <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                        <a href="dashboard.html">Início</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/produtos.png" alt="" class="secao-icon">
                        <a href="./produtos.html">Produtos</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/estoque.png" alt="" class="secao-icon">
                        <a href="./estoque.html">Estoques</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/financeiro.png" alt="" class="secao-icon">
                        <a href="./financeiro.html">Financeiro</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/vendas.png" alt="" class="secao-icon">
                        <a href="vendas.html">Vendas</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/funcionarios.png" alt="" class="secao-icon">
                        <a href="./funcionarios.html">Funcionários</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/clientes.png" alt="" class="secao-icon">
                        <a href="./ClienteFornecedor.html">Clientes e Fornecedores</a>
                    </div>
                    <div class="secoes">
                        <img src="./img/relatorios.png" alt="" class="secao-icon">
                        <a href="./categorias.html">Categorias</a>
                    </div>
                </nav>
            </div>

            <div class="logout-link">
                <a href="javascript:void(0)" onclick="efetuarLogout()">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="product-panel">
                <div class="right-actions">
                    <div class="panel-header-icon">
                        <i class="ph ph-package"></i>
                    </div>
                    <a href="./produtos.html" class="btn-back">Voltar</a>
                </div>

                <div class="panel-header">
                    <div class="panel-title">
                        <h2 id="form-title">Cadastrar Produtos</h2>
                        <div class="breadcrumb">Produtos > <span id="breadcrumb-action">Cadastrar Produtos</span></div>
                    </div>
                </div>

                <form id="formProduto">
                    <div class="form-group">
                        <label for="urlImagem">Url da imagem:</label>
                        <input type="text" id="urlImagem"
                            placeholder="Ex: https://www.borealtools.com.br/imagens/produtos.png">
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome do produto:</label>
                        <input type="text" id="nome" placeholder="Ex: iPhone 17 Pro Max" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="marca">Marca:</label>
                            <input type="text" id="marca" placeholder="Ex: Apple" required>
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor (R$):</label>
                            <input type="number" step="0.01" id="valor" placeholder="0,00" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoria">Categoria:</label>
                            <input type="number" id="categoria" placeholder="Ex: 2 (ID da Categoria)" required>
                        </div>
                        <div class="form-group">
                            <label for="fornecedor">Fornecedor:</label>
                            <input type="number" id="fornecedor" placeholder="Ex: 1 (ID do Fornecedor)" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="qtd_minima">Quantidade mínima estoque:</label>
                        <input type="number" id="qtd_minima" placeholder="Ex: 10" required>
                    </div>

                    <div class="form-group">
                        <label for="qtd_atual">Quantidade estoque:</label>
                        <input type="number" id="qtd_atual" placeholder="Ex: 10" required>
                    </div>

                    <div class="form-group">
                        <label for="descricao">Descrição:</label>
                        <textarea id="descricao" placeholder="Detalhes técnicos do produto..."></textarea>
                    </div>

                    <button type="submit" id="btnSalvar" class="btn-submit">Cadastrar Produto</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const apiURL = "http://localhost:5187/api/Produtos";
        let modoEdicao = false;
        let produtoId = null;

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("Falha ao decodificar token:", e);
                return null;
            }
        }

        function obterToken() {
            return localStorage.getItem("token") || sessionStorage.getItem("token");
        }

        document.addEventListener("DOMContentLoaded", () => {
            const token = obterToken();

            if (!token) {
                document.getElementById('user-name').textContent = "Usuário não logado";
                window.location.replace("./login.html");
                return;
            }

            const payloadJson = parseJwt(token);
            if (payloadJson) {
                const nomeUsuario = payloadJson["unique_name"] ||
                    payloadJson["name"] ||
                    payloadJson["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] ||
                    "Usuário Boreal";
                document.getElementById('user-name').textContent = nomeUsuario;
            } else {
                document.getElementById('user-name').textContent = "Erro de Sessão";
            }

            const formProduto = document.getElementById("formProduto");
            formProduto.addEventListener("submit", salvarProduto);

            // Verificação Dinâmica para capturar caso venha da tabela em modo de Edição
            const parametrosUrl = new URLSearchParams(window.location.search);
            const idParaEdicao = parametrosUrl.get("id");

            if (idParaEdicao) {
                modoEdicao = true;
                produtoId = idParaEdicao;

                document.getElementById("form-title").innerText = "Editar Produto";
                document.getElementById("breadcrumb-action").innerText = "Editar Produto";
                document.getElementById("btnSalvar").innerText = "Salvar Alterações";

                carregarDadosParaEdicao(idParaEdicao);
            }
        });

        function efectuarLogout() {
            try {
                localStorage.clear();
                sessionStorage.clear();
            } catch (e) {
                console.error("Erro ao efetuar limpeza:", e);
            }
            window.location.replace("./login.html");
        }

        async function carregarDadosParaEdicao(id) {
            try {
                const token = obterToken();
                const resposta = await fetch(`${apiURL}/${id}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!resposta.ok) {
                    alert("Erro ao buscar dados do produto para edição.");
                    return;
                }

                const produto = await resposta.json();

                document.getElementById("urlImagem").value = produto.urlImg || produto.UrlImg || "";
                document.getElementById("nome").value = produto.nome || produto.Nome || "";
                document.getElementById("marca").value = produto.marca || produto.Marca || "";
                document.getElementById("valor").value = produto.valor || produto.Valor || "";
                document.getElementById("categoria").value = produto.categoriaId || produto.CategoriaId || "";
                document.getElementById("fornecedor").value = produto.fornecedorId || produto.FornecedorId || "";
                document.getElementById("qtd_minima").value = produto.qtdMinimaEstoque || produto.QtdMinimaEstoque || 0;
                document.getElementById("qtd_atual").value = produto.quantidadeEstoque ?? produto.qtdEstoque ?? produto.QuantidadeEstoque ?? produto.QtdEstoque ?? 0;
                document.getElementById("descricao").value = produto.descricao || produto.Descricao || "";

            } catch (error) {
                console.error("Erro ao carregar edição:", error);
                alert("Falha de conexão ao tentar carregar os dados originais.");
            }
        }

        async function salvarProduto(event) {
            event.preventDefault();

            const urlImagem = document.getElementById("urlImagem").value;
            const nome = document.getElementById("nome").value;
            const marca = document.getElementById("marca").value;
            const valor = document.getElementById("valor").value;
            const category = document.getElementById("categoria").value;
            const fornecedor = document.getElementById("fornecedor").value;
            const qtdMinima = document.getElementById("qtd_minima").value;
            const qtdAtual = document.getElementById("qtd_atual").value;
            const descricao = document.getElementById("descricao").value;

            try {
                const token = obterToken();

                const payload = {
                    UrlImg: urlImagem,
                    nome: nome,
                    marca: marca,
                    valor: parseFloat(valor) || 0.0,
                    Descricao: descricao,
                    categoriaId: parseInt(category) || 1,
                    fornecedorId: parseInt(fornecedor) || 1,
                    qtdMinimaEstoque: parseInt(qtdMinima) || 0,
                    qtdEstoque: parseInt(qtdAtual) || 0,
                    quantidadeEstoque: parseInt(qtdAtual) || 0
                };

                if (modoEdicao) {
                    payload.id = parseInt(produtoId);
                }

                const urlDestino = modoEdicao ? `${apiURL}/${produtoId}` : apiURL;
                const metodoHttP = modoEdicao ? "PUT" : "POST";

                const resposta = await fetch(urlDestino, {
                    method: metodoHttP,
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!resposta.ok) {
                    const erroDetalhado = await resposta.text();
                    console.error("Erro retornado do Backend:", erroDetalhado);
                    alert(`Falha na requisição (Erro ${resposta.status}).`);
                    return;
                }

                if (modoEdicao) {
                    alert("Produto atualizado com sucesso!");
                    window.location.href = "./produtos.html";
                } else {
                    alert("Produto cadastrado com sucesso!");
                    document.getElementById("formProduto").reset();
                }

            } catch (error) {
                console.error("Falha de comunicação:", error);
                alert("Erro de rede ao tentar contactar o servidor.");
            }
        }
    </script>
</body>

</html>
