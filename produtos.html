<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Produtos</title>
    <link rel="icon" type="image/png" href="./images/logo-removebg.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="sidebar.css">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:
    linear-gradient(
        109deg,
        #090909 32.55%,
        #002c18 79.54%,
        #003019 88.95%
    );

    color: white;
    min-height: 100vh;
}

.main-wrapper{
    display:flex;
    min-height:100vh;
}

.side-bar{
    width:300px;
    flex-shrink:0;
}

.content{
    flex:1;
    padding:30px;
}

a{
    text-decoration:none;
    color:inherit;
}

/* =========================
   PAGINA ATIVA
========================= */

.secoes:nth-child(2){
    background-color:#2e4a3e;
}

/* =========================
   MAIN
========================= */

main{
    padding: 30px;
    overflow-y: auto;
    width: 100%;
}

        /* =========================================
           5. PAINEL DE PRODUTOS E TOPO
        ========================================= */
        .product-panel{
            width:95%;

max-width:1250px;

border-radius:20px;

padding:40px;

margin:20px auto;

background:rgba(20,20,20,0.7);

border:1px solid #2e4a3e;

box-shadow:
0 0 25px rgba(0,255,120,0.08);
}

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .panel-title h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: #6da381;
        }

        .breadcrumb span {
            color: #aaa;
        }

        .panel-header-icon {
            background: rgba(135, 255, 185, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: var(--neon-green);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid #4a5a50;
            border-radius: 20px;
            padding: 8px 16px;
            width: 320px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
            width: 100%;
            font-size: 0.85rem;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box i {
            color: #666;
            font-size: 1.1rem;
            margin-left: 8px;
        }

        .btn-add {
            background-color: #80B297;
            color: #000;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn-add:hover {
            background-color: #81c784;
        }

        /* =========================================
           6. TABELA E BOTÕES DE AÇÃO
        ========================================= */
        .product-table {
            width: 100%;
            border-collapse: collapse;
        }

        .product-table th {
            text-align: left;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 0.8rem;
            font-weight: 400;
            border-bottom: 1px solid #333;
        }

        .product-table th:last-child {
            text-align: center;
        }

        .product-table td {
            padding: 16px 15px;
            color: #b0b0b0;
            font-size: 0.85rem;
            border-bottom: 1px solid #333;
            vertical-align: middle;
        }

        .product-table tbody tr {
            transition: background 0.2s;
        }

        .product-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-details {
            background-color: #80B297;
            color: #000;
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-details:hover {
            background-color: #81c784;
        }

        .btn-edit {
            background-color: #80B297;
            color: #000;
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 10px;
        }

        .btn-edit:hover {
            background-color: #81c784;
        }

        .btn-table-delete {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            margin: 0 auto;
        }

        .trash-icon {
            width: 20px; 
            height: auto;
            transition: transform 0.2s ease, filter 0.2s ease;
            filter: invert(39%) sepia(88%) saturate(5412%) hue-rotate(344deg) brightness(100%) contrast(106%);
        }

        .btn-table-delete:hover .trash-icon {
            transform: scale(1.15); 
            filter: invert(19%) sepia(96%) saturate(6090%) hue-rotate(352deg) brightness(97%) contrast(118%);
        }

        /* =========================================
           7. MODAL DE DETALHES
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(2px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background-color: #222222;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-header-left i {
            font-size: 2rem;
            color: var(--neon-green);
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
        }

        .trash-icon-modal {
            width: 24px; 
            transition: transform 0.2s ease, filter 0.2s ease;
            filter: invert(39%) sepia(88%) saturate(5412%) hue-rotate(344deg) brightness(100%) contrast(106%);
        }

        .btn-delete:hover .trash-icon-modal {
            transform: scale(1.1);
            filter: invert(19%) sepia(96%) saturate(6090%) hue-rotate(352deg) brightness(97%) contrast(118%);
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 2rem;
            color: #cccccc;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .img-detalhe-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .img-detalhe {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            border: 1px solid #4a5a50;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <section class="side-bar">
            <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
            </div>
        
            <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
            </div> 
        
            <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active">
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="#">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
                <div class="secoes">
                    <img src="./img/relatorios.png" class="secao-icon">
                    <a href="./categorias.html">Categorias</a>
                </div>
            </nav>

            <div class="logout-link">
                <a href="./login.html">← Deslogar</a>
            </div>
        </section>

        <main class="content">
            <div class="product-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2>Painel da Lista de Produtos</h2>
                        <div class="breadcrumb">Produtos > <span>Lista de produtos</span></div>
                    </div>
                    <div class="panel-header-icon">
                        <i class="ph ph-package"></i>
                    </div>
                </div>

                <div class="table-toolbar">
                    <div class="search-box">
                        <input type="text" id="inputPesquisa" placeholder="Pesquisar por Id, Nome ou Marca" oninput="filtrarProdutos()">
                        <i class="ph ph-magnifying-glass"></i>
                    </div>
                    <a href="./cadastro_produtos.html" class="btn-add">+ Cadastrar Produto</a>
                </div>

                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Id</th>
                            <th>Marca</th>
                            <th>Valor em R$</th>
                            <th>Qtd. Estoque</th>
                            <th></th> 
                            <th></th> 
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modalDetalhes" class="modal-overlay" onclick="fecharModalFora(event)">
        <div class="modal-box">
            </div>
    </div>

    <script>
        const apiURL = "http://localhost:5187/api/Produtos";
        let produtosLocais = []; 

        function obterToken() {
            return localStorage.getItem("token") || sessionStorage.getItem("token");
        }

        document.addEventListener("DOMContentLoaded", () => {
            buscarProdutos();
        });

        async function buscarProdutos() {
            const tbody = document.querySelector(".product-table tbody");
            if (!tbody) return;

            try {
                const token = obterToken();
                const resposta = await fetch(apiURL, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!resposta.ok) {
                    if (resposta.status === 401) {
                        alert("Sessão expirada. Faça login novamente.");
                        window.location.href = "./login.html";
                        return;
                    }
                    throw new Error(`Erro: ${resposta.status}`);
                }

                produtosLocais = await resposta.json();
                renderizarTabela(produtosLocais);

            } catch (error) {
                console.error("Erro ao listar produtos:", error);
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ff6b6b;">Falha ao carregar produtos.</td></tr>`;
            }
        }

        function renderizarTabela(lista) {
            const tbody = document.querySelector(".product-table tbody");
            tbody.innerHTML = "";

            if (lista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-secondary);">Nenhum produto encontrado.</td></tr>`;
                return;
            }

            lista.forEach(produto => {
                const tr = document.createElement("tr");
                const valorFormatado = (produto.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // CORREÇÃO: Varre todas as possíveis nomenclaturas que o backend C# pode enviar para a quantidade de estoque
                const estoqueAtual = produto.quantidadeEstoque ?? produto.qtdEstoque ?? produto.QuantidadeEstoque ?? produto.QtdEstoque ?? 0;

                tr.innerHTML = `
                    <td style="color: #fff; font-weight: 500;">${produto.nome || 'Sem Nome'}</td>
                    <td>${produto.id}</td>
                    <td>${produto.marca || '-'}</td>
                    <td>${valorFormatado}</td>
                    <td>${estoqueAtual}</td>
                    <td style="text-align: right; width: 120px;">
                        <button class="btn-details" onclick="verDetalhesDoProduto(${produto.id})">Ver detalhes</button>
                    </td>
                    <td style="text-align: center; width: 50px;">
                        <button class="btn-table-delete" title="Excluir Produto" onclick="deletarProduto(${produto.id})">
                            <img src="img/trash.png" alt="Excluir" class="trash-icon" onerror="this.outerHTML='<i class=\\'ph ph-trash-fill\\' style=\\'color:#e74c3c; font-size:1.2rem;\\'></i>'">
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function verDetalhesDoProduto(idProduto) {
            const modalBox = document.querySelector("#modalDetalhes .modal-box");
            if (!modalBox) return;

            try {
                const token = obterToken();
                const resposta = await fetch(`${apiURL}/${idProduto}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!resposta.ok) {
                    alert("Não foi possível buscar as informações detalhadas deste produto.");
                    return;
                }

                const produtoCompleto = await resposta.json();
                const valorFormatado = (produtoCompleto.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                
                // CORREÇÃO: Varre as nomenclaturas no modal também para evitar exibir 0 indevidamente
                const estoqueAtualModal = produtoCompleto.quantidadeEstoque ?? produtoCompleto.qtdEstoque ?? produtoCompleto.QuantidadeEstoque ?? produtoCompleto.QtdEstoque ?? 0;

                modalBox.innerHTML = `
                    <div class="modal-header">
                        <div class="modal-header-left">
                            <i class="ph ph-package"></i>
                            <h3>Detalhes do Produto</h3>
                        </div>
                        <button class="btn-delete" title="Excluir Produto" onclick="deletarProduto(${produtoCompleto.id})">
                            <img src="img/trash.png" alt="Excluir" class="trash-icon-modal" onerror="this.outerHTML='<i class=\\'ph ph-trash-fill\\' style=\\'color:#e74c3c; font-size:1.5rem;\\'></i>'">
                        </button>
                    </div>
                    
                    <div class="modal-body">
                        ${produtoCompleto.urlImg ? `
                        <div class="img-detalhe-container">
                            <img src="${produtoCompleto.urlImg}" alt="Imagem do produto" class="img-detalhe" onerror="this.style.display='none'">
                        </div>
                        ` : ''}
                        <div><strong>Nome:</strong> ${produtoCompleto.nome || '-'}</div>
                        <div><strong>Id:</strong> ${produtoCompleto.id}</div>
                        <div><strong>Marca:</strong> ${produtoCompleto.marca || '-'}</div>
                        <div><strong>Valor:</strong> ${valorFormatado}</div>
                        <div><strong>ID Categoria:</strong> ${produtoCompleto.categoriaId || 'Não informada'}</div>
                        <div><strong>ID Fornecedor:</strong> ${produtoCompleto.fornecedorId || 'Não informado'}</div>
                        <div class="full-width"><strong>Descrição:</strong> ${produtoCompleto.descricao || 'Sem descrição cadastrada.'}</div>
                        <div><strong>Qtd Mínima Estoque:</strong> ${produtoCompleto.qtdMinimaEstoque || produtoCompleto.QtdMinimaEstoque || 0}</div>
                        <div><strong>Qtd Atual Estoque:</strong> ${estoqueAtualModal}</div>
                    </div>

                    <div style="text-align: right; margin-top: 1.5rem; display: flex; justify-content: flex-end;">
                        <button class="btn-edit" onclick="abrirModalEdicao(${produtoCompleto.id})">Editar</button>
                        <button class="btn-details" onclick="fecharModal()">Fechar</button>
                    </div>
                `;

                document.getElementById('modalDetalhes').style.display = 'flex';

            } catch (error) {
                console.error("Erro ao buscar detalhes do produto:", error);
                alert("Erro de conexão ao buscar os detalhes.");
            }
        }

        async function deletarProduto(idProduto) {
            if (!confirm("Deseja realmente excluir este produto?")) return;

            try {
                const token = obterToken();
                const resposta = await fetch(`${apiURL}/${idProduto}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (resposta.ok) {
                    alert("Produto excluído!");
                    fecharModal();
                    buscarProdutos(); 
                } else {
                    alert("Erro ao excluir produto.");
                }
            } catch (error) {
                console.error(error);
            }
        }

        function filtrarProdutos() {
            const termo = document.getElementById("inputPesquisa").value.toLowerCase();
            const filtrados = produtosLocais.filter(p => {
                const idProduto = p.id ? p.id.toString() : "";
                const nomeProduto = p.nome ? p.nome.toLowerCase() : "";
                const marcaProduto = p.marca ? p.marca.toLowerCase() : "";

                return idProduto.includes(termo) || 
                       nomeProduto.includes(termo) || 
                       marcaProduto.includes(termo);
            });
            renderizarTabela(filtrados);
        }

        function fecharModal() {
            document.getElementById('modalDetalhes').style.display = 'none';
        }

        function fecharModalFora(event) {
            if (event.target === document.getElementById('modalDetalhes')) {
                fecharModal();
            }
        }

        // Redireciona para a página de cadastro passando o ID na URL
        function abrirModalEdicao(idProduto) {
            window.location.href = `./cadastro_produtos.html?id=${idProduto}`;
        }
    </script>
</body>
</html>
