<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boreal Tools - Funcionários</title>

<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:
    linear-gradient(
        109deg,
        #090909 32.55%,
        #002c18 79.54%,
        #003019 88.95%
    );

    color:white;
    display:grid;
    grid-template-columns:400px 1fr;
    min-height:100vh;
}

a{
    text-decoration:none;
    color:inherit;
}

/* =========================
   PAGINA ATIVA
========================= */
.secoes:nth-child(6){
    background-color:#2e4a3e;
}

/* =========================
   MAIN
========================= */
main{
    padding:25px;
    overflow-y:auto;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* =========================
   PAINEL
========================= */
.employee-panel{
    width:95%;
    max-width:1250px;
    border-radius:20px;
    padding:40px;
    margin:20px auto;
    background:rgba(20,20,20,0.7);
    border:1px solid #2e4a3e;
    box-shadow: 0 0 25px rgba(0,255,120,0.08);
}

/* =========================
   HEADER
========================= */
.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.panel-title h2{
    font-size:2rem;
    font-weight:500;
    margin-bottom:10px;
}

.panel-subtitle{
    color:#aaa;
    font-size:0.95rem;
}

.panel-icon{
    width:50px;
    height:50px;
    border-radius:10px;
    background:#163125;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#7bcf9c;
    font-size:24px;
}

/* =========================
   TOOLBAR
========================= */
.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
}

.search-box{
    width:320px;
    display:flex;
    align-items:center;
    border:1px solid #3a4a43;
    border-radius:30px;
    padding:10px 18px;
    background:transparent;
}

.search-box input{
    width:100%;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:0.95rem;
}

.search-box input::placeholder{
    color:#777;
}

.search-box i{
    color:#777;
}

/* =========================
   BOTÕES
========================= */
.actions{
    display:flex;
    gap:15px;
}

.btn{
    background:#9cc8aa;
    color:black;
    padding:12px 22px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
    cursor: pointer;
    border: none;
}

.btn:hover{
    background:#81c784;
}

.btn-detail {
    background: #163125;
    color: #7bcf9c;
    border: 1px solid #2e4a3e;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.btn-detail:hover {
    background: #2e4a3e;
    color: white;
}

/* =========================
   GRID FUNCIONÁRIOS
========================= */
.employee-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(320px,1fr));
    gap:25px;
}

.employee-card{
    background:#161616;
    border:1px solid #2c2c2c;
    border-radius:18px;
    padding:24px;
    transition:0.3s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.employee-card:hover{
    border-color:#3c5c4b;
    transform:translateY(-3px);
}

/* =========================
   TOPO CARD
========================= */
.employee-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.employee-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.employee-photo{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#2e4a3e;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #7bcf9c;
    font-size: 20px;
}

.employee-name h4{
    font-size:1.1rem;
    margin-bottom:4px;
}

.employee-name p{
    color:#888;
    font-size:0.85rem;
}

.employee-id{
    color:#7bcf9c;
    font-size:0.9rem;
    font-weight:600;
}

/* =========================
   TABELA CARD
========================= */
.employee-table{
    width:100%;
    border-collapse:collapse;
    margin-bottom: 15px;
}

.employee-table tr{
    border-bottom:1px solid #2a2a2a;
}

.employee-table tr:last-child{
    border:none;
}

.employee-table td{
    padding:12px 0;
    font-size:0.92rem;
}

.employee-table td:first-child{
    color:#aaa;
}

.employee-table td:last-child{
    text-align:right;
    color:white;
    font-weight:600;
}

/* =========================
   MODAL DE DETALHES
========================= */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
}

.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.modal-content {
    background: #121212;
    border: 1px solid #2e4a3e;
    box-shadow: 0 0 30px rgba(0, 255, 120, 0.1);
    width: 90%;
    max-width: 650px;
    border-radius: 20px;
    padding: 30px;
    position: relative;
    max-height: 85vh;
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2e4a3e;
    padding-bottom: 15px;
    margin-bottom: 20px;
}

.modal-header h3 {
    font-size: 1.5rem;
    color: #7bcf9c;
}

.modal-close {
    background: transparent;
    border: none;
    color: #aaa;
    font-size: 1.5rem;
    cursor: pointer;
    transition: 0.2s;
}

.modal-close:hover {
    color: #e57373;
}

.details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.detail-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #1c1c1c;
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid #262626;
}

.detail-item.full-width {
    grid-column: span 2;
}

.detail-label {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.detail-value {
    font-size: 0.95rem;
    font-weight: 600;
}

/* =========================
   RESPONSIVO
========================= */
@media(max-width:1200px){
    body{
        grid-template-columns:320px 1fr;
    }
}

@media(max-width:900px){
    body{
        grid-template-columns:1fr;
    }

    .side-bar{
        display:none;
    }

    .toolbar{
        flex-direction:column;
        align-items:flex-start;
    }

    .actions{
        flex-wrap:wrap;
    }

    .search-box{
        width:100%;
    }

    .details-grid {
        grid-template-columns: 1fr;
    }
    .detail-item.full-width {
        grid-column: span 1;
    }
}
</style>
</head>

<body>

<section class="side-bar">
    <div class="sidebar-header">
        <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
    </div>

    <div class="perfil">
        <img src="./img/perfil-icon.png" alt="Perfil">
        <p>Fulano de Tal</p>
    </div>

    <nav class="nav-side-bar">
        <div class="secoes"><img src="./img/inicio.sidebar.png" class="secao-icon"><a href="dashboard.html">Início</a></div>
        <div class="secoes"><img src="./img/produtos.png" class="secao-icon"><a href="produtos.html">Produtos</a></div>
        <div class="secoes"><img src="./img/estoque.png" class="secao-icon"><a href="./estoque.html">Estoques</a></div>
        <div class="secoes"><img src="./img/financeiro.png" class="secao-icon"><a href="./financeiro.html">Financeiro</a></div>
        <div class="secoes"><img src="./img/vendas.png" class="secao-icon"><a href="vendas.html">Vendas</a></div>
        <div class="secoes active"><img src="./img/funcionarios.png" class="secao-icon"><a href="./funcionarios.html">Funcionários</a></div>
        <div class="secoes"><img src="./img/clientes.png" class="secao-icon"><a href="./ClienteFornecedor.html">Clientes</a></div>
        <div class="secoes"><img src="./img/relatorios.png" class="secao-icon"><a href="./categorias.html">Categorias</a></div>
    </nav>

    <div class="logout-link">
        <a href="./login.html">← Deslogar</a>
    </div>
</section>

<main>
<div class="employee-panel">

    <div class="panel-header">
        <div class="panel-title">
            <h2>Quadro de Funcionários</h2>
            <div class="panel-subtitle">
                Gerencie a equipe, cargos, salários e informações contratuais.
            </div>
        </div>
        <div class="panel-icon">
            <i class="fa-solid fa-user-tie"></i>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="input-search" placeholder="Pesquisar por nome ou cargo...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="actions">
            <a href="funcionariosCadastrar.html" class="btn">+ Cadastrar</a>
            <a href="folhaPagamento.html" class="btn">+ Lançar pagamento</a>
        </div>
    </div>

    <div class="employee-grid" id="employee-grid">
        <p style="color: #aaa;">Carregando funcionários...</p>
    </div>
</div>
</main>

<div class="modal-overlay" id="modal-details">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-emp-name">Nome do Funcionário</h3>
            <button class="modal-close" id="btn-close-modal">&times;</button>
        </div>
        <div class="details-grid" id="modal-details-body">
            </div>
    </div>
</div>

<script>
    // Configuração base da API - Altere para a URL correta do seu ambiente IIS/Express local
    const API_BASE_URL = 'https://localhost:5001/api/Funcionarios'; 
    
    // Lista global para armazenar os dados e permitir filtragem rápida em memória
    let funcionariosControle = [];

    // Elementos do DOM
    const employeeGrid = document.getElementById('employee-grid');
    const inputSearch = document.getElementById('input-search');
    const modalDetails = document.getElementById('modal-details');
    const btnCloseModal = document.getElementById('btn-close-modal');

    // Inicialização ao carregar a página
    document.addEventListener('DOMContentLoaded', () => {
        obterFuncionarios();
        configurarEventos();
    });

    function configurarEventos() {
        // Evento de busca/filtro em tempo real
        inputSearch.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = funcionariosControle.filter(f => 
                f.nome.toLowerCase().includes(termo) || 
                f.cargo.toLowerCase().includes(termo)
            );
            renderizarCards(filtrados);
        });

        // Fechar o modal de detalhes
        btnCloseModal.addEventListener('click', () => modalDetails.classList.remove('active'));
        modalDetails.addEventListener('click', (e) => {
            if(e.target === modalDetails) modalDetails.classList.remove('active');
        });
    }

    // Requisição HTTP GET para a API utilizando Token de Autenticação do localstorage
    async function obterFuncionarios() {
        try {
            const token = localStorage.getItem('token'); // Altere a chave se usar outro nome
            
            const response = await fetch(API_BASE_URL, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Authorization': `Bearer ${token}` // Exigido pelo atributo [Authorize] do seu C#
                }
            });

            if (response.status === 401) {
                employeeGrid.innerHTML = `<p style="color: #e57373;">Acesso não autorizado. Por favor, faça login novamente.</p>`;
                return;
            }

            if (!response.ok) throw new Error('Erro ao buscar dados do servidor.');

            funcionariosControle = await response.json();
            renderizarCards(funcionariosControle);

        } catch (error) {
            console.error(error);
            employeeGrid.innerHTML = `<p style="color: #e57373;">Não foi possível carregar os funcionários. Verifique a conexão com a API.</p>`;
        }
    }

    // Renderiza a estrutura HTML de cada card baseado no DTO recebido
    function renderizarCards(lista) {
        if (lista.length === 0) {
            employeeGrid.innerHTML = `<p style="color: #aaa;">Nenhum funcionário encontrado.</p>`;
            return;
        }

        employeeGrid.innerHTML = ''; // Limpa o container

        lista.forEach(func => {
            // Formatação simples do salário recebido numericamente da API
            const salarioFormatado = new Intl.NumberFormat('pt-BR', { 
                style: 'currency', 
                currency: 'BRL' 
            }).format(func.salario);

            const card = document.createElement('div');
            card.className = 'employee-card';
            card.innerHTML = `
                <div>
                    <div class="employee-top">
                        <div class="employee-info">
                            <div class="employee-photo">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div class="employee-name">
                                <h4>${func.nome}</h4>
                                <p>${func.cargo}</p>
                            </div>
                        </div>
                        <div class="employee-id">ID: ${func.id}</div>
                    </div>

                    <table class="employee-table">
                        <tr>
                            <td>Departamento</td>
                            <td>${func.departamento || 'Não Cadastrado'}</td>
                        </tr>
                        <tr>
                            <td>Salário Base</td>
                            <td>${salarioFormatado}</td>
                        </tr>
                    </table>
                </div>

                <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                    <button class="btn-detail" onclick="abrirDetalhes(${func.id})">
                        <i class="fa-solid fa-circle-info"></i> Detalhes
                    </button>
                </div>
            `;
            employeeGrid.appendChild(card);
        });
    }

    // Busca o objeto específico na memória e exibe no modal
    function abrirDetalhes(id) {
        const funcionario = funcionariosControle.find(f => f.id === id);
        if(!funcionario) return;

        document.getElementById('modal-emp-name').innerText = funcionario.nome;
        
        const salarioFormatado = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(funcionario.salario);
        const dataNascFormatada = funcionario.dataNascimento ? new Date(funcionario.dataNascimento).toLocaleDateString('pt-BR') : '---';

        const bodyModal = document.getElementById('modal-details-body');
        bodyModal.innerHTML = `
            <div class="detail-item"><span class="detail-label">Cargo</span><span class="detail-value">${funcionario.cargo}</span></div>
            <div class="detail-item"><span class="detail-label">Departamento</span><span class="detail-value">${funcionario.departamento}</span></div>
            <div class="detail-item"><span class="detail-label">Salário</span><span class="detail-value" style="color: #7bcf9c;">${salarioFormatado}</span></div>
            <div class="detail-item"><span class="detail-label">Data Nasc.</span><span class="detail-value">${dataNascFormatada}</span></div>
            <div class="detail-item"><span class="detail-label">CPF</span><span class="detail-value">${funcionario.cpf || '---'}</span></div>
            <div class="detail-item"><span class="detail-label">RG</span><span class="detail-value">${funcionario.rg || '---'}</span></div>
            <div class="detail-item"><span class="detail-label">Telefone</span><span class="detail-value">${funcionario.telefone || '---'}</span></div>
            <div class="detail-item"><span class="detail-label">E-mail</span><span class="detail-value">${funcionario.email || '---'}</span></div>
            <div class="detail-item"><span class="detail-label">CEP</span><span class="detail-value">${funcionario.cep || '---'}</span></div>
            <div class="detail-item"><span class="detail-label">Cidade / Estado</span><span class="detail-value">${funcionario.cidade || '---'} - ${funcionario.estado || '--'}</span></div>
            <div class="detail-item full-width"><span class="detail-label">Logradouro</span><span class="detail-value">${funcionario.rua || '---'}, ${funcionario.bairro || '---'}</span></div>
            <div class="detail-item full-width"><span class="detail-label">Complemento</span><span class="detail-value">${funcionario.complemento || 'Nenhum'}</span></div>
        `;

        modalDetails.classList.add('active');
    }
</script>
</body>
</html>
