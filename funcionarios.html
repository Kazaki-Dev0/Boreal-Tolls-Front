<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Tools - Funcionários</title>
    <link rel="stylesheet" href="sidebar.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}


    body {
        background-color: #0a0a0a;
        background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
        color: white;
        display: flex;
        min-height: 100vh;
    }


a {
    color: inherit;
    text-decoration: none;
}

/* Destaque para a página atual (Funcionários) */
.secoes:nth-child(6) {
    background-color: #2e4a3e; /* Verde escuro */
}

/* Main Content Area */
main {
    padding: 40px;
    overflow-y: auto;
}

/* O "Quadro" centralizado com borda brilhante */
main {
    border: 1px solid #2e4a3e;
    width: 70%;
    border-radius: 20px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 25px rgba(3, 255, 15, 0.5);
    margin: 10%;
}

.titulo h2 {
    font-size: 1.8rem;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    
}

.titulo p {
    color: #888;
    margin-bottom: 25px;
}

.atalhos-main {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-bottom: 30px;
}

.atalhos-main input {
    background: transparent;
    border: 1px solid #444;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    width: 250px;
}

.atalhos-main button {
    background-color: #80B297;
    color: whitesmoke;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.atalhos-main button:hover {
    background-color: #81c784;
}

/* Grid de Cards */
.list {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

article {
    background-color: #1e1e1e;
    padding: 20px;
    border-radius: 15px;
    width: 320px;
    cursor: pointer;
}

.info-funcionarios {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}

.info-funcionarios img {
    width: 45px;
    height: 45px;
    background-color: #a5d6a7;
    border-radius: 50%;
}

.nome-cargo h4 {
    font-size: 1.1rem;
}

.nome-cargo p {
    color: #777;
    font-size: 0.8rem;
}

/* Tabela interna do card */
table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 8px 0;
    font-size: 0.9rem;
}

td:first-child {
    color: #aaa;
}

td:last-child {
    text-align: right;
    font-weight: bold;
}
    </style>
</head>
<body>

    <section class="side-bar">
        <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
        </div>
        
        <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
        </div> 
        
        <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active" href="./produtos.html" >
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="produtos.html">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
        </nav>

        <div class="logout-link">
            <a href="./login.html">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="main-header">
            <div class="titulo">
                <h2><img src="./img/mala.png" alt=""> Quadro de Funcionários</h2>
                <p>Gerencie a equipe, cargos, salários e horas extras.</p>
            </div>
            <div class="atalhos-main">
                <input type="text" placeholder="🔍︎​ Buscar por nome...">
                <a href="funcionariosCadastrar.html"><button>+ Cadastrar</button></a>
                <a href="folhaPagamento.html"><button>+ Lançar pagamento</button></a>
            </div>
        </div>
        <div class="list">
            <article id="card-funcionario">
                <div class="info-funcionarios">
                    <img src="" alt="">
                    <div class="nome-cargo">
                        <h4>Carlos Souza</h4>
                        <p>Vendedor</p>
                    </div>
                    <p>ID: 1</p>
                </div>
                <table>
                    <tbody>
                        <tr>
                            <td>Salário Base</td>
                            <td>R$ 2.500,00</td>
                        </tr>
                        <tr>
                            <td>Horas Extras</td>
                            <td>15h</td>
                        </tr>
                    </tbody>
                </table>
            </article>
        </div>
    </main>
    
</body>
</html>
