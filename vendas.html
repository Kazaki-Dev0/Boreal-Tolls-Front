<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas/Pedidos</title>
    <link rel="stylesheet" href="sidebar.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #0a0a0a;
    background: linear-gradient(109deg, #090909 32.55%, #002c18 79.54%, #003019 88.95%);
    color: white;
    display: grid;
    grid-template-columns: 400px 1fr;
    height: 100%;
}

a {
    color: inherit;
    text-decoration: none;
}

/* Destaque para a página atual (Vendas) */
.secoes:nth-child(5) {background-color: #2e4a3e;}


main {
    overflow-y: auto;
    border: 1px solid #2e4a3e;
    width: 70%;
    border-radius: 20px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 25px rgba(3, 255, 15, 0.5);
    margin: 10%;
}

.titulo h2 {
    font-size: 1.8rem;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    
}

.titulo p {
    color: #888;
    margin-bottom: 25px;
}

.atalhos-main {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-bottom: 30px;
}

.atalhos-main input {
    background: transparent;
    border: 1px solid #444;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    width: 250px;
}

.atalhos-main button {
    background-color: #80B297;
    color: whitesmoke;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.atalhos-main button:hover {background-color: #81c784;}

.venda-card {
    background-color: #2c2a29; 
    border-radius: 20px;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between; 
    color: white;
    margin-bottom: 10px;
}

.info-grupo {
    display: flex;
    flex-direction: column; 
    gap: 5px;
}

.info-grupo .label {
    font-size: 0.85rem;
    color: #ccc;
    display: flex;
    align-items: center;
    gap: 5px;
}

.info-grupo .valor {
    font-weight: bold;
    font-size: 1rem;
}

.btn-detalhesVenda {
    background-color: #80B297; 
    color: white;
    font-weight: bold;
    border: none;
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: 0.3s;
}

.btn-detalhesVenda:hover {
    background-color: #81c784;

}

.info-grupo.total {
    text-align: right;
}

.info-grupo.total .valor {
    font-size: 1.2rem;
}
    </style>
</head>
<body>

    <section class="side-bar">
        <div class="sidebar-header">
                <img src="./img/LogoBorealTools.png" alt="Boreal Tools" class="logo">
        </div>
        
        <div class="perfil">
                <img src="./img/perfil-icon.png" alt="Foto de Perfil">
                <p>Fulano de Tal</p>
        </div> 
        
        <nav class="nav-side-bar">
                <div class="secoes">
                    <img src="./img/inicio.sidebar.png" alt="" class="secao-icon">
                    <a href="dashboard.html">Início</a>
                </div>
                <div class="secoes active" href="./produtos.html" >
                    <img src="./img/produtos.png" alt="" class="secao-icon">
                    <a href="produtos.html">Produtos</a>
                </div>
                <div class="secoes">
                    <img src="./img/estoque.png" alt="" class="secao-icon">
                    <a href="./estoque.html">Estoques</a>
                </div>
                <div class="secoes">
                    <img src="./img/financeiro.png" alt="" class="secao-icon">
                    <a href="./financeiro.html">Financeiro</a>
                </div>
                <div class="secoes">
                    <img src="./img/vendas.png" alt="" class="secao-icon">
                    <a href="vendas.html">Vendas</a>
                </div>
                <div class="secoes">
                    <img src="./img/funcionarios.png" alt="" class="secao-icon">
                    <a href="./funcionarios.html">Funcionários</a>
                </div>
                <div class="secoes">
                    <img src="./img/clientes.png" alt="" class="secao-icon">
                    <a href="./ClienteFornecedor.html">Clientes</a>
                </div>
        </nav>

        <div class="logout-link">
            <a href="./login.html">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="main-header">
            <div class="titulo">
                <h2><img src="./img/vendas-grande.png" alt="">Registro de Vendas</h2>
                <p>Acompanhe pedidos, itens vendidos e faturamento.</p>
            </div>
            <div class="atalhos-main">
                <input type="text" placeholder="🔍︎​ Buscar por cliente ou ID...">
                <a href="cadastrarVenda.html"><button>+ Registrar Venda</button></a>
            </div>
        </div>
        <div class="lista-vendas" id="lista-vendas">
            <article class="venda-card">
                <div class="info-grupo">
                    <span class="label">Pedido</span>
                    <span class="valor">#1</span>
                </div>

                <div class="info-grupo">
                    <span class="label">Data</span>
                    <span class="valor">29/02/2024</span>
                </div>

                <div class="info-grupo">
                    <span class="label">Cliente</span>
                    <span class="valor">João Silva</span>
                </div>

                <button class="btn-detalhesVenda" id="btn-detalhesVenda">Ver detalhes</button>

                <div class="info-grupo total">
                    <span class="label">Total da Venda</span>
                    <span class="valor">R$ 1.250,00</span>
                </div>
            </article>
        </div>
    </main>

</body>
</html>
