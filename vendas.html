<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boreal Tools - Vendas</title>

<link rel="stylesheet" href="sidebar.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background: linear-gradient( 109deg, #090909 32.55%,#002c18 79.54%,#003019 88.95%);
    color:white;
    display:grid;
    grid-template-columns:400px 1fr;
    min-height:100vh;
}

a{
    text-decoration:none;
    color:inherit;
}

/* =========================
   PAGINA ATIVA
========================= */

.secoes:nth-child(5){
    background-color:#2e4a3e;
}

/* =========================
   MAIN
========================= */

main{
    padding:25px;
    overflow-y:auto;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* =========================
   PAINEL
========================= */

.sales-panel{
    width:95%;
    max-width:1250px;
    border-radius:20px;
    padding:40px;
    margin:20px auto;
    background:rgba(20,20,20,0.7);
    border:1px solid #2e4a3e;
    box-shadow:0 0 25px rgba(0,255,120,0.08);
}

/* =========================
   HEADER
========================= */

.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.panel-title h2{
    font-size:2rem;
    font-weight:500;
    margin-bottom:10px;
}

.panel-subtitle{
    color:#aaa;
    font-size:0.95rem;
}

.panel-icon{
    width:50px;
    height:50px;
    border-radius:10px;
    background:#163125;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#7bcf9c;
    font-size:28px;
}

/* =========================
   TOOLBAR
========================= */

.table-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    gap:20px;
}

.search-box{
    width:350px;
    display:flex;
    align-items:center;
    border:1px solid #3a4a43;
    border-radius:30px;
    padding:10px 18px;
    background:transparent;
}

.search-box input{
    width:100%;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:0.95rem;
}

.search-box input::placeholder{
    color:#777;
}

.search-box i{
    color:#777;
}

/* =========================
   BOTÃO
========================= */

.btn-add{
    background:#9cc8aa;
    color:black;
    padding:12px 24px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.btn-add:hover{
    background:#81c784;
}

/* =========================
   CARDS DE VENDA
========================= */

.sales-list{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.sale-card{
    background:#1c1c1c;
    border:1px solid #2b2b2b;
    border-radius:18px;
    padding:22px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
    flex-wrap:wrap;
    gap:20px;
}

.sale-card:hover{
    border-color:#2e4a3e;
    background:#202020;
}

/* =========================
   INFORMAÇÕES
========================= */

.info-group{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.info-label{
    color:#888;
    font-size:0.85rem;
}

.info-value{
    font-size:1rem;
    font-weight:600;
    color:white;
}

.total-value{
    color:#7bcf9c;
    font-size:1.2rem;
}

/* =========================
   BOTÃO DETALHES
========================= */

.btn-detail{
    background:#9cc8aa;
    color:black;
    border:none;
    padding:10px 22px;
    border-radius:30px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn-detail:hover{
    background:#81c784;
}

/* =========================
   RESPONSIVO
========================= */

@media(max-width:1200px){
    body{
        grid-template-columns:320px 1fr;
    }
    .table-toolbar{
        flex-direction:column;
        align-items:flex-start;
    }
    .search-box{
        width:100%;
    }
    .sale-card{
        flex-direction:column;
        align-items:flex-start;
    }
}

@media(max-width:900px){
    body{
        grid-template-columns:1fr;
    }
    .side-bar{
        display:none;
    }
    .sales-panel{
        width:100%;
    }
}

</style>
</head>

<body>
    <section class="side-bar">

        <div class="sidebar-header">
            <img src="./img/LogoBorealTools.png"
            alt="Boreal Tools"
            class="logo">
        </div>

        <div class="perfil">
            <img src="./img/perfil-icon.png"
            alt="Perfil">

            <p>Fulano de Tal</p>
        </div>

        <nav class="nav-side-bar">

            <div class="secoes">
                <img src="./img/inicio.sidebar.png" class="secao-icon">
                <a href="dashboard.html">Início</a>
            </div>

            <div class="secoes">
                <img src="./img/produtos.png" class="secao-icon">
                <a href="produtos.html">Produtos</a>
            </div>

            <div class="secoes">
                <img src="./img/estoque.png" class="secao-icon">
                <a href="./estoque.html">Estoques</a>
            </div>

            <div class="secoes">
                <img src="./img/financeiro.png" class="secao-icon">
                <a href="./financeiro.html">Financeiro</a>
            </div>

            <div class="secoes active">
                <img src="./img/vendas.png" class="secao-icon">
                <a href="vendas.html">Vendas</a>
            </div>

            <div class="secoes">
                <img src="./img/funcionarios.png" class="secao-icon">
                <a href="./funcionarios.html">Funcionários</a>
            </div>

            <div class="secoes">
                <img src="./img/clientes.png" class="secao-icon">
                <a href="./ClienteFornecedor.html">Clientes</a>
            </div>

            <div class="secoes">
                <img src="./img/relatorios.png" class="secao-icon">
                <a href="./categorias.html">Categorias</a>
            </div>
        </nav>

        <div class="logout-link">
            <a href="./login.html">← Deslogar</a>
        </div>
    </section>

    <main>
        <div class="sales-panel">
            <!-- HEADER -->
            <div class="panel-header">
                <div class="panel-title">
                    <h2>Registro de Vendas</h2>
                    <div class="panel-subtitle">
                        Acompanhe pedidos, clientes e faturamento das vendas.
                    </div>
                </div>

                <div class="panel-icon">
                    <i class="ph ph-shopping-cart"></i>
                </div>
            </div>

            <!-- TOOLBAR -->
            <div class="table-toolbar">

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Pesquisar por cliente ou ID">
                    <i class="ph ph-magnifying-glass"></i>
                </div>

                <a href="cadastrarVenda.html" class="btn-add">+ Registrar Venda</a>
            </div>

            <!-- LISTA DE VENDAS -->
            <div class="sales-list" id="sales-container">

            </div>
        </div>
    </main>

    <script>
        
        // Configuração da URL base do seu controller C# (Altere a porta caso seja diferente)
        const API_URL = 'http://localhost:5187/api/Pedidos'; 

        // Elementos capturados do DOM
        const salesContainer = document.getElementById('sales-container');
        const searchInput = document.getElementById('search-input');

        // Evento disparado quando a página carrega completamente
        document.addEventListener('DOMContentLoaded', () => {
            verificarAutenticacao();
            carregarPedidos();
            configurarFiltroPesquisa();
        });

        /**
         * Valida se o usuário possui um token JWT salvo para evitar requisições perdidas
         */
        function verificarAutenticacao() {
            const token = localStorage.getItem('token'); // Presume-se que o token foi guardado no login
            if (!token) {
                alert('Sessão expirada ou usuário não autenticado. Redirecionando para o login...');
                window.location.href = './login.html';
            }
        }

        /**
         * Busca a lista de pedidos do backend C# enviando o Token JWT de autorização
         */
        async function carregarPedidos() {
            try {
                salesContainer.innerHTML = '<p style="text-align:center; padding:20px;">Carregando registros...</p>';

                const token = localStorage.getItem('token');
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // Envia o cabeçalho exigido pelo [Authorize] do C#
                    }
                });

                if (response.status === 401) {
                    alert('Você não tem permissão ou seu token expirou.');
                    window.location.href = './login.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Erro HTTP! Status: ${response.status}`);
                }

                const pedidos = await response.json();
                
                // Armazena globalmente os pedidos para realizar filtros em tempo real
                window.listaDePedidosGlobal = pedidos; 
                
                renderizarCards(pedidos);

            } catch (error) {
                console.error('Erro ao buscar pedidos:', error);
                salesContainer.innerHTML = `
                    <p style="color: red; text-align: center; padding: 20px; font-weight: bold;">
                        Erro ao carregar vendas. Certifique-se de que a API está rodando e o banco está acessível.
                    </p>`;
            }
        }

        /**
         * Injeta dinamicamente os elementos de pedidos no HTML estruturado
         * @param {Array} pedidos - Array contendo objetos mapeados do C#
         */
        function renderizarCards(pedidos) {
            salesContainer.innerHTML = '';

            if (pedidos.length === 0) {
                salesContainer.innerHTML = '<p style="text-align: center; padding: 20px;">Nenhum pedido registrado.</p>';
                return;
            }

            pedidos.forEach(pedido => {
                // Formata a data vinda do C# (ex: "2026-05-29T11:00:00") para o padrão "dd/mm/aaaa"
                const dataFormatada = new Date(pedido.data).toLocaleDateString('pt-BR');

                // Formata o valor decimal do C# para Real brasileiro (R$ 0,00)
                const valorFormatado = pedido.valorTotal.toLocaleString('pt-BR', {
                    style: 'currency',
                    currency: 'BRL'
                });

                // Monta o article conforme o seu padrão visual original do HTML
                const cardArticle = document.createElement('article');
                cardArticle.className = 'sale-card';
                cardArticle.innerHTML = `
                    <div class="info-group">
                        <span class="info-label">Pedido</span>
                        <span class="info-value">#${pedido.id.toString().padStart(3, '0')}</span>
                    </div>

                    <div class="info-group">
                        <span class="info-label">Data</span>
                        <span class="info-value">${dataFormatada}</span>
                    </div>

                    <div class="info-group">
                        <span class="info-label">Cliente</span>
                        <span class="info-value">${pedido.clienteNome || 'Cliente ID: ' + pedido.clienteId}</span>
                    </div>

                    <button class="btn-detail" onclick="redirecionarDetalhes(${pedido.id})">
                        Ver detalhes
                    </button>

                    <div class="info-group">
                        <span class="info-label">Total da Venda</span>
                        <span class="info-value total-value">${valorFormatado}</span>
                    </div>
                `;

                salesContainer.appendChild(cardArticle);
            });
        }

        /**
         * Filtra os pedidos localmente por ID ou ID do Cliente à medida que o usuário digita (Filtro reativo)
         */
        function configurarFiltroPesquisa() {
            searchInput.addEventListener('input', (evento) => {
                const termoBusca = evento.target.value.trim().toLowerCase();
                
                if (!window.listaDePedidosGlobal) return;

                // Filtra a lista pelo ID do pedido ou pelo ClienteId informado
                const pedidosFiltrados = window.listaDePedidosGlobal.filter(pedido => {
                    const idMatch = pedido.id.toString().toLowerCase().includes(termoBusca);
                    const clienteMatch = pedido.clienteId.toString().toLowerCase().includes(termoBusca);
                    
                    return idMatch || clienteMatch;
                });

                renderizarCards(pedidosFiltrados);
            });
        }

        /**
         * Executado ao clicar no botão 'Ver detalhes'
         * Redireciona enviando o id mapeado pela rota GET correspondente
         * @param {number} id - ID do pedido capturado
         */
        function redirecionarDetalhes(id) {
            // Redireciona para a página correspondente passando o ID via Query String
            window.location.href = `detalhesVenda.html?id=${id}`;
        }
    </script>

</body>
</html>
